<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星伴 · 声音小话筒 | 发声启蒙游戏</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #D9CBBF;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
      padding: 12px;
    }

    /* 主容器 - 固定1024x600 */
    .mic-game {
      width: 1024px;
      height: 600px;
      background: linear-gradient(145deg, #FFFCF7 0%, #FEF8F2 100%);
      border-radius: 48px;
      box-shadow: 0 30px 40px -20px rgba(60, 40, 28, 0.3), 0 0 0 1px rgba(235, 216, 190, 0.6);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .game-inner {
      flex: 1;
      padding: 18px 26px 18px;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at 20% 30%, rgba(255, 245, 235, 0.5) 0%, transparent 50%);
      height: 100%;
    }

    /* 头部 - 紧凑 */
    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .left-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .home-btn {
      background: #F5EDE4;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 26px;
      font-size: 20px;
      color: #B88B5C;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 3px 0 #DBC8B5;
      border: 1.5px solid #EADACA;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .home-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #DBC8B5;
    }

    .title-wrapper {
      background: #FCF4EA;
      padding: 6px 18px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid #EDDDCF;
    }

    .title-wrapper i {
      color: #D9A066;
      font-size: 20px;
    }

    .title-wrapper h2 {
      font-size: 18px;
      font-weight: 800;
      color: #6C4F32;
    }

    .speaker-btn {
      background: #F5EDE4;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 24px;
      font-size: 14px;
      color: #B88B5C;
      cursor: pointer;
      transition: 0.15s;
      border: 1.5px solid #EADACA;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 4px;
    }

    .speaker-btn.speaking {
      background: #D9A066;
      color: white;
      animation: pulse 0.8s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.6;
      }
    }

    .round-badge {
      background: #F7EFE6;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 15px;
      color: #9F7C5F;
      border: 1.5px solid #EDDDCF;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .round-badge i {
      color: #D9A066;
    }

    /* 主舞台 - 紧凑 */
    .mic-stage {
      background: linear-gradient(135deg, #FEF9F2 0%, #FCF4EA 100%);
      border-radius: 36px;
      padding: 16px 24px 16px;
      margin-bottom: 12px;
      border: 2px solid #F4E5D6;
      box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.8), 0 4px 10px rgba(160, 120, 80, 0.06);
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .character-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .mic-icon {
      font-size: 48px;
      background: linear-gradient(145deg, #F9EDE0, #F3E2D0);
      width: 88px;
      height: 88px;
      border-radius: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 5px 0 #D4BCA4, 0 8px 16px rgba(180, 130, 80, 0.12);
      border: 2.5px solid #EDD9C6;
      color: #A77348;
    }

    .mic-icon.recording {
      box-shadow: 0 5px 0 #D4BCA4, 0 0 0 4px rgba(242, 201, 76, 0.4), 0 8px 16px rgba(180, 130, 80, 0.12);
      animation: recordingPulse 1.5s infinite;
    }

    @keyframes recordingPulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.03);
      }
    }

    .mic-icon:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #D4BCA4, 0 8px 16px rgba(180, 130, 80, 0.12);
    }

    .target-sound {
      font-size: 42px;
      font-weight: 800;
      background: linear-gradient(145deg, #FFFAF2, #FEF5EA);
      padding: 6px 32px;
      border-radius: 52px;
      display: inline-block;
      letter-spacing: 4px;
      color: #CF9F6E;
      border: 2.5px solid #F3E2D0;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 3px 0 #E6D3C0;
    }

    .target-sound:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #E6D3C0;
    }

    .listen-hint {
      font-size: 14px;
      font-weight: 600;
      color: #B58253;
      background: #FEF2E4;
      padding: 8px 22px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.15s;
      border: 2px solid #F0DDCB;
    }

    .listen-hint i {
      color: #D9A066;
      font-size: 14px;
    }

    .voice-action {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin: 6px 0 8px;
    }

    .volume-meter {
      width: 65%;
      background: #F0E2D4;
      border-radius: 30px;
      height: 8px;
      overflow: hidden;
    }

    .volume-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #D9A56C, #E8B88A);
      border-radius: 30px;
      transition: width 0.05s linear;
    }

    .success-message {
      font-size: 14px;
      color: #7F9A6B;
      background: #E8F0D8;
      padding: 6px 20px;
      border-radius: 32px;
      text-align: center;
      font-weight: 600;
      border: 1.5px solid #B8D4A3;
      display: inline-block;
      margin: 0 auto;
    }

    /* 进度区域 - 紧凑 */
    .game-progress {
      background: linear-gradient(135deg, #FBF5ED, #F8EFE4);
      border-radius: 32px;
      padding: 12px 18px;
      border: 2px solid #F0DDCB;
      flex-shrink: 0;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .progress-info {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      color: #8F6A44;
      font-size: 14px;
    }

    .progress-info i {
      color: #D9A066;
    }

    .action-buttons {
      display: flex;
      gap: 6px;
    }

    .action-btn {
      background: #F0E2D4;
      border: none;
      padding: 6px 16px;
      border-radius: 36px;
      font-weight: 600;
      font-size: 13px;
      color: #8B6A4C;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      border: 1.5px solid #E6D2C0;
      transition: all 0.15s;
    }

    .action-btn:active {
      background: #E4D2BF;
      transform: scale(0.97);
    }

    .action-btn.end-btn {
      background: #EAD1BB;
      border-color: #DDBB9A;
      color: #6C4E32;
    }

    .progress-bar-bg {
      background: #EADDCB;
      border-radius: 24px;
      height: 7px;
      margin: 6px 0;
    }

    .progress-fill {
      width: 0%;
      background: linear-gradient(90deg, #D9A56C, #E8B88A);
      border-radius: 24px;
      height: 100%;
      transition: width 0.3s;
    }

    .next-btn {
      background: linear-gradient(145deg, #F0E2D4, #E8D6C2);
      border: none;
      width: 100%;
      padding: 11px;
      border-radius: 44px;
      font-weight: 700;
      font-size: 15px;
      color: #AA784C;
      margin-top: 6px;
      cursor: pointer;
      border: 2px solid #E6D2C0;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 3px 0 #C6AA8A;
    }

    .next-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #C6AA8A;
    }

    .next-btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    /* 浮动提示 */
    .feedback-toast {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #FEF3E2;
      backdrop-filter: blur(8px);
      padding: 8px 22px;
      border-radius: 48px;
      font-weight: 600;
      color: #B4753E;
      font-size: 14px;
      z-index: 200;
      box-shadow: 0 6px 16px rgba(100, 70, 30, 0.12);
      border: 2px solid #FFE4CA;
      pointer-events: none;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* 确认弹窗 */
    .confirm-modal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 250;
      opacity: 0;
      visibility: hidden;
      transition: 0.2s;
      border-radius: 48px;
    }

    .confirm-modal.show {
      opacity: 1;
      visibility: visible;
    }

    .confirm-card {
      background: #FFFCF5;
      border-radius: 40px;
      padding: 24px 32px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      box-shadow: 0 30px 40px -16px rgba(95, 62, 42, 0.2);
      border: 2px solid #FFE9D4;
    }

    .confirm-icon {
      font-size: 46px;
      color: #E8B88A;
      margin-bottom: 12px;
    }

    .confirm-title {
      font-size: 20px;
      font-weight: 700;
      color: #6C4F32;
      margin-bottom: 8px;
    }

    .confirm-message {
      font-size: 14px;
      color: #9B846C;
      margin-bottom: 20px;
    }

    .confirm-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .confirm-btn {
      background: #F0E2D4;
      border: none;
      padding: 10px 28px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 15px;
      color: #8B6A4C;
      cursor: pointer;
      border: 1.5px solid #E6D2C0;
      transition: all 0.15s;
      flex: 1;
    }

    .confirm-btn.primary {
      background: #EAD1BB;
      border-color: #DDBB9A;
      color: #6C4E32;
    }

    /* 成绩弹窗 */
    .result-modal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 260;
      opacity: 0;
      visibility: hidden;
      transition: 0.2s;
      border-radius: 48px;
    }

    .result-modal.show {
      opacity: 1;
      visibility: visible;
    }

    .modal-card {
      background: #FFFCF5;
      border-radius: 44px;
      padding: 24px 36px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 30px 40px -16px rgba(95, 62, 42, 0.2);
      border: 2px solid #FFE9D4;
    }

    .modal-title {
      font-size: 24px;
      font-weight: 800;
      color: #7C5F48;
      margin-bottom: 14px;
    }

    .success-count {
      font-size: 52px;
      font-weight: 900;
      color: #7F9A6B;
      margin: 10px 0;
    }

    .modal-btn {
      background: #EAD1BB;
      border: none;
      padding: 12px 24px;
      border-radius: 44px;
      font-weight: 700;
      font-size: 15px;
      color: #6F4E34;
      cursor: pointer;
      margin-top: 12px;
      border: 2px solid #DDBB9A;
      width: 100%;
    }

    .modal-btn.secondary {
      background: #F0E2D4;
      margin-top: 8px;
    }

    button {
      font-family: inherit;
    }
  </style>
</head>

<body>
  <div class="mic-game">
    <div class="game-inner">
      <!-- 头部 -->
      <div class="game-header">
        <div class="left-header">
          <button class="home-btn" id="homeBtn"><i class="fas fa-home"></i></button>
          <div class="title-wrapper">
            <i class="fas fa-microphone-alt"></i>
            <h2>声音小话筒</h2>
            <button class="speaker-btn" id="speakBtn" title="朗读提示"><i class="fas fa-volume-up"></i></button>
          </div>
        </div>
        <div class="round-badge">
          <i class="fas fa-list-ul"></i>
          第 <span id="currentRound">1</span>/<span id="totalRounds">8</span>
        </div>
      </div>

      <!-- 主舞台 -->
      <div class="mic-stage">
        <div class="character-area">
          <div class="mic-icon" id="micIcon">
            <i class="fas fa-microphone-alt"></i>
          </div>
          <div class="target-sound" id="targetSound">a — 啊</div>
          <div class="listen-hint" id="listenHint">
            <i class="fas fa-volume-up"></i>
            <span id="hintText">🐱 小猫咪想听你学 "a" ～</span>
          </div>
        </div>

        <div class="voice-action">
          <div class="volume-meter">
            <div class="volume-fill" id="volumeFill"></div>
          </div>
          <div id="successIndicator" style="min-height: 36px;"></div>
        </div>
      </div>

      <!-- 进度区域 -->
      <div class="game-progress">
        <div class="stats-row">
          <div class="progress-info">
            <i class="fas fa-check-circle" style="color:#7F9A6B;"></i>
            <span>成功 <span id="successCount">0</span>/<span id="totalSuccess">8</span></span>
          </div>
          <div class="action-buttons">
            <button class="action-btn" id="skipBtn">
              <i class="fas fa-forward"></i> 跳过
            </button>
            <button class="action-btn end-btn" id="endBtn">
              <i class="fas fa-flag-checkered"></i> 结束
            </button>
          </div>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <button class="next-btn" id="nextBtn">
          🎤 下一个声音 <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- 确认弹窗 -->
    <div class="confirm-modal" id="confirmModal">
      <div class="confirm-card">
        <div class="confirm-icon"><i class="fas fa-question-circle"></i></div>
        <div class="confirm-title" id="confirmTitle">确定吗？</div>
        <div class="confirm-message" id="confirmMessage"></div>
        <div class="confirm-buttons">
          <button class="confirm-btn" id="confirmCancel">取消</button>
          <button class="confirm-btn primary" id="confirmOk">确定</button>
        </div>
      </div>
    </div>

    <!-- 成绩弹窗 -->
    <div class="result-modal" id="resultModal">
      <div class="modal-card">
        <div class="modal-title"><i class="fas fa-trophy"></i> 练习完成</div>
        <div style="font-size: 15px; color: #8F6A44;">成功发声次数</div>
        <div class="success-count" id="finalSuccess">0</div>
        <div style="font-size: 14px; color: #9B846C;">完成 <span id="completedRounds">0</span>/8 轮</div>
        <button class="modal-btn" id="restartBtn">重新开始</button>
        <button class="modal-btn secondary" id="homeBtn2">返回主页</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      // ========== TTS 语音播报 ==========
      const VoiceSpeaker = {
        synth: window.speechSynthesis,
        speaking: false,
        getChineseVoice() {
          const voices = this.synth.getVoices();
          return voices.find(v => v.lang.includes('zh')) || voices[0];
        },
        speak(text, onEnd = null) {
          this.stop();
          const u = new SpeechSynthesisUtterance(text);
          u.voice = this.getChineseVoice();
          u.lang = 'zh-CN';
          u.rate = 0.9;
          u.pitch = 1.2;
          this.speaking = true;
          document.getElementById('speakBtn')?.classList.add('speaking');
          u.onend = u.onerror = () => {
            this.speaking = false;
            document.getElementById('speakBtn')?.classList.remove('speaking');
            if (onEnd) onEnd();
          };
          this.synth.speak(u);
        },
        stop() {
          if (this.synth.speaking) this.synth.cancel();
          this.speaking = false;
          document.getElementById('speakBtn')?.classList.remove('speaking');
        }
      };

      // 8轮数据
      const library = [
        { text: "a", display: "a — 啊", hint: "张开小嘴巴～", full: "小猫咪想听你学 a ～ 张开小嘴巴" },
        { text: "o", display: "o — 喔", hint: "圆圆的嘴巴～", full: "小猫咪想听你学 o ～ 圆圆的嘴巴" },
        { text: "e", display: "e — 鹅", hint: "嘴巴扁扁～", full: "小猫咪想听你学 e ～ 嘴巴扁扁" },
        { text: "ma", display: "ma — 妈", hint: "轻轻说妈～", full: "小猫咪想听你学 ma ～ 轻轻说妈" },
        { text: "ba", display: "ba — 爸", hint: "试试 ba～", full: "小猫咪想听你学 ba ～ 试试 ba" },
        { text: "wu", display: "wu — 呜", hint: "小火车呜～", full: "小猫咪想听你学 wu ～ 小火车呜呜" },
        { text: "yi", display: "yi — 衣", hint: "衣服的衣～", full: "小猫咪想听你学 yi ～ 衣服的衣" },
        { text: "yu", display: "yu — 鱼", hint: "小鱼游游～", full: "小猫咪想听你学 yu ～ 小鱼游游" }
      ];

      const TOTAL = 8;
      let idx = 0;
      let successCount = 0;
      let hasSucceeded = false;
      let stream = null;
      let audioCtx = null;
      let analyser = null;
      let source = null;
      let listening = false;
      let loop = null;
      let active = true;
      let confirmCallback = null;
      let autoNextTimer = null;

      // DOM
      const target = document.getElementById('targetSound');
      const hint = document.getElementById('hintText');
      const volume = document.getElementById('volumeFill');
      const successSpan = document.getElementById('successCount');
      const curRound = document.getElementById('currentRound');
      const progress = document.getElementById('progressFill');
      const nextBtn = document.getElementById('nextBtn');
      const micIcon = document.getElementById('micIcon');
      const successIndicator = document.getElementById('successIndicator');
      const confirmModal = document.getElementById('confirmModal');
      const confirmTitle = document.getElementById('confirmTitle');
      const confirmMsg = document.getElementById('confirmMessage');
      const resultModal = document.getElementById('resultModal');
      const finalSuccess = document.getElementById('finalSuccess');
      const completed = document.getElementById('completedRounds');
      const totalSuccessSpan = document.getElementById('totalSuccess');

      document.getElementById('totalRounds').innerText = TOTAL;
      totalSuccessSpan.innerText = TOTAL;

      function showToast(msg, bg = '#FEF3E2') {
        let t = document.querySelector('.feedback-toast');
        if (t) t.remove();
        t = document.createElement('div');
        t.className = 'feedback-toast';
        t.innerHTML = `<i class="fas fa-microphone"></i> ${msg}`;
        t.style.background = bg;
        document.querySelector('.mic-game').appendChild(t);
        setTimeout(() => t.remove(), 1500);
      }

      function stopRecord() {
        if (listening) {
          listening = false;
          micIcon.classList.remove('recording');
          if (loop) { cancelAnimationFrame(loop); loop = null; }
        }
        if (autoNextTimer) { clearTimeout(autoNextTimer); autoNextTimer = null; }
      }

      async function startRecord() {
        if (listening || !active || hasSucceeded) return;

        if (!audioCtx) {
          try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            const data = new Uint8Array(analyser.frequencyBinCount);
            source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            startMeter(analyser, data);
          } catch {
            showToast('需要麦克风权限', '#FCE8E8');
            return;
          }
        }

        listening = true;
        micIcon.classList.add('recording');
        showToast('🎤 正在听你发声！');
      }

      function startMeter(a, d) {
        if (loop) cancelAnimationFrame(loop);
        function update() {
          if (!a || !listening || !active) { loop = requestAnimationFrame(update); return; }
          a.getByteTimeDomainData(d);
          let max = 0;
          for (let i = 0; i < d.length; i++) max = Math.max(max, Math.abs((d[i] - 128) / 128));
          volume.style.width = Math.min(100, max * 250) + '%';

          if (max > 0.12 && listening && !hasSucceeded && active) {
            handleSuccess();
          }
          loop = requestAnimationFrame(update);
        }
        loop = requestAnimationFrame(update);
      }

      function handleSuccess() {
        if (hasSucceeded || !active) return;

        hasSucceeded = true;
        successCount++;
        successSpan.innerText = successCount;
        stopRecord();

        successIndicator.innerHTML = '<div class="success-message"><i class="fas fa-check-circle"></i> 太棒了！发声成功！</div>';
        showToast('🎉 发声成功！', '#E8F0D8');
        VoiceSpeaker.speak('太棒了！');

        autoNextTimer = setTimeout(() => {
          if (active) nextRound();
        }, 1200);
      }

      function speakHint() {
        if (!active) return;
        VoiceSpeaker.speak(library[idx].full, () => {
          if (active && !hasSucceeded) startRecord();
        });
      }

      function updateDisplay() {
        if (!active) return;

        const item = library[idx];
        target.innerText = item.display;
        hint.innerHTML = `🐱 小猫咪想听你学 "${item.text}" ～ ${item.hint}`;
        hasSucceeded = false;
        successIndicator.innerHTML = '';
        volume.style.width = '0%';
        progress.style.width = `${(idx / TOTAL) * 100}%`;
        curRound.innerText = idx + 1;
        nextBtn.disabled = false;
        stopRecord();
        speakHint();
      }

      function nextRound() {
        if (!active) return;

        stopRecord();

        if (idx + 1 < TOTAL) {
          idx++;
          updateDisplay();
          showToast(`🌟 新挑战：${library[idx].display}`);
        } else {
          finish();
        }
      }

      function skipRound() {
        if (!active) return;

        stopRecord();
        VoiceSpeaker.stop();

        if (idx + 1 < TOTAL) {
          idx++;
          updateDisplay();
          showToast(`⏩ 已跳过本轮`);
        } else {
          finish();
        }
      }

      function finish() {
        if (!active) return;
        active = false;
        stopRecord();
        VoiceSpeaker.stop();

        progress.style.width = '100%';
        finalSuccess.innerText = successCount;
        completed.innerText = idx + 1;
        resultModal.classList.add('show');
        nextBtn.disabled = true;
      }

      function reset() {
        active = true;
        idx = 0;
        successCount = 0;
        hasSucceeded = false;
        successSpan.innerText = '0';
        updateDisplay();
        progress.style.width = '0%';
        resultModal.classList.remove('show');
        hideConfirm();
      }

      function goHome() {
        window.location.href = 'mainPart.html';
      }

      function showConfirm(title, msg, onOk) {
        confirmTitle.innerText = title;
        confirmMsg.innerText = msg;
        confirmCallback = onOk;
        confirmModal.classList.add('show');
      }

      function hideConfirm() {
        confirmModal.classList.remove('show');
        confirmCallback = null;
      }

      // 事件绑定
      document.getElementById('homeBtn').onclick = () => {
        VoiceSpeaker.stop();
        stopRecord();
        showConfirm('返回主页', '返回主页将结束当前游戏，确定吗？', () => { hideConfirm(); goHome(); });
      };

      document.getElementById('nextBtn').onclick = () => {
        if (!active) return;
        stopRecord();
        VoiceSpeaker.stop();
        nextRound();
      };

      document.getElementById('skipBtn').onclick = () => {
        VoiceSpeaker.stop();
        skipRound();
      };

      document.getElementById('endBtn').onclick = () => {
        VoiceSpeaker.stop();
        stopRecord();
        showConfirm('结束练习', '确定要结束练习并查看成绩吗？', () => { hideConfirm(); finish(); });
      };

      document.getElementById('speakBtn').onclick = () => {
        stopRecord();
        VoiceSpeaker.stop();
        speakHint();
      };

      document.getElementById('listenHint').onclick = () => {
        stopRecord();
        VoiceSpeaker.stop();
        speakHint();
      };

      target.onclick = () => {
        stopRecord();
        VoiceSpeaker.speak(library[idx].text, () => {
          if (active && !hasSucceeded) startRecord();
        });
      };

      micIcon.onclick = () => {
        if (listening) {
          stopRecord();
          showToast('录音已停止');
        } else {
          stopRecord();
          speakHint();
        }
      };

      document.getElementById('confirmCancel').onclick = hideConfirm;

      document.getElementById('confirmOk').onclick = () => {
        if (confirmCallback) confirmCallback();
        hideConfirm();
      };

      document.getElementById('restartBtn').onclick = () => {
        resultModal.classList.remove('show');
        reset();
      };

      document.getElementById('homeBtn2').onclick = () => {
        resultModal.classList.remove('show');
        goHome();
      };

      // 初始化
      updateDisplay();
      window.speechSynthesis.getVoices();

      window.addEventListener('beforeunload', () => {
        VoiceSpeaker.stop();
        stopRecord();
        if (stream) stream.getTracks().forEach(t => t.stop());
        if (audioCtx) audioCtx.close();
      });
    })();
  </script>
</body>

</html>
