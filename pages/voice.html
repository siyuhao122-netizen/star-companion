<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星伴 · 声音小话筒 | 发声启蒙游戏</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../css/voice.css">
</head>

<body>
  <div class="mic-game">
    <div class="game-inner">
      <!-- 头部 -->
      <div class="game-header">
        <div class="left-header">
          <button class="home-btn" id="homeBtn"><i class="fas fa-home"></i></button>
          <div class="title-wrapper">
            <i class="fas fa-microphone-alt"></i>
            <h2>声音小话筒</h2>
            <button class="speaker-btn" id="speakBtn" title="朗读提示"><i class="fas fa-volume-up"></i></button>
          </div>
        </div>
        <div class="round-badge">
          <i class="fas fa-list-ul"></i>
          第 <span id="currentRound">1</span>/<span id="totalRounds">8</span>
        </div>
      </div>

      <!-- 主舞台 -->
      <div class="mic-stage">
        <div class="character-area">
          <div class="mic-icon" id="micIcon">
            <i class="fas fa-microphone-alt"></i>
          </div>
          <div class="target-sound" id="targetSound">a — 啊</div>
          <div class="listen-hint" id="listenHint">
            <i class="fas fa-volume-up"></i>
            <span id="hintText">🐱 小猫咪想听你学 "a" ～</span>
          </div>
        </div>

        <div class="voice-action">
          <div class="volume-meter">
            <div class="volume-fill" id="volumeFill"></div>
          </div>
          <div id="successIndicator" style="min-height: 36px;"></div>
        </div>
      </div>

      <!-- 进度区域 -->
      <div class="game-progress">
        <div class="stats-row">
          <div class="progress-info">
            <i class="fas fa-check-circle" style="color:#7F9A6B;"></i>
            <span>成功 <span id="successCount">0</span>/<span id="totalSuccess">8</span></span>
          </div>
          <div class="action-buttons">
            <button class="action-btn" id="skipBtn">
              <i class="fas fa-forward"></i> 跳过
            </button>
            <button class="action-btn end-btn" id="endBtn">
              <i class="fas fa-flag-checkered"></i> 结束
            </button>
          </div>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <button class="next-btn" id="nextBtn">
          🎤 下一个声音 <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </div>

    <!-- 确认弹窗 -->
    <div class="confirm-modal" id="confirmModal">
      <div class="confirm-card">
        <div class="confirm-icon"><i class="fas fa-question-circle"></i></div>
        <div class="confirm-title" id="confirmTitle">确定吗？</div>
        <div class="confirm-message" id="confirmMessage"></div>
        <div class="confirm-buttons">
          <button class="confirm-btn" id="confirmCancel">取消</button>
          <button class="confirm-btn primary" id="confirmOk">确定</button>
        </div>
      </div>
    </div>

    <!-- 训练报告弹窗 -->
    <div class="result-modal" id="resultModal">
      <div class="modal-card" style="max-width: 560px;">
        <div class="modal-title">🎤 声音小话筒 · 训练报告</div>
        <div class="stats-grid" style="grid-template-columns: repeat(4,1fr);">
    <div class="stat-item"><div class="stat-label">总轮数</div><div class="stat-value" id="finalTotalRounds">8</div></div>
    <div class="stat-item"><div class="stat-label">成功次数</div><div class="stat-value" id="finalSuccessCount">0</div></div>
    <div class="stat-item"><div class="stat-label">成功率</div><div class="stat-value" id="finalSuccessRate">0%</div></div>
    <div class="stat-item"><div class="stat-label">有声音轮次</div><div class="stat-value" id="finalVoiceRoundCount">0</div></div>
    <div class="stat-item"><div class="stat-label">关键词次数</div><div class="stat-value" id="finalKeywordCount">0</div></div>
    <div class="stat-item"><div class="stat-label">完成轮数</div><div class="stat-value" id="finalCompletedRounds">0</div></div>
    <div class="stat-item"><div class="stat-label">平均用时</div><div class="stat-value" id="finalAvgTime">—<span class="stat-unit">秒</span></div></div>
    <div class="stat-item"><div class="stat-label">最快用时</div><div class="stat-value" id="finalMinTime">—<span class="stat-unit">秒</span></div></div>
    <div class="stat-item"><div class="stat-label">最慢用时</div><div class="stat-value" id="finalMaxTime">—<span class="stat-unit">秒</span></div></div>
    <div class="stat-item"><div class="stat-label">反应稳定性</div><div class="stat-value" id="finalStdDev">—<span class="stat-unit">秒</span></div></div>
    <div class="stat-item"><div class="stat-label">平均分贝</div><div class="stat-value" id="finalAvgDB">—<span class="stat-unit">dB</span></div></div>
</div>
        <div class="analysis-area">
          <div class="analysis-title"><i class="fas fa-robot"></i> 智能分析</div>
          <div class="analysis-text" id="analysisText">正在生成分析…</div>
        </div>
        <div class="single-button">
          <button class="modal-btn" id="restartBtn">🔄 重新开始</button>
          <button class="modal-btn secondary" id="homeBtn2">🏠 返回主页</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/voice.js"></script>
</body>

</html>
