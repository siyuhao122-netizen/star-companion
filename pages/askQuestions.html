<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星伴 · 问卷筛查 | 暖心评估</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #D9CBBF;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
      padding: 12px;
    }

    .survey-container {
      width: 1024px;
      height: 600px;
      background: #FFFDF9;
      border-radius: 48px;
      box-shadow: 0 30px 40px -20px rgba(60, 40, 28, 0.3), 0 0 0 1px rgba(235, 216, 190, 0.6);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* 头部 */
    .survey-header {
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1.5px solid #F0DDCB;
      flex-shrink: 0;
      background: #FFFDF9;
    }

    .header-title {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .header-title i {
      font-size: 26px;
      color: #D9A066;
    }

    .header-title h1 {
      font-size: 24px;
      font-weight: 800;
      color: #6C4F32;
    }

    .header-title span {
      font-size: 13px;
      color: #B89A78;
    }

    .progress-badge {
      background: #FDF5EC;
      padding: 8px 22px;
      border-radius: 40px;
      font-size: 15px;
      font-weight: 600;
      color: #B47C44;
      border: 1px solid #F0E0D0;
    }

    .progress-badge i {
      margin-right: 6px;
    }

    /* 滚动区域 */
    .survey-main {
      flex: 1;
      overflow-y: auto;
      padding: 20px 32px 70px 32px;
      scrollbar-width: thin;
    }

    .survey-main::-webkit-scrollbar {
      width: 5px;
    }

    .survey-main::-webkit-scrollbar-track {
      background: #F2EBE0;
      border-radius: 10px;
    }

    .survey-main::-webkit-scrollbar-thumb {
      background: #D9CAB5;
      border-radius: 10px;
    }

    /* 问题卡片 */
    .question-card {
      background: #FFFFFF;
      border-radius: 32px;
      padding: 24px 28px;
      margin-bottom: 20px;
      box-shadow: 0 4px 16px rgba(80, 55, 35, 0.06);
      border: 1px solid #F0E5DA;
    }

    .question-number {
      display: inline-block;
      background: #F8F0E8;
      color: #D9A066;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 14px;
      border-radius: 30px;
      margin-bottom: 14px;
    }

    .question-text {
      font-size: 20px;
      font-weight: 700;
      color: #4A3220;
      line-height: 1.4;
      margin-bottom: 24px;
    }

    /* 选项竖向排列 */
    .options-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #FEFCF9;
      border: 1.5px solid #F0DDCB;
      border-radius: 60px;
      padding: 14px 24px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .option-btn:hover {
      border-color: #D9A066;
      background: #FFFDFA;
      transform: translateX(2px);
    }

    .option-btn.selected {
      background: #FDF5EC;
      border-color: #D9A066;
      box-shadow: 0 2px 10px rgba(217, 160, 102, 0.12);
    }

    .option-main {
      font-size: 17px;
      font-weight: 700;
      color: #6C4F32;
    }

    .option-sub {
      font-size: 13px;
      color: #B89A78;
    }

    .option-btn.selected .option-main {
      color: #D9A066;
    }

    /* 按钮组 */
    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 16px;
    }

    .nav-btn {
      min-width: 140px;
      padding: 12px 24px;
      border: none;
      border-radius: 60px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .nav-btn.primary {
      background: linear-gradient(145deg, #EAD1BB, #DFC4A8);
      color: #6C4E32;
      box-shadow: 0 4px 0 #C6AA8A;
      border: 1px solid #DDBB9A;
    }

    .nav-btn.primary:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #C6AA8A;
    }

    .nav-btn.primary:disabled {
      opacity: 0.5;
      transform: none;
      cursor: not-allowed;
    }

    .nav-btn.secondary {
      background: #F5EDE4;
      color: #8B6A4C;
      border: 1px solid #E6D2C0;
    }

    .nav-btn.secondary:active {
      background: #E8D9CA;
    }

    /* 结果页面 - 紧凑集中 */
    .result-card {
      background: #FFFFFF;
      border-radius: 32px;
      padding: 24px 28px;
      box-shadow: 0 4px 20px rgba(80, 55, 35, 0.08);
      border: 1px solid #F0E5DA;
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #F0E5DA;
    }

    .result-icon {
      font-size: 52px;
    }

    .result-level {
      flex: 1;
    }

    .result-level-label {
      font-size: 13px;
      color: #B89A78;
      margin-bottom: 4px;
    }

    .result-level-text {
      font-size: 28px;
      font-weight: 800;
    }

    .level-low {
      color: #9BBF7A;
    }

    .level-medium {
      color: #D9A066;
    }

    .level-high {
      color: #D4A0A0;
    }

    .result-summary {
      background: #FEFAF5;
      padding: 14px 20px;
      border-radius: 24px;
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.55;
      color: #5E422C;
      border-left: 5px solid #D9A066;
    }

    .suggestion-title {
      font-weight: 700;
      color: #6C4F32;
      font-size: 16px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .suggestion-grid {
      display: flex;
      gap: 14px;
      margin-bottom: 20px;
    }

    .suggestion-item {
      flex: 1;
      background: #FEFCF9;
      padding: 14px 10px;
      border-radius: 22px;
      border: 1px solid #F0E5DA;
      text-align: center;
    }

    .suggestion-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .suggestion-item strong {
      display: block;
      font-size: 14px;
      color: #4A3220;
      margin-bottom: 6px;
    }

    .suggestion-item p {
      font-size: 12px;
      color: #8F7357;
      line-height: 1.4;
    }

    .result-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .result-btn {
      flex: 1;
      max-width: 170px;
      padding: 12px 0;
      border: none;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .result-btn.primary {
      background: linear-gradient(145deg, #EAD1BB, #DFC4A8);
      color: #6C4E32;
      box-shadow: 0 3px 0 #C6AA8A;
    }

    .result-btn.primary:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #C6AA8A;
    }

    .result-btn.secondary {
      background: #F5EDE4;
      color: #8B6A4C;
      border: 1px solid #E6D2C0;
    }

    /* 底部导航 */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #FFFDF9;
      border-top: 1px solid #EFE4D8;
      padding: 12px 0 16px;
      z-index: 100;
    }

    .nav-items {
      display: flex;
      justify-content: space-around;
      max-width: 800px;
      margin: 0 auto;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-item i {
      font-size: 24px;
      color: #B7A089;
    }

    .nav-item span {
      font-size: 12px;
      font-weight: 600;
      color: #A68A6F;
    }

    .nav-item.active i,
    .nav-item.active span {
      color: #D9A066;
    }

    .nav-item:active {
      transform: scale(0.95);
    }

    .toast-msg {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #FEF3E2;
      padding: 10px 24px;
      border-radius: 48px;
      font-weight: 600;
      color: #B4753E;
      z-index: 200;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      border: 1px solid #FFE4CA;
      font-size: 13px;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="survey-container">
    <div class="survey-header">
      <div class="header-title">
        <i class="fas fa-clipboard-list"></i>
        <h1>问卷筛查</h1>
        <span>M-CHAT评估</span>
      </div>
      <div class="progress-badge" id="progressText">
        <i class="far fa-question-circle"></i> 第 1 / 23 题
      </div>
    </div>

    <div class="survey-main" id="surveyMain">
      <div id="questionArea"></div>
      <div id="resultArea" style="display:none;"></div>
    </div>

    <div class="bottom-nav">
      <div class="nav-items">
        <div class="nav-item" data-nav="home"><i class="fas fa-home"></i><span>首页</span></div>
        <div class="nav-item" data-nav="dashboard"><i class="fas fa-chart-bar"></i><span>数据看板</span></div>
        <div class="nav-item" data-nav="treehole"><i class="fas fa-tree"></i><span>家长树洞</span></div>
        <div class="nav-item active" data-nav="survey"><i class="fas fa-clipboard-list"></i><span>问卷筛查</span></div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const questions = [
        "喜欢被您放在膝上做摇摆、蹦跳吗？",
        "对其他孩子有兴趣吗？",
        "喜欢爬上爬下（如上楼梯）吗？",
        "喜欢藏猫猫或捉迷藏的游戏吗？",
        "会假装做事吗？（如打电话、照顾洋娃娃）",
        "曾用食指指着东西，要求要某样东西吗？",
        "曾用食指指着东西，表示对某样东西有兴趣吗？",
        "会正确玩小玩具（如车子、积木），而不是乱放或丢掉？",
        "曾经拿东西给您（父母）看吗？",
        "看着您的眼睛超过一两秒吗？",
        "曾经看起来对噪音特别敏感（如捂住耳朵）吗？",
        "看着您的脸或笑容时，会以微笑回应吗？",
        "会模仿您吗？（如您做鬼脸，孩子也会模仿）",
        "当您叫孩子的名字时，会有反应吗？",
        "如果您指着房间另一头的玩具，孩子会看那个玩具吗？",
        "孩子会走路吗？",
        "会看您正在看的东西吗？",
        "会在脸附近做一些不同寻常的手指动作吗？",
        "会设法吸引您看他/她自己的活动吗？",
        "您是否曾经怀疑孩子听力有问题？",
        "孩子理解别人说的话吗？",
        "有时候会无目标地凝视或无目的地走来走去吗？",
        "碰到不熟悉的事物时会看着您的脸，看看您的反应吗？"
      ];

      const freqOptions = [
        { main: "偶尔", sub: "很少出现", value: 0 },
        { main: "有时", sub: "偶尔出现", value: 1 },
        { main: "经常", sub: "频繁出现", value: 2 }
      ];
      const yesNoOptions = [
        { main: "是", sub: "能做到", value: 1 },
        { main: "否", sub: "还不会", value: 0 }
      ];

      let currentIndex = 0;
      let answers = new Array(23).fill(null);
      const total = questions.length;

      const surveyMain = document.getElementById('surveyMain');
      const questionArea = document.getElementById('questionArea');
      const resultArea = document.getElementById('resultArea');
      const progressSpan = document.getElementById('progressText');

      function showToast(msg) {
        let old = document.querySelector('.toast-msg');
        if (old) old.remove();
        let div = document.createElement('div');
        div.className = 'toast-msg';
        div.innerHTML = `<i class="fas fa-heart"></i> ${msg}`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2000);
      }

      function updateProgressUI() {
        progressSpan.innerHTML = `<i class="far fa-question-circle"></i> 第 ${currentIndex + 1} / ${total} 题`;
      }

      function renderCurrentQuestion() {
        const isSpecial = (currentIndex === 15);
        const opts = isSpecial ? yesNoOptions : freqOptions;
        const currentVal = answers[currentIndex];

        let optionsHtml = '';
        opts.forEach(opt => {
          const isSelected = (currentVal === opt.value);
          optionsHtml += `
          <div class="option-btn ${isSelected ? 'selected' : ''}" data-val="${opt.value}">
            <span class="option-main">${opt.main}</span>
            <span class="option-sub">${opt.sub}</span>
          </div>
        `;
        });

        const html = `
        <div class="question-card">
          <div class="question-number">问题 ${currentIndex + 1}</div>
          <div class="question-text">${questions[currentIndex]}</div>
          <div class="options-group" id="optionsGroup">
            ${optionsHtml}
          </div>
        </div>
        <div class="nav-buttons">
          ${currentIndex > 0 ? `<button class="nav-btn secondary" id="prevBtn"><i class="fas fa-arrow-left"></i> 上一题</button>` : ''}
          <button class="nav-btn primary" id="nextBtn">${currentIndex === total - 1 ? '完成评估' : '下一题'} <i class="fas fa-arrow-right"></i></button>
        </div>
      `;

        questionArea.innerHTML = html;
        questionArea.style.display = 'block';
        resultArea.style.display = 'none';
        updateProgressUI();
        surveyMain.scrollTop = 0;

        document.querySelectorAll('.option-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const val = parseInt(btn.dataset.val);
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            answers[currentIndex] = val;
            const nextBtn = document.getElementById('nextBtn');
            if (nextBtn) nextBtn.disabled = false;
          });
        });

        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) {
          nextBtn.disabled = (answers[currentIndex] === null);
          nextBtn.addEventListener('click', () => {
            if (answers[currentIndex] === null) {
              showToast('请选择一个选项再继续～');
              return;
            }
            if (currentIndex === total - 1) {
              showResultPage();
            } else {
              currentIndex++;
              renderCurrentQuestion();
            }
          });
        }

        const prevBtn = document.getElementById('prevBtn');
        if (prevBtn) {
          prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
              currentIndex--;
              renderCurrentQuestion();
            }
          });
        }
      }

      function computeResult() {
        let totalScore = 0;
        for (let i = 0; i < total; i++) {
          let val = answers[i];
          if (val !== null) {
            if (i === 15) totalScore += val;
            else totalScore += val;
          }
        }
        const maxScore = 45;
        const percent = (totalScore / maxScore) * 100;
        if (percent >= 58) return { level: '需要关注', levelKey: 'high', icon: '🌸', summary: '孩子在某些行为表现上存在一些需要关注的迹象。建议您记录日常行为，并考虑咨询专业医生。' };
        if (percent >= 32) return { level: '轻微倾向', levelKey: 'medium', icon: '🌱', summary: '孩子表现出一些发展中的小特点。加强亲子互动，多进行眼神和叫名游戏，1-2个月后可再次评估。' };
        return { level: '发展良好', levelKey: 'low', icon: '✨', summary: '孩子的表现与大多数同龄儿童相似。继续保持温暖的陪伴和有趣的互动，让成长充满爱与欢笑。' };
      }

      function getSuggestions(levelKey) {
        if (levelKey === 'high') {
          return [
            { icon: "🏥", title: "专业评估", desc: "尽快咨询发育行为儿科" },
            { icon: "📝", title: "记录日常", desc: "详细记录行为表现" },
            { icon: "🤗", title: "家庭陪伴", desc: "保持耐心与互动" }
          ];
        } else if (levelKey === 'medium') {
          return [
            { icon: "🎯", title: "每日互动", desc: "叫名、指物游戏" },
            { icon: "👀", title: "眼神练习", desc: "平视夸张表情" },
            { icon: "📅", title: "定期复测", desc: "1-2月后再评估" }
          ];
        }
        return [
          { icon: "🎨", title: "丰富探索", desc: "多样玩具与绘本" },
          { icon: "🗣️", title: "语言输入", desc: "多说话多唱歌" },
          { icon: "🏃", title: "户外活动", desc: "每日户外运动" }
        ];
      }

      function showResultPage() {
        const { level, levelKey, icon, summary } = computeResult();
        const suggestions = getSuggestions(levelKey);
        const levelClass = levelKey === 'low' ? 'level-low' : (levelKey === 'medium' ? 'level-medium' : 'level-high');

        const resultHtml = `
        <div class="result-card">
          <div class="result-header">
            <div class="result-icon">${icon}</div>
            <div class="result-level">
              <div class="result-level-label">综合评估</div>
              <div class="result-level-text ${levelClass}">${level}</div>
            </div>
          </div>
          <div class="result-summary">
            ${summary}
            <div style="margin-top: 8px; font-size: 11px; color: #B89A78;"><i class="fas fa-hand-holding-heart"></i> 本筛查仅为参考，不能替代专业诊断。</div>
          </div>
          <div class="suggestion-title"><i class="fas fa-lightbulb"></i> 陪伴建议</div>
          <div class="suggestion-grid">
            ${suggestions.map(s => `
              <div class="suggestion-item">
                <div class="suggestion-icon">${s.icon}</div>
                <strong>${s.title}</strong>
                <p>${s.desc}</p>
              </div>
            `).join('')}
          </div>
          <div class="result-actions">
            <button class="result-btn secondary" id="restartBtn"><i class="fas fa-redo-alt"></i> 重新填写</button>
            <button class="result-btn primary" id="homeBtn"><i class="fas fa-home"></i> 返回主页</button>
          </div>
        </div>
      `;

        questionArea.style.display = 'none';
        resultArea.style.display = 'block';
        resultArea.innerHTML = resultHtml;
        progressSpan.innerHTML = `<i class="fas fa-check-circle"></i> 已完成`;
        surveyMain.scrollTop = 0;

        document.getElementById('restartBtn').addEventListener('click', () => {
          answers = new Array(23).fill(null);
          currentIndex = 0;
          renderCurrentQuestion();
        });
        document.getElementById('homeBtn').addEventListener('click', () => {
          location.href = 'mainPart.html';
        });
      }

      const navs = document.querySelectorAll('.nav-item');
      navs.forEach(nav => {
        nav.addEventListener('click', (e) => {
          e.stopPropagation();
          const to = nav.dataset.nav;
          if (to === 'home') location.href = 'mainPart.html';
          else if (to === 'dashboard') location.href = 'dataLook.html';
          else if (to === 'treehole') location.href = 'seniorHole.html';
          else if (to === 'survey') location.href = 'askQuestions.html';
        });
      });

      renderCurrentQuestion();
    })();
  </script>
</body>

</html>
