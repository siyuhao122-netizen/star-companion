<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星伴 · 问卷筛查 | 暖心评估</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../css/askQuestions.css">
</head>

<body>
  <div class="survey-container">
    <div class="survey-header">
      <div class="header-title">
        <a href="survey-select.html" style="color: #D9A066; margin-right: 12px; text-decoration: none;">
          <i class="fas fa-arrow-left"></i>
        </a>
        <i class="fas fa-clipboard-list"></i>
        <h1 id="surveyTitle">问卷筛查</h1>
        <span id="surveySubtitle">M-CHAT-R</span>
      </div>
      <div class="progress-badge" id="progressText">
        <i class="far fa-question-circle"></i> 第 1 / 20 题
      </div>
    </div>

    <div class="survey-main" id="surveyMain">
      <!-- 加载中 -->
      <div id="loadingArea" style="text-align: center; padding: 60px 20px;">
        <i class="fas fa-spinner fa-spin" style="font-size: 48px; color: #D9A066;"></i>
        <p style="margin-top: 20px; color: #8F6A44;">正在加载问卷...</p>
      </div>
      
      <div id="questionArea" style="display: none;"></div>
      <div id="resultArea" style="display: none;"></div>
      <div id="aiLoadingArea" style="display: none; text-align: center; padding: 40px 20px;">
        <i class="fas fa-robot" style="font-size: 56px; color: #D9A066;"></i>
        <p style="margin-top: 20px; color: #8F6A44; font-size: 16px;">🤖 AI正在分析中，请稍候...</p>
        <p style="margin-top: 8px; color: #B89A78; font-size: 13px;">正在生成专业、温暖的评估报告</p>
        <div style="margin-top: 24px; display: flex; justify-content: center; gap: 8px;">
          <span class="loading-dot" style="width: 8px; height: 8px; background: #D9A066; border-radius: 50%; animation: pulse 1.5s infinite;"></span>
          <span class="loading-dot" style="width: 8px; height: 8px; background: #D9A066; border-radius: 50%; animation: pulse 1.5s infinite 0.3s;"></span>
          <span class="loading-dot" style="width: 8px; height: 8px; background: #D9A066; border-radius: 50%; animation: pulse 1.5s infinite 0.6s;"></span>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <div class="nav-items">
        <div class="nav-item" data-nav="home"><i class="fas fa-home"></i><span>首页</span></div>
        <div class="nav-item" data-nav="dashboard"><i class="fas fa-chart-bar"></i><span>数据看板</span></div>
        <div class="nav-item" data-nav="treehole"><i class="fas fa-tree"></i><span>家长树洞</span></div>
        <div class="nav-item active" data-nav="survey"><i class="fas fa-clipboard-list"></i><span>问卷筛查</span></div>
      </div>
    </div>
  </div>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    
    .ai-report {
      background: #FFFFFF;
      border-radius: 28px;
      padding: 24px 28px;
      box-shadow: 0 4px 20px rgba(80, 55, 35, 0.08);
      border: 1px solid #F0E5DA;
      margin-bottom: 20px;
    }
    
    .ai-report h2 {
      font-size: 20px;
      font-weight: 700;
      color: #5E422C;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .ai-report h3 {
      font-size: 16px;
      font-weight: 700;
      color: #6C4F32;
      margin: 16px 0 12px;
    }
    
    .ai-report p {
      font-size: 14px;
      line-height: 1.7;
      color: #5E422C;
      margin-bottom: 12px;
    }
    
    .ai-report ul, .ai-report ol {
      margin-left: 20px;
      margin-bottom: 16px;
    }
    
    .ai-report li {
      font-size: 14px;
      line-height: 1.7;
      color: #5E422C;
      margin-bottom: 8px;
    }
    
    .dimension-chart {
      display: flex;
      gap: 12px;
      margin: 16px 0;
    }
    
    .dimension-item {
      flex: 1;
      background: #FDF8F2;
      border-radius: 16px;
      padding: 14px 12px;
      text-align: center;
    }
    
    .dimension-name {
      font-size: 13px;
      font-weight: 600;
      color: #6C4F32;
      margin-bottom: 8px;
    }
    
    .dimension-score {
      font-size: 28px;
      font-weight: 800;
      color: #D9A066;
    }
    
    .dimension-max {
      font-size: 12px;
      color: #B89A78;
    }
    
    .risk-badge {
      display: inline-block;
      padding: 6px 20px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 16px;
    }
    
    .risk-low { background: #E8F0D8; color: #6B8C4A; }
    .risk-medium { background: #FDF5EC; color: #D9A066; }
    .risk-high { background: #FCE8E8; color: #C06060; }
    
    .action-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 24px;
    }
    
    .action-btn {
      padding: 12px 28px;
      border-radius: 44px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
      border: none;
    }
    
    .action-btn.primary {
      background: linear-gradient(145deg, #EAD1BB, #DFC4A8);
      color: #6C4E32;
      border: 1.5px solid #DDBB9A;
    }
    
    .action-btn.secondary {
      background: #F5EDE4;
      color: #8B6A4C;
      border: 1.5px solid #E6D2C0;
    }
  </style>

  <script src="../js/askQuestions.js"></script>
</body>

</html>
