<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星伴 · 综合评估报告</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#F5EDE4;
  font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif;
  display:flex;justify-content:center;padding:20px;
}
/* ===== 导出容器：固定 800px 宽度，保证 PDF 与网页一致 ===== */
.report-container{
  width:800px;min-width:800px;max-width:800px;
}
.report-header{
  background:linear-gradient(135deg,#D9A066,#C88B4A);color:#FFF;
  border-radius:16px;padding:24px;text-align:center;margin-bottom:20px;
}
.report-header h1{font-size:22px;margin-bottom:6px}
.report-header p{font-size:13px;opacity:0.9}
.section{
  background:#FFFEFC;border-radius:14px;padding:20px;margin-bottom:16px;
  box-shadow:0 2px 12px rgba(0,0,0,0.04);
}
.section-title{
  font-size:16px;font-weight:700;color:#4D3724;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.section-title i{color:#D9A066}
/* 核心指标：4列固定布局 */
.metric-row{
  display:grid;grid-template-columns:repeat(4,1fr);gap:12px;
}
.metric-item{
  background:#FFFCF5;border-radius:12px;padding:14px;text-align:center;
  border:1px solid #EDD9C6;
}
.metric-item .label{font-size:12px;color:#8F7A64}
.metric-item .value{font-size:24px;font-weight:700;color:#D9A066;margin:4px 0}
.radar-box{display:flex;justify-content:center;align-items:center}
.radar-box canvas{max-width:420px;max-height:420px}
.ai-text{font-size:14px;color:#4D3724;line-height:1.8}
.action-bar{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.btn{padding:12px 28px;border-radius:24px;border:none;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px}
.btn-primary{background:linear-gradient(135deg,#D9A066,#C88B4A);color:#FFF}
.btn-secondary{background:#F5EDE4;color:#5E422C;border:1.5px solid #D4C4B0}
.loading{text-align:center;padding:40px;color:#B89A78}
.error-box{text-align:center;padding:40px;color:#C06060}

/* 分享弹窗 */
.share-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:9999}
.share-overlay.show{display:flex}
.share-modal{background:#FFFEFC;border-radius:20px;padding:28px;width:420px;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,0.2)}
.share-modal h3{font-size:18px;color:#4D3724;margin-bottom:16px}
.share-url-box{background:#F5EDE4;border-radius:10px;padding:12px 16px;font-size:13px;color:#6B5A4A;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:16px;text-align:left}
.share-actions{display:flex;gap:10px;justify-content:center}
.copy-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#5E422C;color:#FFF;padding:10px 24px;border-radius:20px;font-size:14px;z-index:99999;display:none}

/* ===== PDF 导出时锁定雷达图为正方形，防止 html2canvas 拉伸 ===== */
.pdf-exporting .radar-box{
  width:420px!important;height:420px!important;margin:0 auto!important;
}
.pdf-exporting .radar-box canvas{
  width:420px!important;height:420px!important;max-width:420px!important;max-height:420px!important;
}
/* ===== 打印样式 ===== */
@media print {
  .report-container{width:800px!important;min-width:800px!important;max-width:800px!important}
  .metric-row{grid-template-columns:repeat(4,1fr)!important}
}
</style>
</head>
<body>
<div class="report-container" id="reportContainer">
  <div class="loading" id="loadingArea"><i class="fas fa-spinner fa-spin"></i> 正在生成综合评估报告...</div>
</div>

<div class="share-overlay" id="shareOverlay">
  <div class="share-modal">
    <h3><i class="fas fa-share-alt"></i> 分享报告</h3>
    <div class="share-url-box" id="shareUrlBox">点击"生成分享链接"获取分享码</div>
    <div class="share-actions">
      <button class="btn btn-primary" id="copyShareBtn"><i class="fas fa-copy"></i> 复制链接</button>
      <button class="btn btn-secondary" id="closeShareBtn">关闭</button>
    </div>
  </div>
</div>
<div class="copy-toast" id="copyToast"><i class="fas fa-check"></i> 已复制到剪贴板</div>

<script>
(async function(){
    const API_BASE = '/api';
    const params = new URLSearchParams(window.location.search);
    const childId = params.get('childId');
    const games = params.get('games') || 'name,point,mic,emotion';
    const shareCode = params.get('code');
    let verifiedChildId = childId;
    let verifiedGames = games;

    if (shareCode && !childId) {
        try {
            const vResp = await fetch(`${API_BASE}/share/verify?code=${encodeURIComponent(shareCode)}`);
            const vData = await vResp.json();
            if (vData.success) {
                verifiedChildId = vData.data.child_id;
                verifiedGames = vData.data.games || 'name,point,mic,emotion';
            } else {
                document.getElementById('loadingArea').innerHTML = `<div class=error-box><i class="fas fa-lock"></i><p>${vData.message || '分享码无效'}</p><div style="margin-top:12px"><input id="manualCode" placeholder="请输入分享码" style="padding:10px 20px;border:1.5px solid #D9A066;border-radius:24px;font-size:16px;text-align:center;letter-spacing:6px;text-transform:uppercase;width:200px;outline:none"><button onclick="location.href='?code='+document.getElementById('manualCode').value.toUpperCase()" style="padding:10px 28px;border-radius:24px;background:linear-gradient(135deg,#D9A066,#C88B4A);color:#FFF;border:none;font-size:14px;font-weight:600;cursor:pointer"><i class="fas fa-check"></i> 验证</button></div>`;
                return;
            }
        } catch(e) {
            document.getElementById('loadingArea').innerHTML='<div class=error-box><p>网络错误，无法验证分享码</p></div>';
            return;
        }
    } else if (!childId) {
        document.getElementById('loadingArea').innerHTML = `<div style="text-align:center;padding:60px 20px"><i class="fas fa-lock" style="font-size:48px;color:#D9A066;margin-bottom:16px;display:block"></i><p style="margin-bottom:16px;font-size:16px;font-weight:600;color:#4D3724">请输入分享码查看报告</p><div style="display:flex;justify-content:center;gap:8px"><input id="manualCode" placeholder="输入分享码" style="padding:10px 20px;border:1.5px solid #D9A066;border-radius:24px;font-size:16px;text-align:center;letter-spacing:6px;text-transform:uppercase;width:200px;outline:none"><button onclick="location.href='?code='+document.getElementById('manualCode').value.toUpperCase()" style="padding:10px 28px;border-radius:24px;background:linear-gradient(135deg,#D9A066,#C88B4A);color:#FFF;border:none;font-size:14px;font-weight:600;cursor:pointer"><i class="fas fa-check"></i> 验证</button></div><p style="margin-top:16px;font-size:12px;color:#B89A78">向您的康复师或家长索取分享码</p></div>`;
        return;
    }

    try {
        const resp = await fetch(`${API_BASE}/ai/comprehensive-analysis/${verifiedChildId}?games=${verifiedGames}`);
        const d = await resp.json();
        if (!d.success) throw new Error(d.message);

        const data = d.data;
        const gameLabels = { name:'叫名反应', point:'指物练习', mic:'声音小话筒', emotion:'情绪识别' };
        const gameIcons = { name:'fa-ear-deaf', point:'fa-hand-peace', mic:'fa-microphone-alt', emotion:'fa-face-laugh-wink' };
        const glist = (data.games || verifiedGames.split(',')).filter(g => ['name','point','mic','emotion'].includes(g));

        // ======== 构建 HTML 页面 ========
        let html = `<div class="report-header"><h1><i class="fas fa-star"></i> 星伴 · 综合评估报告</h1><p>${data.child_name} · ${data.age_months}个月 · ${new Date().toLocaleDateString('zh-CN')}</p></div>
          <div class="section"><div class="section-title"><i class="fas fa-chart-bar"></i> 核心指标概览</div><div class="metric-row">`;
        glist.forEach((g,i) => {
            const rate = data.radar_data && data.radar_data[i] !== undefined ? data.radar_data[i] : 0;
            html += `<div class="metric-item"><div class="label"><i class="fas ${gameIcons[g]||'fa-star'}"></i> ${gameLabels[g]||g}</div><div class="value">${rate}%</div></div>`;
        });
        html += `</div></div>
          <div class="section"><div class="section-title"><i class="fas fa-compass"></i> 能力雷达图</div><div class="radar-box"><canvas id="radarChart"></canvas></div></div>
          <div class="section"><div class="section-title"><i class="fas fa-robot"></i> AI 综合评估分析</div><div class="ai-text">${(data.ai_analysis || '暂无分析数据').replace(/\n/g,'<br>')}</div></div>
          <div class="action-bar" id="actionBar">
            <button class="btn btn-primary" id="downloadBtn"><i class="fas fa-download"></i> 下载 PDF</button>
            <button class="btn btn-secondary" id="shareBtn"><i class="fas fa-share-alt"></i> 生成分享链接</button>
            <button class="btn btn-secondary" onclick="location.href='dataLook.html'"><i class="fas fa-arrow-left"></i> 返回</button>
          </div>`;
        document.getElementById('reportContainer').innerHTML = html;

        // ======== 雷达图（较大尺寸） ========
        const ctx = document.getElementById('radarChart')?.getContext('2d');
        let chartInstance = null;
        if (ctx) {
            const radarValues = data.radar_data && data.radar_data.length ? data.radar_data : glist.map(() => 0);
            chartInstance = new Chart(ctx, {
                type:'radar',
                data:{ labels:glist.map(g=>gameLabels[g]||g), datasets:[{ label:'正确率 (%)', data:radarValues, backgroundColor:'rgba(217,160,102,0.2)', borderColor:'#D9A066', borderWidth:2, pointBackgroundColor:'#C88B4A' }] },
                options:{ responsive:true, maintainAspectRatio:true, scales:{ r:{ beginAtZero:true, max:100, ticks:{stepSize:20} } }, plugins:{ legend:{display:false} } }
            });
        }

        // ======== PDF 导出：html2canvas 截图 → jsPDF（所见即所得） ========
        document.getElementById('downloadBtn').addEventListener('click', async () => {
            if (!window.jspdf?.jsPDF) { alert('PDF库加载失败，请检查网络'); return; }
            if (typeof html2canvas === 'undefined') { alert('截图库加载失败，请检查网络'); return; }

            // 1. 锁定雷达图为正方形，防止 html2canvas 拉伸成扁菱形
            document.body.classList.add('pdf-exporting');
            await new Promise(r => requestAnimationFrame(r));
            await new Promise(r => setTimeout(r, 200));
            if (chartInstance) { chartInstance.resize(420, 420); }
            await new Promise(r => setTimeout(r, 400));

            // 2. 等待字体
            await document.fonts.ready;

            // 3. 隐藏操作栏（不导出按钮）
            const actionBar = document.getElementById('actionBar');
            if (actionBar) actionBar.style.display = 'none';

            // 3. html2canvas 截图（windowWidth 固定 800px，防止 viewport 宽度干扰）
            const reportEl = document.getElementById('reportContainer');
            const canvas = await html2canvas(reportEl, {
                scale: 2,
                useCORS: true,
                backgroundColor: '#F5EDE4',
                windowWidth: 800
            });

            // 4. 恢复雷达图 + 操作栏
            document.body.classList.remove('pdf-exporting');
            if (chartInstance) { chartInstance.resize(); }
            if (actionBar) actionBar.style.display = '';

            // 5. 嵌入 PDF（mm 反推像素切页，消除单位混用）
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pageW = pdf.internal.pageSize.getWidth();
            const pageH = pdf.internal.pageSize.getHeight();
            const M = 8;
            const usableW = pageW - 2 * M;
            const usableH = pageH - 2 * M;
            const pxPerMm = canvas.width / usableW;
            const pagePx = Math.round(usableH * pxPerMm);

            for (let y = 0, pageNum = 0; y < canvas.height; y += pagePx, pageNum++) {
                const sliceH = Math.min(pagePx, canvas.height - y);
                const pc = document.createElement('canvas');
                pc.width = canvas.width;
                pc.height = sliceH;
                const pctx = pc.getContext('2d');
                pctx.drawImage(canvas, 0, y, canvas.width, sliceH, 0, 0, canvas.width, sliceH);
                if (pageNum > 0) pdf.addPage();
                pdf.addImage(pc.toDataURL('image/jpeg', 0.95), 'JPEG', M, M, usableW, sliceH / pxPerMm);
            }

            pdf.save(`星伴综合报告_${data.child_name}.pdf`);
        });

        // ======== 分享弹窗 ========
        const shareUrl = `${location.origin}${location.pathname}?childId=${verifiedChildId}&games=${glist.join(',')}`;
        let shareCode = '';
        const codeBox = document.getElementById('shareUrlBox');
        const copyBtn = document.getElementById('copyShareBtn');
        const copyToast = document.getElementById('copyToast');
        const shareOverlay = document.getElementById('shareOverlay');

        document.getElementById('shareBtn').addEventListener('click', async () => {
            codeBox.textContent = '正在生成分享码...';
            shareOverlay.classList.add('show');
            try {
                const resp = await fetch(`${API_BASE}/share/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ child_id: parseInt(verifiedChildId), games: glist.join(',') })
                });
                const d = await resp.json();
                if (d.success) {
                    shareCode = d.data.code;
                    codeBox.innerHTML = `分享码：<b>${shareCode}</b>（48小时有效）<br><span style="font-size:11px;color:#8F7A64">将此码发送给朋友，在报告页输入即可查看</span>`;
                    copyBtn.onclick = () => {
                        navigator.clipboard.writeText(shareCode).then(() => {
                            copyToast.style.display = 'block';
                            setTimeout(() => copyToast.style.display = 'none', 2000);
                        });
                    };
                    copyBtn.innerHTML = '<i class="fas fa-copy"></i> 复制分享码';
                } else {
                    codeBox.textContent = '生成失败：' + (d.message || '请重试');
                }
            } catch (e) {
                codeBox.textContent = '网络错误，请重试';
            }
        });

        document.getElementById('closeShareBtn').addEventListener('click', () => shareOverlay.classList.remove('show'));
        copyBtn.onclick = () => {
            navigator.clipboard.writeText(shareUrl).then(() => {
                copyToast.style.display = 'block';
                setTimeout(() => copyToast.style.display = 'none', 2000);
            });
        };

    } catch(e) {
        document.getElementById('reportContainer').innerHTML = `<div class=error-box><i class="fas fa-exclamation-triangle"></i><p>加载失败: ${e.message}</p><button class="btn btn-secondary" onclick="location.href='dataLook.html'">返回数据看板</button></div>`;
    }
})();
</script>
</body>
</html>
