<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星伴 · 指物游戏 | 智能分析报告</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../css/touchGame.css">
</head>


<body>
  <div class="game-master" id="gameMasterContainer">
    <div class="game-panel" id="mainGamePanel">
      <div class="top-bar">
        <div class="left-actions">
          <button class="home-btn" id="homeButton"><i class="fas fa-home"></i></button>
          <div class="game-badge">
            <div class="logo-mark"><i class="fas fa-star"></i></div>
            <div class="game-title">星伴·指物练习</div>
          </div>
        </div>
        <div class="round-info">
          <i class="fas fa-list-ul"></i> 第 <span id="currentRoundDisplay">1</span>/<span
            id="totalRoundsDisplay">8</span>
          <span class="error-counter"><i class="fas fa-times-circle"></i> <span id="roundErrorCount">0</span>/3</span>
        </div>
      </div>
      <div class="hint-area">
        <div class="hint-icon"><i class="fas fa-hand-pointer"></i></div>
        <div class="hint-text"><strong>👉 指一指</strong> "<span id="hintTarget">苹果</span>" 然后点击对应卡片</div>
      </div>
      <div class="question-head">
        <div class="target-display"><span id="targetName">苹果</span><span class="target-emoji" id="targetEmoji">🍎</span>
        </div>
      </div>
      <div class="items-grid" id="itemsGridContainer">
        <!-- 动态生成 -->
      </div>
      <div class="bottom-section">
        <div class="feedback-bar" id="inlineFeedback">✨ 第 1 轮：指一指"苹果"，点击卡片吧</div>
        <div class="stats-footer">
          <div class="stats-group">
            <div class="stat-badge"><i class="fas fa-check-circle" style="color:#A9C28B;"></i> 成功 <span
                class="stat-number" id="successValue">0</span></div>
            <div class="stat-badge"><i class="fas fa-times-circle" style="color:#D4A0A0;"></i> 错误 <span
                class="stat-number" id="errorValue">0</span></div>
            <div class="stat-badge"><i class="fas fa-hourglass-half"></i> 用时 <span class="stat-number"
                id="timerValue">0</span>s</div>
          </div>
          <div class="action-group">
            <button class="btn-secondary" id="skipRoundButton"><i class="fas fa-forward"></i> 跳过</button>
            <button class="btn-secondary" id="endGameButton"><i class="fas fa-flag-checkered"></i> 结束</button>
          </div>
        </div>
        <div class="progress-section">
          <div class="progress-header"><span>训练进度</span><span id="progressPercentText">0%</span></div>
          <div class="bar-bg">
            <div class="bar-fill" id="progressBarFill" style="width:0%;"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="reminder-popup" id="reminderPopup"><i class="fas fa-bell"></i> <span id="reminderText">⏰ 还剩20秒</span>
    </div>

    <!-- 训练报告弹窗 -->
    <div class="result-modal" id="resultModal">
      <div class="modal-card">
        <div class="modal-title"><i class="fas fa-chart-line"></i> 训练报告</div>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-label">总点击</div>
            <div class="stat-value"><span id="finalTotalClicks">0</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">正确点击</div>
            <div class="stat-value"><span id="finalCorrectClicks">0</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">错误点击</div>
            <div class="stat-value"><span id="finalWrongClicks">0</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">正确轮数</div>
            <div class="stat-value"><span id="finalCorrectRounds">0</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">错误轮数</div>
            <div class="stat-value"><span id="finalWrongRounds">0</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">点击准确率</div>
            <div class="stat-value"><span id="finalClickRate">0</span>%</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">轮次正确率</div>
            <div class="stat-value"><span id="finalRoundAccuracy">0</span>%</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">平均用时</div>
            <div class="stat-value"><span id="finalAvgTime">0</span><span class="stat-unit">秒</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">超时次数</div>
            <div class="stat-value"><span id="finalTimeout">0</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">跳过次数</div>
            <div class="stat-value"><span id="finalSkip">0</span></div>
          </div>
        </div>
        <div class="analysis-area">
          <div class="analysis-title"><i class="fas fa-robot"></i> 智能分析</div>
          <div class="analysis-text" id="analysisText">正在生成训练反馈...</div>
        </div>
        <div class="single-button">
          <button class="modal-btn" id="homeReturnBtn"><i class="fas fa-home"></i> 返回首页</button>
        </div>
      </div>
    </div>
  </div>
<script src="../js/touchGame.js"></script>

</body>

</html>
