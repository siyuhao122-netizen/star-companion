<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星伴 · 指物练习 | 语音播报版</title>
  <!-- 字体与图标 -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #D9CBBF;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      padding: 12px;
    }

    /* 主卡片 1024*600 固定尺寸 */
    .game-master {
      width: 1024px;
      height: 600px;
      background: #FEFCF8;
      border-radius: 48px;
      box-shadow: 0 24px 40px -16px rgba(80, 50, 30, 0.15), 0 2px 8px rgba(0, 0, 0, 0.02);
      border: 1px solid #F2E7DA;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .game-panel {
      padding: 18px 28px 20px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* 顶部栏 */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .left-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .home-btn {
      background: #F1E7DE;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 26px;
      font-size: 22px;
      color: #8C6E52;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.1s;
      box-shadow: 0 4px 0 #DBC8B5;
      border: 1px solid #EADACA;
    }

    .home-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #DBC8B5;
    }

    .game-badge {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-mark {
      background: #EADBCF;
      width: 44px;
      height: 44px;
      border-radius: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #8C6E52;
    }

    .game-title {
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 1.5px;
      color: #7C5F48;
    }

    .round-info {
      background: #F7EFE6;
      padding: 8px 20px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 18px;
      color: #9F7C5F;
      border: 1px solid #EDDDCF;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* 错误计数显示 */
    .error-counter {
      background: #FCE8E8;
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 14px;
      color: #C06060;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }

    .error-counter i {
      font-size: 12px;
    }

    /* 提示区 */
    .hint-area {
      background: #F9F3EB;
      margin: 4px 0 8px;
      padding: 10px 20px;
      border-radius: 36px;
      border-left: 5px solid #D9B48F;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hint-icon {
      font-size: 22px;
      color: #C69C6D;
    }

    .hint-text {
      font-size: 16px;
      font-weight: 500;
      color: #5F4A36;
    }

    .hint-text strong {
      color: #B27A4A;
    }

    /* 目标展示区 */
    .question-head {
      text-align: center;
      margin: 4px 0 12px;
    }

    .target-display {
      font-size: 38px;
      font-weight: 800;
      color: #5F4230;
      background: #FCF6EE;
      display: inline-block;
      padding: 6px 36px;
      border-radius: 60px;
      box-shadow: 0 3px 0 #E6D3C0;
    }

    .target-emoji {
      font-size: 42px;
      margin-left: 8px;
    }

    /* 物品网格 - 4列 */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin: 4px 0 12px;
      flex: 1;
    }

    .item-card {
      background: #FFFFFF;
      border-radius: 32px;
      padding: 12px 6px;
      text-align: center;
      cursor: pointer;
      border: 2.5px solid #F0E3D6;
      box-shadow: 0 8px 0 #E2D1C0, 0 6px 14px rgba(160, 120, 80, 0.05);
      transition: all 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .item-card:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #DBC8B5;
    }

    .item-emoji {
      font-size: 70px;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .item-name {
      font-size: 22px;
      font-weight: 700;
      color: #785F48;
      background: #FBF4EB;
      padding: 4px 16px;
      border-radius: 36px;
      border: 1px solid #EDD9C6;
    }

    .item-card.correct-glow {
      background: #E3F0D8;
      border-color: #A8C998;
      box-shadow: 0 5px 0 #9BB582;
    }

    .item-card.wrong-shake {
      animation: shake 0.3s ease;
      background: #FCE8E8;
      border-color: #D4A0A0;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-5px);
      }

      75% {
        transform: translateX(5px);
      }
    }

    /* 底部区域 */
    .bottom-section {
      margin-top: 4px;
    }

    /* 反馈信息条 */
    .feedback-bar {
      background: #FDF8F2;
      border-radius: 36px;
      padding: 10px 20px;
      margin-bottom: 10px;
      text-align: center;
      font-weight: 600;
      font-size: 17px;
      color: #7F9A6B;
      border: 1px solid #F0E0D0;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 统计栏 */
    .stats-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #FDF8F2;
      border-radius: 40px;
      padding: 10px 18px;
      margin-bottom: 8px;
      border: 1px solid #F0E0D0;
    }

    .stats-group {
      display: flex;
      gap: 20px;
    }

    .stat-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #FFFFFFE0;
      padding: 5px 18px;
      border-radius: 40px;
      font-weight: 600;
      color: #6F523A;
      font-size: 15px;
    }

    .stat-number {
      font-size: 26px;
      font-weight: 800;
      color: #BA8A5C;
      margin-left: 4px;
    }

    .action-group {
      display: flex;
      gap: 10px;
    }

    .btn-secondary {
      background: #F1E7DE;
      border: none;
      padding: 10px 22px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 15px;
      color: #8B6A4C;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #E6D2C0;
      transition: all 0.1s;
    }

    .btn-secondary:active {
      background: #E1D1C0;
      transform: scale(0.97);
    }

    .btn-primary {
      background: #EAD1BB;
      border-color: #DDBB9A;
    }

    /* 进度条 */
    .progress-section {
      margin-top: 2px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 500;
      color: #B19780;
      margin-bottom: 4px;
    }

    .bar-bg {
      background: #EFE3D8;
      height: 10px;
      border-radius: 30px;
      overflow: hidden;
    }

    .bar-fill {
      background: #D0A77A;
      height: 100%;
      border-radius: 30px;
      transition: width 0.3s;
    }

    /* 提醒弹窗 */
    .reminder-popup {
      position: absolute;
      top: 28%;
      left: 50%;
      transform: translate(-50%, -30%);
      background: #FFF6EA;
      padding: 14px 28px;
      border-radius: 50px;
      box-shadow: 0 20px 30px -6px rgba(100, 70, 30, 0.2), 0 0 0 2px #FFE6CD;
      font-size: 22px;
      font-weight: 700;
      color: #AF7642;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: 0.2s;
      pointer-events: none;
    }

    .reminder-popup.show {
      opacity: 1;
      visibility: visible;
    }

    /* 成绩弹窗 */
    .result-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transition: 0.2s;
    }

    .result-modal.show {
      opacity: 1;
      visibility: visible;
    }

    .modal-card {
      background: #FFFCF5;
      border-radius: 52px;
      padding: 28px 40px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      box-shadow: 0 40px 50px -20px #5f3e2a33;
      border: 1px solid #FFE9D4;
    }

    .modal-title {
      font-size: 28px;
      font-weight: 800;
      color: #7C5F48;
      margin-bottom: 20px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin: 20px 0;
    }

    .stat-item {
      background: #F9F3EB;
      padding: 12px;
      border-radius: 24px;
    }

    .stat-label {
      font-size: 13px;
      color: #9B846C;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      color: #C28B5E;
    }

    .stat-unit {
      font-size: 14px;
      color: #9B846C;
      margin-left: 4px;
    }

    .modal-btn {
      background: #EAD1BB;
      border: none;
      padding: 14px 30px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 18px;
      color: #6F4E34;
      cursor: pointer;
      margin-top: 10px;
      border: 1px solid #DDBB9A;
      width: 100%;
    }
  </style>
</head>

<body>
  <div class="game-master">
    <div class="game-panel">
      <!-- 顶部 -->
      <div class="top-bar">
        <div class="left-actions">
          <button class="home-btn" id="homeButton"><i class="fas fa-home"></i></button>
          <div class="game-badge">
            <div class="logo-mark"><i class="fas fa-star"></i></div>
            <div class="game-title">星伴·指物练习</div>
          </div>
        </div>
        <div class="round-info">
          <i class="fas fa-list-ul"></i> 第 <span id="currentRoundDisplay">1</span> / <span
            id="totalRoundsDisplay">8</span> 轮
          <span class="error-counter" id="roundErrorDisplay">
            <i class="fas fa-times-circle"></i> <span id="roundErrorCount">0</span>/3
          </span>
        </div>
      </div>

      <!-- 提示区 -->
      <div class="hint-area">
        <div class="hint-icon"><i class="fas fa-hand-pointer"></i></div>
        <div class="hint-text" id="hintMessage">
          <strong>👉 指一指</strong> "<span id="hintTarget">苹果</span>" 然后点击对应卡片
        </div>
      </div>

      <!-- 目标展示 -->
      <div class="question-head">
        <div class="target-display">
          <span id="targetName">苹果</span>
          <span class="target-emoji" id="targetEmoji">🍎</span>
        </div>
      </div>

      <!-- 物品网格 -->
      <div class="items-grid" id="itemsGridContainer">
        <div class="item-card" data-item="苹果" data-emoji="🍎">
          <div class="item-emoji">🍎</div>
          <div class="item-name">苹果</div>
        </div>
        <div class="item-card" data-item="香蕉" data-emoji="🍌">
          <div class="item-emoji">🍌</div>
          <div class="item-name">香蕉</div>
        </div>
        <div class="item-card" data-item="橘子" data-emoji="🍊">
          <div class="item-emoji">🍊</div>
          <div class="item-name">橘子</div>
        </div>
        <div class="item-card" data-item="西瓜" data-emoji="🍉">
          <div class="item-emoji">🍉</div>
          <div class="item-name">西瓜</div>
        </div>
      </div>

      <!-- 底部区域 -->
      <div class="bottom-section">
        <!-- 反馈信息条 -->
        <div class="feedback-bar" id="inlineFeedback">
          ✨ 第 1 轮：指一指"苹果"，点击卡片吧
        </div>

        <!-- 统计栏 -->
        <div class="stats-footer">
          <div class="stats-group">
            <div class="stat-badge">
              <i class="fas fa-check-circle" style="color:#A9C28B;"></i>
              成功 <span class="stat-number" id="successValue">0</span>
            </div>
            <div class="stat-badge">
              <i class="fas fa-times-circle" style="color:#D4A0A0;"></i>
              错误 <span class="stat-number" id="errorValue">0</span>
            </div>
            <div class="stat-badge">
              <i class="fas fa-hourglass-half"></i>
              用时 <span class="stat-number" id="timerValue">0</span>s
            </div>
          </div>
          <div class="action-group">
            <button class="btn-secondary" id="skipRoundButton">
              <i class="fas fa-forward"></i> 跳过
            </button>
            <button class="btn-secondary btn-primary" id="endGameButton">
              <i class="fas fa-flag-checkered"></i> 结束
            </button>
          </div>
        </div>

        <!-- 进度条 -->
        <div class="progress-section">
          <div class="progress-header">
            <span>训练进度</span>
            <span id="progressPercentText">0%</span>
          </div>
          <div class="bar-bg">
            <div class="bar-fill" id="progressBarFill" style="width: 0%;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 提醒弹窗 -->
    <div class="reminder-popup" id="reminderPopup">
      <i class="fas fa-bell"></i> <span id="reminderText">⏰ 还剩20秒</span>
    </div>
  </div>

  <!-- 成绩弹窗 -->
  <div class="result-modal" id="resultModal">
    <div class="modal-card">
      <div class="modal-title"><i class="fas fa-trophy" style="margin-right: 10px;"></i>练习完成</div>

      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-label"><i class="fas fa-check-circle" style="color:#A9C28B;"></i> 正确次数</div>
          <div class="stat-value"><span id="finalCorrect">0</span><span class="stat-unit">次</span></div>
        </div>
        <div class="stat-item">
          <div class="stat-label"><i class="fas fa-times-circle" style="color:#D4A0A0;"></i> 错误次数</div>
          <div class="stat-value"><span id="finalWrong">0</span><span class="stat-unit">次</span></div>
        </div>
        <div class="stat-item">
          <div class="stat-label"><i class="fas fa-mouse-pointer"></i> 点击次数</div>
          <div class="stat-value"><span id="finalClicks">0</span><span class="stat-unit">次</span></div>
        </div>
        <div class="stat-item">
          <div class="stat-label"><i class="fas fa-percent"></i> 正确率</div>
          <div class="stat-value"><span id="finalAccuracy">0</span><span class="stat-unit">%</span></div>
        </div>
        <div class="stat-item">
          <div class="stat-label"><i class="fas fa-clock"></i> 超时次数</div>
          <div class="stat-value"><span id="finalTimeout">0</span><span class="stat-unit">次</span></div>
        </div>
        <div class="stat-item">
          <div class="stat-label"><i class="fas fa-hourglass-half"></i> 平均用时</div>
          <div class="stat-value"><span id="finalAvgTime">0</span><span class="stat-unit">秒</span></div>
        </div>
        <div class="stat-item">
          <div class="stat-label"><i class="fas fa-forward"></i> 跳过次数</div>
          <div class="stat-value"><span id="finalSkip">0</span><span class="stat-unit">次</span></div>
        </div>
        <div class="stat-item">
          <div class="stat-label"><i class="fas fa-hourglass-end"></i> 总用时</div>
          <div class="stat-value"><span id="finalTotalTime">0</span><span class="stat-unit">秒</span></div>
        </div>
      </div>

      <button class="modal-btn" id="closeModalBtn">返回主页</button>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      const TOTAL_ROUNDS = 8;
      const MAX_TIME = 30;
      const MAX_ERRORS_PER_ROUND = 3;
      const REMINDER_TIMES = [10, 20];

      const ITEMS = [
        { name: '苹果', emoji: '🍎' },
        { name: '香蕉', emoji: '🍌' },
        { name: '橘子', emoji: '🍊' },
        { name: '西瓜', emoji: '🍉' }
      ];

      // DOM
      const currentRoundSpan = document.getElementById('currentRoundDisplay');
      const totalRoundsSpan = document.getElementById('totalRoundsDisplay');
      const targetNameSpan = document.getElementById('targetName');
      const targetEmojiSpan = document.getElementById('targetEmoji');
      const hintTargetSpan = document.getElementById('hintTarget');
      const successSpan = document.getElementById('successValue');
      const errorSpan = document.getElementById('errorValue');
      const timerSpan = document.getElementById('timerValue');
      const progressFill = document.getElementById('progressBarFill');
      const progressPercent = document.getElementById('progressPercentText');
      const inlineFeedback = document.getElementById('inlineFeedback');
      const reminderPopup = document.getElementById('reminderPopup');
      const reminderText = document.getElementById('reminderText');
      const itemsGrid = document.getElementById('itemsGridContainer');
      const skipBtn = document.getElementById('skipRoundButton');
      const endBtn = document.getElementById('endGameButton');
      const homeBtn = document.getElementById('homeButton');
      const resultModal = document.getElementById('resultModal');
      const roundErrorDisplay = document.getElementById('roundErrorCount');

      // 统计相关DOM
      const finalCorrect = document.getElementById('finalCorrect');
      const finalWrong = document.getElementById('finalWrong');
      const finalClicks = document.getElementById('finalClicks');
      const finalAccuracy = document.getElementById('finalAccuracy');
      const finalTimeout = document.getElementById('finalTimeout');
      const finalAvgTime = document.getElementById('finalAvgTime');
      const finalSkip = document.getElementById('finalSkip');
      const finalTotalTime = document.getElementById('finalTotalTime');
      const closeModalBtn = document.getElementById('closeModalBtn');

      totalRoundsSpan.textContent = TOTAL_ROUNDS;

      // 状态
      let currentRound = 1;
      let currentTarget = '苹果';
      let roundActive = true;
      let gameActive = true;
      let roundErrorCount = 0;

      // 计时相关
      let timerInterval = null;
      let reminderTimeouts = [];
      let autoNextTimeout = null;
      let popupTimeout = null;
      let roundStartTime = 0;
      let totalTimeSpent = 0;
      let roundTimes = [];

      // 统计数据
      let stats = {
        correct: 0,
        wrongClick: 0,
        totalClicks: 0,
        timeout: 0,
        skip: 0
      };

      // 语音合成
      function speak(text, isCorrect = null) {
        if (!window.speechSynthesis) return;
        try {
          let speakText = text;
          if (isCorrect === true) {
            const encouragements = ['真棒！', '好厉害！', '太聪明了！', '做得好！', '对了！'];
            speakText = encouragements[Math.floor(Math.random() * encouragements.length)] + text;
          } else if (isCorrect === false) {
            const encourages = ['再试试看，', '没关系，', '加油，', '慢慢来，'];
            speakText = encourages[Math.floor(Math.random() * encourages.length)] + text;
          }
          const utterance = new SpeechSynthesisUtterance(speakText);
          utterance.lang = 'zh-CN';
          utterance.rate = 0.95;
          utterance.pitch = 1.2;
          window.speechSynthesis.cancel();
          window.speechSynthesis.speak(utterance);
        } catch (e) { }
      }

      // 更新UI
      function updateRoundUI() {
        currentRoundSpan.textContent = currentRound;
        const pct = (currentRound / TOTAL_ROUNDS) * 100;
        progressFill.style.width = `${pct}%`;
        progressPercent.textContent = `${Math.round(pct)}%`;
      }

      function updateErrorDisplay() {
        roundErrorDisplay.textContent = roundErrorCount;
        errorSpan.textContent = stats.wrongClick + stats.timeout + stats.skip;
      }

      function updateFeedbackMessage() {
        if (roundActive) {
          inlineFeedback.innerHTML = `🔍 第 ${currentRound} 轮：指一指"${currentTarget}"，点击卡片吧`;
          inlineFeedback.style.color = '#7F9A6B';
        }
      }

      function setTarget(itemName) {
        const item = ITEMS.find(i => i.name === itemName) || ITEMS[0];
        currentTarget = item.name;
        targetNameSpan.textContent = item.name;
        targetEmojiSpan.textContent = item.emoji;
        hintTargetSpan.textContent = item.name;
        updateFeedbackMessage();
        speak(`指一指${item.name}`);
      }

      function clearTimers() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        reminderTimeouts.forEach(t => clearTimeout(t));
        reminderTimeouts = [];
        if (autoNextTimeout) clearTimeout(autoNextTimeout);
        if (popupTimeout) clearTimeout(popupTimeout);
        reminderPopup.classList.remove('show');
      }

      function hidePopup() {
        reminderPopup.classList.remove('show');
      }

      function showReminder(msg) {
        reminderText.textContent = msg;
        reminderPopup.classList.add('show');
        if (popupTimeout) clearTimeout(popupTimeout);
        popupTimeout = setTimeout(hidePopup, 2000);
      }

      function startRound() {
        clearTimers();
        roundErrorCount = 0;
        updateErrorDisplay();
        roundStartTime = Date.now();
        timerSpan.textContent = '0';

        timerInterval = setInterval(() => {
          if (!roundActive || !gameActive) return;
          const elapsed = Math.floor((Date.now() - roundStartTime) / 1000);
          timerSpan.textContent = elapsed;
          if (elapsed >= MAX_TIME && roundActive) {
            roundActive = false;
            clearTimers();
            stats.timeout++;
            updateErrorDisplay();
            inlineFeedback.innerHTML = `⏳ 30秒已到，自动进入下一题`;
            inlineFeedback.style.color = '#B27A4A';
            speak('时间到，我们看下一个', false);
            setTimeout(() => { if (gameActive) goToNextRound(); }, 800);
          }
        }, 200);

        reminderTimeouts.push(setTimeout(() => {
          if (roundActive && gameActive) showReminder('⏰ 已经10秒啦，指一指卡片吧');
        }, 10000));
        reminderTimeouts.push(setTimeout(() => {
          if (roundActive && gameActive) showReminder('⏰ 还剩10秒，加油完成！');
        }, 20000));

        autoNextTimeout = setTimeout(() => {
          if (roundActive && gameActive) {
            roundActive = false;
            clearTimers();
            stats.timeout++;
            updateErrorDisplay();
            inlineFeedback.innerHTML = `⏳ 时间到，进入下一题`;
            inlineFeedback.style.color = '#B27A4A';
            speak('时间到', false);
            setTimeout(() => { if (gameActive) goToNextRound(); }, 800);
          }
        }, MAX_TIME * 1000 + 100);
      }

      function highlightCorrect() {
        document.querySelectorAll('.item-card').forEach(card => {
          if (card.dataset.item === currentTarget) {
            card.classList.add('correct-glow');
            setTimeout(() => card.classList.remove('correct-glow'), 1200);
          }
        });
      }

      function handleCorrect() {
        if (!roundActive || !gameActive) return;
        roundActive = false;
        clearTimers();

        const elapsed = Math.floor((Date.now() - roundStartTime) / 1000);
        roundTimes.push(elapsed);
        totalTimeSpent += elapsed;

        stats.correct++;
        stats.totalClicks++;
        successSpan.textContent = stats.correct;

        highlightCorrect();
        inlineFeedback.innerHTML = `🎉 太棒了！正确指出了"${currentTarget}"！`;
        inlineFeedback.style.color = '#7F9A6B';
        speak(currentTarget, true);

        setTimeout(() => {
          if (gameActive) {
            if (currentRound < TOTAL_ROUNDS) goToNextRound();
            else finishGame();
          }
        }, 1200);
      }

      function handleWrong(cardElement) {
        if (!roundActive || !gameActive) return;

        stats.totalClicks++;
        stats.wrongClick++;
        roundErrorCount++;
        updateErrorDisplay();

        // 抖动效果
        cardElement.classList.add('wrong-shake');
        setTimeout(() => cardElement.classList.remove('wrong-shake'), 300);

        inlineFeedback.innerHTML = `🌱 再试试看，"${currentTarget}"在哪里？ (${roundErrorCount}/${MAX_ERRORS_PER_ROUND})`;
        inlineFeedback.style.color = '#B27A4A';
        speak('再找找看', false);

        // 错误超过3次自动跳转
        if (roundErrorCount >= MAX_ERRORS_PER_ROUND) {
          roundActive = false;
          clearTimers();
          inlineFeedback.innerHTML = `📝 已经尝试${MAX_ERRORS_PER_ROUND}次了，我们看下一题吧`;
          inlineFeedback.style.color = '#B27A4A';
          speak('没关系，我们看下一个', false);
          setTimeout(() => {
            if (gameActive) {
              if (currentRound < TOTAL_ROUNDS) goToNextRound();
              else finishGame();
            }
          }, 1000);
        }
      }

      function goToNextRound() {
        if (!gameActive) return;
        document.querySelectorAll('.item-card').forEach(c => c.classList.remove('correct-glow', 'wrong-shake'));
        if (currentRound >= TOTAL_ROUNDS) { finishGame(); return; }
        currentRound++;
        let newTarget;
        do { newTarget = ITEMS[Math.floor(Math.random() * ITEMS.length)].name; }
        while (newTarget === currentTarget && ITEMS.length > 1);
        setTarget(newTarget);
        roundActive = true;
        updateRoundUI();
        timerSpan.textContent = '0';
        startRound();
      }

      function skipRound() {
        if (!roundActive || !gameActive) return;
        roundActive = false;
        clearTimers();
        stats.skip++;
        updateErrorDisplay();
        inlineFeedback.innerHTML = `⏩ 已跳过本轮`;
        inlineFeedback.style.color = '#B27A4A';
        speak('跳过本轮', false);
        setTimeout(() => {
          if (gameActive) {
            if (currentRound < TOTAL_ROUNDS) goToNextRound();
            else finishGame();
          }
        }, 500);
      }

      function finishGame() {
        if (!gameActive) return;
        gameActive = false;
        roundActive = false;
        clearTimers();

        // 计算统计数据
        const totalErrors = stats.wrongClick + stats.timeout + stats.skip;
        const accuracy = stats.correct + totalErrors > 0
          ? Math.round((stats.correct / (stats.correct + totalErrors)) * 100)
          : 0;
        const avgTime = roundTimes.length > 0
          ? (roundTimes.reduce((a, b) => a + b, 0) / roundTimes.length).toFixed(1)
          : '0';

        // 显示统计
        finalCorrect.textContent = stats.correct;
        finalWrong.textContent = totalErrors;
        finalClicks.textContent = stats.totalClicks;
        finalAccuracy.textContent = accuracy;
        finalTimeout.textContent = stats.timeout;
        finalAvgTime.textContent = avgTime;
        finalSkip.textContent = stats.skip;
        finalTotalTime.textContent = totalTimeSpent;

        resultModal.classList.add('show');
        inlineFeedback.innerHTML = `🎯 练习结束！正确率 ${accuracy}%`;
        inlineFeedback.style.color = '#7F9A6B';
        speak('练习完成，你真棒！', true);
      }

      function resetGame() {
        gameActive = true;
        currentRound = 1;
        currentTarget = '苹果';
        roundActive = true;
        roundErrorCount = 0;
        totalTimeSpent = 0;
        roundTimes = [];

        stats = {
          correct: 0,
          wrongClick: 0,
          totalClicks: 0,
          timeout: 0,
          skip: 0
        };

        successSpan.textContent = '0';
        errorSpan.textContent = '0';
        setTarget('苹果');
        updateRoundUI();
        updateErrorDisplay();
        timerSpan.textContent = '0';
        updateFeedbackMessage();
        clearTimers();
        startRound();
        resultModal.classList.remove('show');
      }

      // 网格点击
      itemsGrid.addEventListener('click', (e) => {
        const card = e.target.closest('.item-card');
        if (!card || !gameActive || !roundActive) return;
        const item = card.dataset.item;
        if (item === currentTarget) handleCorrect();
        else handleWrong(card);
      });

      skipBtn.addEventListener('click', () => {
        if (gameActive && roundActive) skipRound();
      });

      endBtn.addEventListener('click', () => {
        if (gameActive && confirm('确定结束练习吗？')) finishGame();
      });

      homeBtn.addEventListener('click', () => {
        if (confirm('返回主页会重新开始游戏，确定吗？')) {
          resetGame();
        }
      });

      closeModalBtn.addEventListener('click', () => {
        resultModal.classList.remove('show');
        resetGame();
      });

      // 初始化
      resetGame();
    })();
  </script>
</body>

</html>
