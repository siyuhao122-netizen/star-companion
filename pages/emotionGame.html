<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星伴 · 情绪识别 | 暖愈成长空间</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../css/emotionGame.css">
</head>
<body>
<div class="game-container">
  <div class="game-header">
    <button class="back-btn" onclick="location.href='mainPart.html'"><i class="fas fa-arrow-left"></i></button>
    <h1><i class="fas fa-face-smile"></i> 情绪识别</h1>
    <div class="round-indicator" id="roundIndicator">第 1 / 8 轮</div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <!-- 启动界面 -->
  <div class="start-screen" id="startScreen">
    <div class="start-icon"><i class="fas fa-face-laugh-wink"></i></div>
    <h2>情绪识别小游戏</h2>
    <p>听一段小故事，猜猜主人公是什么心情？<br>一共 8 轮，每轮语音播报</p>
    <button class="start-btn" id="startBtn"><i class="fas fa-play"></i> 开始游戏</button>
  </div>

  <!-- 游戏界面 -->
  <div class="game-area" id="gameArea" style="display:none;">
    <div class="scenario-card" id="scenarioCard">
      <div class="scenario-icon" id="scenarioIcon"><i class="fas fa-question-circle"></i></div>
      <div class="scenario-text" id="scenarioText">正在加载...</div>
      <button class="replay-btn" id="replayBtn"><i class="fas fa-volume-high"></i> 再听一次</button>
    </div>

    <div class="question-prompt">猜猜他 / 她是什么心情？</div>

    <div class="emotion-options" id="emotionOptions"></div>

    <div class="game-controls">
      <button class="control-btn skip-btn" id="skipBtn"><i class="fas fa-forward"></i> 跳过</button>
    </div>
  </div>

  <!-- 结果界面 -->
  <div class="result-screen" id="resultScreen" style="display:none;">
    <div class="result-card">
      <div class="result-icon" id="resultEmoji">🎉</div>
      <h2 id="resultTitle">游戏完成！</h2>
      <div class="result-stats">
        <div class="stat"><span class="stat-val" id="resultCorrect">0</span><span class="stat-label">正确</span></div>
        <div class="stat"><span class="stat-val" id="resultAccuracy">0%</span><span class="stat-label">正确率</span></div>
      </div>
      <div class="ai-analysis-box" id="aiAnalysisBox">
        <div class="ai-header"><i class="fas fa-robot"></i> AI 分析</div>
        <div class="ai-content" id="aiContent">正在生成分析...</div>
      </div>
      <div class="result-actions">
        <button class="action-btn primary" onclick="location.reload()"><i class="fas fa-redo"></i> 再来一次</button>
        <button class="action-btn" onclick="location.href='mainPart.html'"><i class="fas fa-home"></i> 返回首页</button>
      </div>
    </div>
  </div>
</div>

<script src="../js/emotionGame.js"></script>
</body>
</html>
