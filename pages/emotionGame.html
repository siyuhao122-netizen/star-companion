<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星伴 · 情绪识别 | 场景认知训练</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../css/emotionGame.css">
</head>
<body>
  <div class="game-master">
    <div class="game-panel">
      <div class="top-bar">
        <div class="left-actions">
          <button class="home-btn" id="homeButton"><i class="fas fa-home"></i></button>
          <div class="game-badge">
            <div class="logo-mark"><i class="fas fa-star"></i></div>
            <div class="game-title">星伴·情绪识别</div>
          </div>
        </div>
        <div class="round-info">
          <i class="fas fa-list-ul"></i> 第 <span id="currentRoundDisplay">1</span>/<span id="totalRoundsDisplay">8</span>
          <span class="error-counter" style="margin-left:8px;"><i class="fas fa-arrow-right"></i> <span id="skippedCount">0</span>跳过</span>
        </div>
      </div>

      <div class="scene-area" id="sceneArea">
        <div class="scene-emoji" id="sceneEmoji">🎂</div>
        <div class="scene-description" id="sceneDesc">今天是小明的生日，他收到了最喜欢的礼物！</div>
        <div class="scene-question" id="sceneQuestion">小明现在是什么心情呢？</div>
        <button class="voice-btn" id="voiceBtn" title="听场景描述"><i class="fas fa-volume-up"></i></button>
      </div>

      <div class="options-grid" id="optionsContainer">
        <!-- 动态生成4个表情选项 -->
      </div>

      <div class="bottom-area">
        <div class="feedback-bar" id="feedbackBar">✨ 听一听场景，选出对应的情绪吧</div>
        <div class="action-row">
          <div class="stats-group">
            <div class="stat-badge"><i class="fas fa-check-circle" style="color:#A9C28B;"></i> 正确 <span class="stat-number" id="correctValue">0</span></div>
            <div class="stat-badge"><i class="fas fa-times-circle" style="color:#D4A0A0;"></i> 错误 <span class="stat-number" id="wrongValue">0</span></div>
          </div>
          <div class="action-btns">
            <button class="btn-secondary" id="skipBtn"><i class="fas fa-forward"></i> 跳过</button>
            <button class="btn-secondary" id="endBtn"><i class="fas fa-flag-checkered"></i> 结束</button>
          </div>
        </div>
        <div class="progress-section">
          <div class="progress-header"><span>训练进度</span><span id="progressPercentText">0%</span></div>
          <div class="bar-bg">
            <div class="bar-fill" id="progressBarFill" style="width:0%;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 结果弹窗 -->
    <div class="result-modal" id="resultModal">
      <div class="modal-card">
        <div class="modal-title"><i class="fas fa-chart-line"></i> 训练报告</div>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-label">总轮数</div>
            <div class="stat-value"><span id="finalTotal">0</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">答对轮数</div>
            <div class="stat-value green"><span id="finalCorrect">0</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">答错轮数</div>
            <div class="stat-value red"><span id="finalWrong">0</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">跳过轮次</div>
            <div class="stat-value"><span id="finalSkip">0</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">正确率</div>
            <div class="stat-value"><span id="finalAccuracy">0</span>%</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">本轮总用时</div>
            <div class="stat-value"><span id="finalTotalTime">0</span><span class="stat-unit">秒</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">最长轮次用时</div>
            <div class="stat-value"><span id="finalMaxTime">0</span><span class="stat-unit">秒</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">最短轮次用时</div>
            <div class="stat-value"><span id="finalMinTime">0</span><span class="stat-unit">秒</span></div>
          </div>
        </div>
        <div class="analysis-area">
          <div class="analysis-title"><i class="fas fa-robot"></i> AI 智能分析</div>
          <div class="analysis-text" id="analysisText">正在生成训练反馈...</div>
        </div>
        <div class="single-button">
          <button class="modal-btn" id="homeReturnBtn"><i class="fas fa-home"></i> 返回首页</button>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/emotionGame.js"></script>
</body>
</html>
