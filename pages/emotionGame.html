<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星伴 · 情绪识别 | 暖愈成长空间</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../css/emotionGame.css">
</head>
<body>
<div class="game-master">
  <div class="game-panel">
    <div class="top-bar">
      <div class="left-actions">
        <button class="home-btn" id="homeButton"><i class="fas fa-home"></i></button>
        <div class="game-badge">
          <div class="logo-mark"><i class="fas fa-star"></i></div>
          <div class="game-title">星伴·情绪识别</div>
        </div>
      </div>
      <div class="round-info">
        <i class="fas fa-list-ul"></i> 第 <span id="currentRoundDisplay">1</span>/<span id="totalRoundsDisplay">8</span>
      </div>
    </div>

    <div class="hint-area">
      <div class="hint-icon"><i class="fas fa-face-smile"></i></div>
      <div class="hint-text"><strong>听故事</strong>，猜猜主人公是什么心情？</div>
    </div>

    <div class="scenario-box" id="scenarioBox">
      <div class="scenario-icon" id="scenarioIcon"><i class="fas fa-question-circle"></i></div>
      <div class="scenario-content" id="scenarioContent">准备好开始了吗？</div>
      <button class="replay-btn" id="replayBtn"><i class="fas fa-volume-high"></i> 再听一次</button>
    </div>

    <div class="options-grid" id="optionsGrid"></div>

    <div class="bottom-section">
      <div class="feedback-bar" id="inlineFeedback">✨ 第 1 轮：听故事，选心情</div>
      <div class="stats-footer">
        <div class="stats-group">
          <div class="stat-badge"><i class="fas fa-check-circle" style="color:#A9C28B;"></i> 正确 <span class="stat-number" id="correctValue">0</span></div>
          <div class="stat-badge"><i class="fas fa-times-circle" style="color:#D4A0A0;"></i> 错误 <span class="stat-number" id="wrongValue">0</span></div>
        </div>
        <div class="action-group">
          <button class="btn-secondary" id="skipButton"><i class="fas fa-forward"></i> 跳过</button>
        </div>
      </div>
      <div class="progress-section">
        <div class="progress-header"><span>训练进度</span><span id="progressPercentText">0%</span></div>
        <div class="bar-bg"><div class="bar-fill" id="progressBarFill" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- 启动提示 -->
  <div class="start-overlay" id="startOverlay">
    <div class="start-card">
      <div class="start-icon"><i class="fas fa-face-laugh-wink"></i></div>
      <h2>情绪识别小游戏</h2>
      <p>听一段小故事，猜猜主人公是什么心情？<br>一共 8 轮，每轮语音播报</p>
      <button class="start-btn" id="startBtn"><i class="fas fa-play"></i> 开始游戏</button>
    </div>
  </div>

  <!-- 训练报告弹窗 -->
  <div class="result-modal" id="resultModal">
    <div class="modal-card">
      <div class="modal-title"><i class="fas fa-chart-line"></i> 情绪识别报告</div>
      <div class="stats-grid">
        <div class="stat-item"><div class="stat-label">总轮数</div><div class="stat-value"><span id="finalTotalRounds">8</span></div></div>
        <div class="stat-item"><div class="stat-label">正确次数</div><div class="stat-value"><span id="finalCorrect">0</span></div></div>
        <div class="stat-item"><div class="stat-label">正确率</div><div class="stat-value"><span id="finalAccuracy">0</span>%</div></div>
      </div>
      <div class="analysis-area">
        <div class="analysis-title"><i class="fas fa-robot"></i> 智能分析</div>
        <div class="analysis-text" id="analysisText">正在生成训练反馈...</div>
      </div>
      <div class="single-button">
        <button class="modal-btn" id="homeReturnBtn"><i class="fas fa-home"></i> 返回首页</button>
      </div>
    </div>
  </div>
</div>
<script src="../js/emotionGame.js"></script>
</body>
</html>
