<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星伴 · 指物游戏 | 深度分析报告</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #D9CBBF;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
      padding: 12px;
    }

    .analysis-container {
      width: 1024px;
      height: 600px;
      background: #FFFDF9;
      border-radius: 36px;
      box-shadow: 0 20px 40px -12px rgba(68, 48, 28, 0.35), 0 0 0 1px rgba(235, 218, 196, 0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .scroll-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 26px 18px;
      scrollbar-width: thin;
      scrollbar-color: #D4B99B #F3EBE2;
    }

    .scroll-content::-webkit-scrollbar {
      width: 5px;
    }

    .scroll-content::-webkit-scrollbar-thumb {
      background: #D4B99B;
      border-radius: 10px;
    }

    /* 头部 */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .back-btn {
      width: 42px;
      height: 42px;
      background: #F5EDE4;
      border-radius: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #B88B5C;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1.5px solid #EADACA;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: #EDDFD0;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #4A3724;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .header h1 i {
      color: #D9A066;
      font-size: 22px;
    }

    .header h1 span {
      font-weight: 500;
      color: #9B846C;
      font-size: 14px;
      margin-left: 4px;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .child-badge {
      background: #F9F1E8;
      padding: 6px 16px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid #EDDDCF;
    }

    .child-badge i {
      color: #B47C44;
      font-size: 16px;
    }

    .child-badge span {
      font-size: 13px;
      font-weight: 600;
      color: #5B3E28;
    }

    /* 下拉选择框 */
    .filter-dropdown {
      position: relative;
      min-width: 130px;
    }

    .filter-btn {
      background: #F2ECE4;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      color: #6C4E32;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border: 1.5px solid #E6D2C0;
      transition: all 0.15s;
    }

    .filter-btn:hover {
      background: #EDDFD0;
    }

    .filter-btn i {
      color: #B88B5C;
      font-size: 13px;
    }

    .dropdown-menu {
      position: absolute;
      top: 48px;
      right: 0;
      background: #FFFFFF;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(90, 60, 40, 0.12);
      border: 1.5px solid #F0E2D4;
      min-width: 130px;
      z-index: 100;
      display: none;
      overflow: hidden;
    }

    .dropdown-menu.show {
      display: block;
    }

    .dropdown-item {
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      color: #6C4E32;
      cursor: pointer;
      transition: all 0.1s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .dropdown-item:hover {
      background: #FDF5EC;
    }

    .dropdown-item.active {
      background: #F5E8DA;
      color: #B47C44;
      font-weight: 600;
    }

    .dropdown-item.active i {
      color: #D9A066;
    }

    /* 核心指标卡片 */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .kpi-card {
      background: #FEFCF8;
      border-radius: 22px;
      padding: 14px 12px;
      border: 1.5px solid #F0E5DA;
      text-align: center;
      transition: all 0.15s;
    }

    .kpi-card:hover {
      border-color: #D9A066;
      background: #FDF8F2;
    }

    .kpi-icon {
      font-size: 24px;
      color: #D9A066;
      margin-bottom: 6px;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 800;
      color: #4F3622;
      line-height: 1.1;
    }

    .kpi-label {
      font-size: 11px;
      color: #9B846C;
      margin: 4px 0 3px;
      font-weight: 500;
    }

    .kpi-trend {
      font-size: 11px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 10px;
      border-radius: 30px;
    }

    .trend-up {
      background: #E8F0D8;
      color: #6B8C4A;
    }

    .trend-down {
      background: #FCE8E8;
      color: #C06060;
    }

    /* 图表区域 */
    .chart-row {
      display: flex;
      gap: 14px;
      margin-bottom: 16px;
    }

    .chart-box {
      flex: 1;
      background: #FEFCF9;
      border-radius: 24px;
      padding: 14px 16px;
      border: 1.5px solid #EFE4D8;
    }

    .chart-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .chart-header i {
      color: #D9A066;
      font-size: 16px;
    }

    .chart-header h3 {
      font-size: 14px;
      font-weight: 700;
      color: #5E422C;
    }

    canvas {
      width: 100% !important;
      height: 120px !important;
    }

    /* 分析报告区域 */
    .report-card {
      background: linear-gradient(135deg, #FCF8F0, #F8EFE4);
      border-radius: 28px;
      padding: 18px 22px;
      border: 2px solid #F2E5D6;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #543E2A;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 10px;
      border-bottom: 2px solid #EDDDCF;
    }

    .section-title i {
      color: #D9A066;
      font-size: 20px;
    }

    .analysis-block {
      margin-bottom: 16px;
    }

    .block-header {
      font-size: 14px;
      font-weight: 700;
      color: #6C4F32;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .block-header i {
      color: #9BBF7A;
      font-size: 14px;
    }

    .trend-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 6px;
    }

    .trend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #FFFFFF;
      padding: 8px 14px;
      border-radius: 36px;
      border: 1px solid #F0E2D4;
    }

    .trend-item i {
      color: #D9A066;
      font-size: 14px;
    }

    .trend-text {
      font-size: 12px;
      color: #5E422C;
    }

    .trend-text strong {
      color: #B57A48;
    }

    .progress-compare {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 14px 18px;
      margin: 12px 0 0;
    }

    .compare-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }

    .compare-row:last-child {
      margin-bottom: 0;
    }

    .compare-label {
      min-width: 90px;
      font-weight: 600;
      color: #6C4F32;
      font-size: 13px;
    }

    .compare-bar {
      flex: 1;
      height: 7px;
      background: #EADDCB;
      border-radius: 10px;
      overflow: hidden;
    }

    .compare-fill {
      height: 100%;
      background: linear-gradient(90deg, #9BBF7A, #B5D69A);
      border-radius: 10px;
    }

    .compare-value {
      min-width: 55px;
      font-weight: 700;
      color: #6B8C4A;
      font-size: 13px;
    }

    .suggestion-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .suggestion-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: #FFFFFF;
      padding: 12px 16px;
      border-radius: 20px;
      border: 1px solid #F0E2D4;
    }

    .suggestion-num {
      width: 26px;
      height: 26px;
      background: #EADBCA;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #6C4E32;
      flex-shrink: 0;
    }

    .suggestion-content {
      flex: 1;
      font-size: 12px;
      color: #5E422C;
      line-height: 1.5;
    }

    .suggestion-content strong {
      color: #B57A48;
    }

    /* 底部操作 */
    .action-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 6px;
    }

    .btn-primary {
      background: #EBDBCA;
      border: none;
      padding: 12px 32px;
      border-radius: 40px;
      font-weight: 700;
      color: #6C4E32;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid #DDBB9A;
      box-shadow: 0 3px 0 #C6AA8A;
    }

    .btn-primary:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #C6AA8A;
    }

    .toast-msg {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #FEF3E2;
      padding: 10px 24px;
      border-radius: 48px;
      font-weight: 600;
      color: #B87A48;
      z-index: 1000;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      border: 1.5px solid #F7E3CF;
      font-size: 13px;
      pointer-events: none;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 99;
      display: none;
    }

    .overlay.show {
      display: block;
    }

    button {
      font-family: inherit;
      cursor: pointer;
    }

    /* 进步与困难双栏 */
    .progress-double-box {
      display: flex;
      gap: 14px;
      margin-bottom: 12px;
    }

    .progress-box {
      flex: 1;
      background: #FFFFFF;
      border-radius: 18px;
      padding: 14px 16px;
    }

    .progress-box.green {
      border-left: 4px solid #9BBF7A;
    }

    .progress-box.orange {
      border-left: 4px solid #E8B88A;
    }

    .box-title {
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .green .box-title {
      color: #6B8C4A;
    }

    .orange .box-title {
      color: #C07A4A;
    }

    .box-list {
      list-style: none;
      padding: 0;
    }

    .box-list li {
      padding: 5px 0;
      color: #5E422C;
      font-size: 12px;
      display: flex;
      gap: 8px;
    }

    .box-list li i {
      color: #F7B05E;
      font-size: 12px;
      margin-top: 3px;
    }
  </style>
</head>

<body>
  <div class="analysis-container">
    <div class="overlay" id="overlay" onclick="closeDropdown()"></div>

    <div class="scroll-content">
      <!-- 头部 -->
      <div class="header">
        <div class="back-btn" onclick="goBack()">
          <i class="fas fa-arrow-left"></i>
        </div>
        <h1>
          <i class="fas fa-hand-peace"></i>
          指物游戏
          <span>· 深度分析</span>
        </h1>

        <div class="header-right">
          <div class="child-badge" id="childBadge">
            <i class="fas fa-face-smile"></i>
            <span id="childDisplayInfo">乐乐 · 3岁 · 男孩</span>
          </div>

          <!-- 下拉选择框 -->
          <div class="filter-dropdown">
            <div class="filter-btn" onclick="toggleDropdown()">
              <i class="fas fa-list-ol"></i>
              <span class="selected-text" id="selectedFilterText">最近10次</span>
              <i class="fas fa-chevron-down" id="dropdownArrow"></i>
            </div>
            <div class="dropdown-menu" id="dropdownMenu">
              <div class="dropdown-item active" data-count="10" onclick="selectFilter(10, '最近10次')">
                <span>最近10次</span>
                <i class="fas fa-check" style="font-size: 11px;"></i>
              </div>
              <div class="dropdown-item" data-count="9" onclick="selectFilter(9, '最近9次')">
                <span>最近9次</span>
                <i class="fas fa-check" style="font-size: 11px; opacity: 0;"></i>
              </div>
              <div class="dropdown-item" data-count="8" onclick="selectFilter(8, '最近8次')">
                <span>最近8次</span>
                <i class="fas fa-check" style="font-size: 11px; opacity: 0;"></i>
              </div>
              <div class="dropdown-item" data-count="7" onclick="selectFilter(7, '最近7次')">
                <span>最近7次</span>
                <i class="fas fa-check" style="font-size: 11px; opacity: 0;"></i>
              </div>
              <div class="dropdown-item" data-count="6" onclick="selectFilter(6, '最近6次')">
                <span>最近6次</span>
                <i class="fas fa-check" style="font-size: 11px; opacity: 0;"></i>
              </div>
              <div class="dropdown-item" data-count="5" onclick="selectFilter(5, '最近5次')">
                <span>最近5次</span>
                <i class="fas fa-check" style="font-size: 11px; opacity: 0;"></i>
              </div>
              <div class="dropdown-item" data-count="4" onclick="selectFilter(4, '最近4次')">
                <span>最近4次</span>
                <i class="fas fa-check" style="font-size: 11px; opacity: 0;"></i>
              </div>
              <div class="dropdown-item" data-count="3" onclick="selectFilter(3, '最近3次')">
                <span>最近3次</span>
                <i class="fas fa-check" style="font-size: 11px; opacity: 0;"></i>
              </div>
              <div class="dropdown-item" data-count="2" onclick="selectFilter(2, '最近2次')">
                <span>最近2次</span>
                <i class="fas fa-check" style="font-size: 11px; opacity: 0;"></i>
              </div>
              <div class="dropdown-item" data-count="1" onclick="selectFilter(1, '最近1次')">
                <span>最近1次</span>
                <i class="fas fa-check" style="font-size: 11px; opacity: 0;"></i>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 核心指标卡片 -->
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-icon"><i class="fas fa-bullseye"></i></div>
          <div class="kpi-value" id="kpiCorrectRate">100%</div>
          <div class="kpi-label">最新正确率</div>
          <span class="kpi-trend trend-up" id="kpiCorrectTrend"><i class="fas fa-arrow-up"></i> +87.5%</span>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon"><i class="fas fa-mouse-pointer"></i></div>
          <div class="kpi-value" id="kpiClickRate">80%</div>
          <div class="kpi-label">最新点击正确率</div>
          <span class="kpi-trend trend-up" id="kpiClickTrend"><i class="fas fa-arrow-up"></i> +60%</span>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon"><i class="fas fa-clock"></i></div>
          <div class="kpi-value" id="kpiAvgTime">3.2s</div>
          <div class="kpi-label">平均用时</div>
          <span class="kpi-trend trend-up" id="kpiTimeTrend"><i class="fas fa-arrow-down"></i> 缩短76%</span>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon"><i class="fas fa-times-circle"></i></div>
          <div class="kpi-value" id="kpiTimeout">0次</div>
          <div class="kpi-label">超时/跳过</div>
          <span class="kpi-trend trend-up" id="kpiTimeoutTrend"><i class="fas fa-check"></i> 完全消除</span>
        </div>
      </div>

      <!-- 图表区域 -->
      <div class="chart-row">
        <div class="chart-box">
          <div class="chart-header">
            <i class="fas fa-chart-line"></i>
            <h3>正确率趋势（<span id="chart1Label">近10次</span>）</h3>
          </div>
          <canvas id="rateChart"></canvas>
        </div>
        <div class="chart-box">
          <div class="chart-header">
            <i class="fas fa-gauge-high"></i>
            <h3>平均用时变化（<span id="chart2Label">近10次</span>）</h3>
          </div>
          <canvas id="timeChart"></canvas>
        </div>
      </div>

      <!-- 分析报告区域 -->
      <div class="report-card">
        <div class="section-title">
          <i class="fas fa-clipboard-list"></i>
          <span>📋 智能分析报告（基于<span id="reportRangeLabel">最近10次</span>数据）</span>
        </div>

        <!-- 一、整体变化趋势 -->
        <div class="analysis-block">
          <div class="block-header">
            <i class="fas fa-chart-pie"></i>
            <span>一、数据的整体变化趋势</span>
          </div>
          <div class="trend-list" id="trendList">
            <!-- 动态生成 -->
          </div>
        </div>

        <!-- 二、最新一次的具体进步与困难 -->
        <div class="analysis-block">
          <div class="block-header">
            <i class="fas fa-star"></i>
            <span>二、最新一次相较于前面几次的进步与困难</span>
          </div>

          <div class="progress-double-box" id="progressCompareBox">
            <!-- 动态生成 -->
          </div>

          <div class="progress-compare" id="progressBarBox">
            <!-- 动态生成 -->
          </div>
        </div>

        <!-- 三、家庭干预建议 -->
        <div class="analysis-block" style="margin-bottom: 0;">
          <div class="block-header">
            <i class="fas fa-lightbulb"></i>
            <span>三、家庭干预建议</span>
          </div>
          <div class="suggestion-list" id="suggestionList">
            <!-- 动态生成 -->
          </div>
        </div>
      </div>

      <!-- 底部操作 -->
      <div class="action-bar">
        <button class="btn-primary" onclick="goToTraining()">
          <i class="fas fa-play-circle"></i> 开始训练
        </button>
      </div>
    </div>
  </div>

  <script>
    // 孩子数据 - 与首页同步
    const childrenData = {
      1: { name: '乐乐', age: '3岁', gender: '男孩', icon: 'fa-face-smile' },
      2: { name: '朵朵', age: '2岁', gender: '女孩', icon: 'fa-cat' },
      3: { name: '阳阳', age: '5岁', gender: '男孩', icon: 'fa-dog' }
    };

    // 获取URL参数中的childId
    const urlParams = new URLSearchParams(window.location.search);
    const childId = urlParams.get('childId') || '1';
    const child = childrenData[childId] || childrenData[1];

    // 更新宝贝信息显示
    document.getElementById('childDisplayInfo').textContent = `${child.name} · ${child.age} · ${child.gender}`;
    const badgeIcon = document.querySelector('#childBadge i');
    if (badgeIcon) {
      badgeIcon.className = `fas ${child.icon}`;
    }

    // 根据不同孩子调整数据
    const childMultipliers = {
      1: { correct: 1.0, time: 1.0 },   // 乐乐
      2: { correct: 0.85, time: 1.2 },  // 朵朵（2岁，能力稍弱）
      3: { correct: 1.15, time: 0.8 }   // 阳阳（5岁，能力较强）
    };

    const multiplier = childMultipliers[childId] || childMultipliers[1];

    // 完整训练数据（10次）- 根据孩子调整
    const fullData = [
      { time: '第1次', date: '4月1日', correctRate: Math.min(100, Math.round(12.5 * multiplier.correct)), clickRate: Math.min(100, Math.round(20.0 * multiplier.correct)), avgTime: +(13.5 * multiplier.time).toFixed(1), errors: Math.max(0, Math.round(7 - (childId == 3 ? 2 : 0))), timeout: Math.max(0, Math.round(5 - (childId == 3 ? 2 : 0))), skip: Math.max(0, Math.round(2 - (childId == 3 ? 1 : 0))), totalClicks: 5, correctClicks: 1 },
      { time: '第2次', date: '4月3日', correctRate: Math.min(100, Math.round(25.0 * multiplier.correct)), clickRate: Math.min(100, Math.round(25.0 * multiplier.correct)), avgTime: +(11.2 * multiplier.time).toFixed(1), errors: Math.max(0, Math.round(6 - (childId == 3 ? 2 : 0))), timeout: Math.max(0, Math.round(3 - (childId == 3 ? 1 : 0))), skip: Math.max(0, Math.round(1 - (childId == 3 ? 1 : 0))), totalClicks: 8, correctClicks: 2 },
      { time: '第3次', date: '4月5日', correctRate: Math.min(100, Math.round(37.5 * multiplier.correct)), clickRate: Math.min(100, Math.round(25.0 * multiplier.correct)), avgTime: +(9.8 * multiplier.time).toFixed(1), errors: Math.max(0, Math.round(5 - (childId == 3 ? 2 : 0))), timeout: Math.max(0, Math.round(2 - (childId == 3 ? 1 : 0))), skip: 0, totalClicks: 12, correctClicks: 3 },
      { time: '第4次', date: '4月7日', correctRate: Math.min(100, Math.round(50.0 * multiplier.correct)), clickRate: Math.min(100, Math.round(22.2 * multiplier.correct)), avgTime: +(8.5 * multiplier.time).toFixed(1), errors: Math.max(0, Math.round(4 - (childId == 3 ? 2 : 0))), timeout: Math.max(0, Math.round(1 - (childId == 3 ? 1 : 0))), skip: 0, totalClicks: 18, correctClicks: 4 },
      { time: '第5次', date: '4月9日', correctRate: Math.min(100, Math.round(62.5 * multiplier.correct)), clickRate: Math.min(100, Math.round(22.7 * multiplier.correct)), avgTime: +(7.2 * multiplier.time).toFixed(1), errors: Math.max(0, Math.round(3 - (childId == 3 ? 1 : 0))), timeout: 0, skip: 0, totalClicks: 22, correctClicks: 5 },
      { time: '第6次', date: '4月11日', correctRate: Math.min(100, Math.round(75.0 * multiplier.correct)), clickRate: Math.min(100, Math.round(30.0 * multiplier.correct)), avgTime: +(6.5 * multiplier.time).toFixed(1), errors: Math.max(0, Math.round(2 - (childId == 3 ? 1 : 0))), timeout: 0, skip: 0, totalClicks: 20, correctClicks: 6 },
      { time: '第7次', date: '4月13日', correctRate: Math.min(100, Math.round(75.0 * multiplier.correct)), clickRate: Math.min(100, Math.round(35.3 * multiplier.correct)), avgTime: +(5.8 * multiplier.time).toFixed(1), errors: Math.max(0, Math.round(2 - (childId == 3 ? 1 : 0))), timeout: 0, skip: 0, totalClicks: 17, correctClicks: 6 },
      { time: '第8次', date: '4月15日', correctRate: Math.min(100, Math.round(87.5 * multiplier.correct)), clickRate: Math.min(100, Math.round(50.0 * multiplier.correct)), avgTime: +(5.2 * multiplier.time).toFixed(1), errors: Math.max(0, Math.round(1 - (childId == 3 ? 1 : 0))), timeout: 0, skip: 0, totalClicks: 14, correctClicks: 7 },
      { time: '第9次', date: '4月17日', correctRate: Math.min(100, Math.round(87.5 * multiplier.correct)), clickRate: Math.min(100, Math.round(58.3 * multiplier.correct)), avgTime: +(4.5 * multiplier.time).toFixed(1), errors: Math.max(0, Math.round(1 - (childId == 3 ? 1 : 0))), timeout: 0, skip: 0, totalClicks: 12, correctClicks: 7 },
      { time: '第10次', date: '4月19日', correctRate: Math.min(100, Math.round(100 * multiplier.correct)), clickRate: Math.min(100, Math.round(80.0 * multiplier.correct)), avgTime: +(3.2 * multiplier.time).toFixed(1), errors: 0, timeout: 0, skip: 0, totalClicks: 10, correctClicks: 8 }
    ];

    let currentCount = 10;
    let rateChart, timeChart;

    function getFilteredData(count) {
      return fullData.slice(-count);
    }

    function updateKPIs(data) {
      const latest = data[data.length - 1];
      const first = data[0];

      const correctDiff = latest.correctRate - first.correctRate;
      const clickDiff = latest.clickRate - first.clickRate;
      const timeDiff = ((first.avgTime - latest.avgTime) / first.avgTime * 100).toFixed(0);

      document.getElementById('kpiCorrectRate').textContent = latest.correctRate + '%';
      document.getElementById('kpiClickRate').textContent = latest.clickRate + '%';
      document.getElementById('kpiAvgTime').textContent = latest.avgTime + 's';
      document.getElementById('kpiTimeout').textContent = (latest.timeout + latest.skip) + '次';

      document.getElementById('kpiCorrectTrend').innerHTML = `<i class="fas fa-arrow-${correctDiff >= 0 ? 'up' : 'down'}"></i> ${correctDiff >= 0 ? '+' : ''}${correctDiff.toFixed(1)}%`;
      document.getElementById('kpiClickTrend').innerHTML = `<i class="fas fa-arrow-${clickDiff >= 0 ? 'up' : 'down'}"></i> ${clickDiff >= 0 ? '+' : ''}${clickDiff.toFixed(1)}%`;
      document.getElementById('kpiTimeTrend').innerHTML = `<i class="fas fa-arrow-down"></i> 缩短${timeDiff}%`;

      if (latest.timeout + latest.skip === 0) {
        document.getElementById('kpiTimeoutTrend').innerHTML = `<i class="fas fa-check"></i> 完全消除`;
      } else {
        document.getElementById('kpiTimeoutTrend').innerHTML = `<i class="fas fa-arrow-down"></i> 减少${first.timeout + first.skip - latest.timeout - latest.skip}次`;
      }
    }

    function updateTrendList(data) {
      const first = data[0];
      const last = data[data.length - 1];

      const html = `
        <div class="trend-item">
          <i class="fas fa-arrow-trend-up"></i>
          <span class="trend-text"><strong>正确率显著提升</strong>：从${first.correctRate}%→${last.correctRate}%</span>
        </div>
        <div class="trend-item">
          <i class="fas fa-arrow-trend-down"></i>
          <span class="trend-text"><strong>错误数迅速减少</strong>：从${first.errors}个→${last.errors}个</span>
        </div>
        <div class="trend-item">
          <i class="fas fa-gauge-high"></i>
          <span class="trend-text"><strong>效率明显提高</strong>：平均用时${first.avgTime}秒→${last.avgTime}秒</span>
        </div>
        <div class="trend-item">
          <i class="fas fa-face-smile"></i>
          <span class="trend-text"><strong>超时/跳过${last.timeout + last.skip === 0 ? '消失' : '减少'}</strong>：后期无焦虑逃避行为</span>
        </div>
      `;
      document.getElementById('trendList').innerHTML = html;
    }

    function updateProgressCompare(data) {
      const first = data[0];
      const last = data[data.length - 1];
      const prev = data.length > 1 ? data[data.length - 2] : first;

      const progressHtml = `
        <div class="progress-box green">
          <div class="box-title">
            <i class="fas fa-check-circle"></i> ✅ 进步之处
          </div>
          <ul class="box-list">
            <li>
              <i class="fas fa-trophy"></i>
              <span><strong>正确率达到${last.correctRate}%</strong> — 当前任务已${last.correctRate === 100 ? '完全' : '较好'}掌握</span>
            </li>
            <li>
              <i class="fas fa-bolt"></i>
              <span><strong>反应速度${last.avgTime < prev.avgTime ? '持续加快' : '保持稳定'}</strong> — 平均${last.avgTime}秒/轮</span>
            </li>
            <li>
              <i class="fas fa-heart"></i>
              <span><strong>信心${last.timeout + last.skip === 0 ? '十足' : '增强'}</strong> — ${last.timeout + last.skip === 0 ? '无超时跳过' : '焦虑行为减少'}</span>
            </li>
          </ul>
        </div>
        <div class="progress-box orange">
          <div class="box-title">
            <i class="fas fa-exclamation-triangle"></i> ⚠️ 仍存在的困难
          </div>
          <ul class="box-list">
            <li>
              <i class="fas fa-mouse"></i>
              <span><strong>点击精准度${last.clickRate >= 80 ? '良好' : '待提升'}</strong> — 正确点击率${last.clickRate}%</span>
            </li>
            <li>
              <i class="fas fa-brain"></i>
              <span><strong>${last.errors > 0 ? '仍有少量错误' : '对错误概念理解'}</strong> — ${last.errors > 0 ? `错误数${last.errors}个` : '可进一步深化认知'}</span>
            </li>
          </ul>
        </div>
      `;

      const barHtml = `
        <div class="compare-row">
          <span class="compare-label">正确率对比</span>
          <div class="compare-bar">
            <div class="compare-fill" style="width: ${first.correctRate}%;"></div>
          </div>
          <span class="compare-value">${data[0].time} ${first.correctRate}%</span>
        </div>
        <div class="compare-row">
          <span class="compare-label"></span>
          <div class="compare-bar">
            <div class="compare-fill" style="width: ${last.correctRate}%; background: linear-gradient(90deg, #9BBF7A, #6B8C4A);"></div>
          </div>
          <span class="compare-value" style="color: #6B8C4A;">${last.time} ${last.correctRate}%</span>
        </div>
      `;

      document.getElementById('progressCompareBox').innerHTML = progressHtml;
      document.getElementById('progressBarBox').innerHTML = barHtml;
    }

    function updateSuggestions(data) {
      const last = data[data.length - 1];

      let suggestionHtml = '';
      if (last.correctRate === 100) {
        suggestionHtml = `
          <div class="suggestion-item">
            <div class="suggestion-num">1</div>
            <div class="suggestion-content"><strong>继续保持当前节奏</strong> — 宝贝已达到很好的状态，可尝试加入稍微复杂的指物游戏。</div>
          </div>
          <div class="suggestion-item">
            <div class="suggestion-num">2</div>
            <div class="suggestion-content"><strong>帮助理解"错误"的意义</strong> — 引导思考："如果我点错了会怎样？"建立对错误的正确认知。</div>
          </div>
          <div class="suggestion-item">
            <div class="suggestion-num">3</div>
            <div class="suggestion-content"><strong>鼓励分享策略</strong> — 问他："你是怎么这么快找到的？"通过复述巩固学习成果。</div>
          </div>
        `;
      } else if (last.correctRate >= 80) {
        suggestionHtml = `
          <div class="suggestion-item">
            <div class="suggestion-num">1</div>
            <div class="suggestion-content"><strong>巩固当前成果</strong> — 正确率已达${last.correctRate}%，继续保持训练频率。</div>
          </div>
          <div class="suggestion-item">
            <div class="suggestion-num">2</div>
            <div class="suggestion-content"><strong>针对性练习</strong> — 重点关注易错物品，单独进行强化训练。</div>
          </div>
          <div class="suggestion-item">
            <div class="suggestion-num">3</div>
            <div class="suggestion-content"><strong>增加趣味性</strong> — 尝试计时挑战或奖励机制，保持积极性。</div>
          </div>
        `;
      } else {
        suggestionHtml = `
          <div class="suggestion-item">
            <div class="suggestion-num">1</div>
            <div class="suggestion-content"><strong>降低难度</strong> — 减少干扰项，从2-3个物品开始练习。</div>
          </div>
          <div class="suggestion-item">
            <div class="suggestion-num">2</div>
            <div class="suggestion-content"><strong>增加提示</strong> — 给予更多视觉或语言提示，帮助建立信心。</div>
          </div>
          <div class="suggestion-item">
            <div class="suggestion-num">3</div>
            <div class="suggestion-content"><strong>及时鼓励</strong> — 每次正确点击都给予积极反馈，强化正向行为。</div>
          </div>
        `;
      }
      document.getElementById('suggestionList').innerHTML = suggestionHtml;
    }

    function renderCharts(data) {
      const labels = data.map(d => d.time);
      const correctRates = data.map(d => d.correctRate);
      const avgTimes = data.map(d => d.avgTime);

      const ctx1 = document.getElementById('rateChart').getContext('2d');
      const ctx2 = document.getElementById('timeChart').getContext('2d');

      if (rateChart) rateChart.destroy();
      if (timeChart) timeChart.destroy();

      rateChart = new Chart(ctx1, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: '正确率 (%)',
            data: correctRates,
            borderColor: '#9BBF7A',
            backgroundColor: '#9BBF7A20',
            tension: 0.3,
            fill: true,
            pointBackgroundColor: '#9BBF7A',
            pointBorderColor: '#FFF',
            pointBorderWidth: 2,
            pointRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: (ctx) => `正确率: ${ctx.raw}%` } }
          },
          scales: {
            y: { min: 0, max: 100, grid: { color: '#F0E6DC' } },
            x: { grid: { display: false } }
          }
        }
      });

      timeChart = new Chart(ctx2, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: '平均用时 (秒)',
            data: avgTimes,
            borderColor: '#C68B54',
            backgroundColor: '#C68B5420',
            tension: 0.3,
            fill: true,
            pointBackgroundColor: '#C68B54',
            pointBorderColor: '#FFF',
            pointBorderWidth: 2,
            pointRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: (ctx) => `平均用时: ${ctx.raw}秒` } }
          },
          scales: {
            y: { min: 0, max: 16, grid: { color: '#F0E6DC' } },
            x: { grid: { display: false } }
          }
        }
      });
    }

    function updateAllContent(count) {
      const data = getFilteredData(count);
      const labelText = `最近${count}次`;

      document.getElementById('selectedFilterText').textContent = labelText;
      document.getElementById('chart1Label').textContent = labelText;
      document.getElementById('chart2Label').textContent = labelText;
      document.getElementById('reportRangeLabel').textContent = labelText;

      updateKPIs(data);
      updateTrendList(data);
      updateProgressCompare(data);
      updateSuggestions(data);
      renderCharts(data);
    }

    function toggleDropdown() {
      const menu = document.getElementById('dropdownMenu');
      const overlay = document.getElementById('overlay');
      const arrow = document.getElementById('dropdownArrow');

      menu.classList.toggle('show');
      overlay.classList.toggle('show');
      arrow.className = menu.classList.contains('show') ? 'fas fa-chevron-up' : 'fas fa-chevron-down';
    }

    function closeDropdown() {
      const menu = document.getElementById('dropdownMenu');
      const overlay = document.getElementById('overlay');
      const arrow = document.getElementById('dropdownArrow');

      menu.classList.remove('show');
      overlay.classList.remove('show');
      arrow.className = 'fas fa-chevron-down';
    }

    function selectFilter(count, label) {
      currentCount = count;

      document.querySelectorAll('.dropdown-item').forEach(item => {
        const itemCount = parseInt(item.dataset.count);
        const checkIcon = item.querySelector('.fa-check');

        if (itemCount === count) {
          item.classList.add('active');
          if (checkIcon) checkIcon.style.opacity = '1';
        } else {
          item.classList.remove('active');
          if (checkIcon) checkIcon.style.opacity = '0';
        }
      });

      updateAllContent(count);
      closeDropdown();
      showToast(`📊 已切换至${label}数据`);
    }

    function goBack() {
      location.href = 'dataLook.html';
    }

    function goToTraining() {
      showToast(`🎮 跳转到${child.name}宝贝的指物练习训练界面...`);
      setTimeout(() => {
        location.href = `touchGame.html?childId=${childId}`;
      }, 800);
    }

    function showToast(msg) {
      let t = document.querySelector('.toast-msg');
      if (t) t.remove();
      t = document.createElement('div');
      t.className = 'toast-msg';
      t.innerHTML = `<i class="fas fa-star"></i> ${msg}`;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2000);
    }

    // 初始化
    updateAllContent(10);
  </script>
</body>

</html>
