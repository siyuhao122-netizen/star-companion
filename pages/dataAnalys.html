<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星伴 · 指物游戏 | 深度分析报告</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <link rel="stylesheet" href="../css/dataAnalys.css">
</head>

<body>
  <div class="analysis-container">
    <div class="overlay" id="overlay" onclick="closeDropdown()"></div>

    <div class="scroll-content">
      <!-- 头部 -->
      <div class="header">
        <div class="back-btn" onclick="goBack()">
          <i class="fas fa-arrow-left"></i>
        </div>
        <h1>
          <i class="fas fa-hand-peace"></i>
          指物游戏
          <span>· 深度分析</span>
        </h1>

        <div class="header-right">
          <div class="child-badge" id="childBadge">
            <i class="fas fa-face-smile"></i>
            <span id="childDisplayInfo">乐乐 · 3岁 · 男孩</span>
          </div>

          <!-- 下拉选择框 -->
          <div class="filter-dropdown">
            <div class="filter-btn" onclick="toggleDropdown()">
              <i class="fas fa-list-ol"></i>
              <span class="selected-text" id="selectedFilterText">最近10次</span>
              <i class="fas fa-chevron-down" id="dropdownArrow"></i>
            </div>
            <div class="dropdown-menu" id="dropdownMenu">
              <div class="dropdown-item active" data-count="10" onclick="selectFilter(10, '最近10次')">
                <span>最近10次</span>
                <i class="fas fa-check" style="font-size: 11px;"></i>
              </div>
              <div class="dropdown-item" data-count="9" onclick="selectFilter(9, '最近9次')">
                <span>最近9次</span>
                <i class="fas fa-check" style="font-size: 11px; opacity: 0;"></i>
              </div>
              <div class="dropdown-item" data-count="8" onclick="selectFilter(8, '最近8次')">
                <span>最近8次</span>
                <i class="fas fa-check" style="font-size: 11px; opacity: 0;"></i>
              </div>
              <div class="dropdown-item" data-count="7" onclick="selectFilter(7, '最近7次')">
                <span>最近7次</span>
                <i class="fas fa-check" style="font-size: 11px; opacity: 0;"></i>
              </div>
              <div class="dropdown-item" data-count="6" onclick="selectFilter(6, '最近6次')">
                <span>最近6次</span>
                <i class="fas fa-check" style="font-size: 11px; opacity: 0;"></i>
              </div>
              <div class="dropdown-item" data-count="5" onclick="selectFilter(5, '最近5次')">
                <span>最近5次</span>
                <i class="fas fa-check" style="font-size: 11px; opacity: 0;"></i>
              </div>
              <div class="dropdown-item" data-count="4" onclick="selectFilter(4, '最近4次')">
                <span>最近4次</span>
                <i class="fas fa-check" style="font-size: 11px; opacity: 0;"></i>
              </div>
              <div class="dropdown-item" data-count="3" onclick="selectFilter(3, '最近3次')">
                <span>最近3次</span>
                <i class="fas fa-check" style="font-size: 11px; opacity: 0;"></i>
              </div>
              <div class="dropdown-item" data-count="2" onclick="selectFilter(2, '最近2次')">
                <span>最近2次</span>
                <i class="fas fa-check" style="font-size: 11px; opacity: 0;"></i>
              </div>
              <div class="dropdown-item" data-count="1" onclick="selectFilter(1, '最近1次')">
                <span>最近1次</span>
                <i class="fas fa-check" style="font-size: 11px; opacity: 0;"></i>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 核心指标卡片 -->
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-icon"><i class="fas fa-bullseye"></i></div>
          <div class="kpi-value" id="kpiCorrectRate">100%</div>
          <div class="kpi-label">最新正确率</div>
          <span class="kpi-trend trend-up" id="kpiCorrectTrend"><i class="fas fa-arrow-up"></i> +87.5%</span>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon"><i class="fas fa-mouse-pointer"></i></div>
          <div class="kpi-value" id="kpiClickRate">80%</div>
          <div class="kpi-label">最新点击正确率</div>
          <span class="kpi-trend trend-up" id="kpiClickTrend"><i class="fas fa-arrow-up"></i> +60%</span>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon"><i class="fas fa-clock"></i></div>
          <div class="kpi-value" id="kpiAvgTime">3.2s</div>
          <div class="kpi-label">平均用时</div>
          <span class="kpi-trend trend-up" id="kpiTimeTrend"><i class="fas fa-arrow-down"></i> 缩短76%</span>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon"><i class="fas fa-times-circle"></i></div>
          <div class="kpi-value" id="kpiTimeout">0次</div>
          <div class="kpi-label">超时/跳过</div>
          <span class="kpi-trend trend-up" id="kpiTimeoutTrend"><i class="fas fa-check"></i> 完全消除</span>
        </div>
      </div>

      <!-- 图表区域 -->
      <div class="chart-row">
        <div class="chart-box">
          <div class="chart-header">
            <i class="fas fa-chart-line"></i>
            <h3>正确率趋势（<span id="chart1Label">近10次</span>）</h3>
          </div>
          <canvas id="rateChart"></canvas>
        </div>
        <div class="chart-box">
          <div class="chart-header">
            <i class="fas fa-gauge-high"></i>
            <h3>平均用时变化（<span id="chart2Label">近10次</span>）</h3>
          </div>
          <canvas id="timeChart"></canvas>
        </div>
      </div>

      <!-- 分析报告区域 -->
      <div class="report-card">
        <div class="section-title">
          <i class="fas fa-clipboard-list"></i>
          <span>📋 智能分析报告（基于<span id="reportRangeLabel">最近10次</span>数据）</span>
        </div>

        <!-- 一、整体变化趋势 -->
        <div class="analysis-block">
          <div class="block-header">
            <i class="fas fa-chart-pie"></i>
            <span>一、数据的整体变化趋势</span>
          </div>
          <div class="trend-list" id="trendList">
            <!-- 动态生成 -->
          </div>
        </div>

        <!-- 二、最新一次的具体进步与困难 -->
        <div class="analysis-block">
          <div class="block-header">
            <i class="fas fa-star"></i>
            <span>二、最新一次相较于前面几次的进步与困难</span>
          </div>

          <div class="progress-double-box" id="progressCompareBox">
            <!-- 动态生成 -->
          </div>

          <div class="progress-compare" id="progressBarBox">
            <!-- 动态生成 -->
          </div>
        </div>

        <!-- 三、家庭干预建议 -->
        <div class="analysis-block" style="margin-bottom: 0;">
          <div class="block-header">
            <i class="fas fa-lightbulb"></i>
            <span>三、家庭干预建议</span>
          </div>
          <div class="suggestion-list" id="suggestionList">
            <!-- 动态生成 -->
          </div>
        </div>
      </div>

      <!-- 底部操作 -->
      <div class="action-bar">
        <button class="btn-primary" onclick="goToTraining()">
          <i class="fas fa-play-circle"></i> 开始训练
        </button>
      </div>
    </div>
  </div>
<script src="../js/dataAnalys.js"></script>

</body>

</html>
