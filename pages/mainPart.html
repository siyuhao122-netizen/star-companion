<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>星伴 · 暖愈家长端 | 图标导航 · 首页即每日计划</title>
  <!-- 字体与图标库 -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../css/mainPart.css">
</head>

<body>
  <div class="dashboard">
    <div class="overlay" id="overlay"></div>

    <!-- 滚动内容区域 -->
    <div class="scrollable-area">
      <!-- 头部区域 -->
      <div class="header-row">
        <div class="brand">
          <div class="logo-icon">
            <i class="fas fa-star"></i>
          </div>
          <div class="brand-text">
            <h1>星伴</h1>
            <div class="sub">Stellar Companion</div>
          </div>
        </div>

        <!-- 右侧区域 -->
        <div class="header-right">
          <!-- 孩子信息卡片 -->
          <div class="child-info-card" id="childInfoCard">
            <div class="child-avatar" id="currentChildAvatar">
              <i class="fas fa-face-smile"></i>
            </div>
            <div class="child-details">
              <div class="child-name-row">
                <span class="child-name" id="currentChildName">乐乐</span>
                <span class="child-age" id="currentChildAge">3岁</span>
              </div>
              <div class="switch-hint">
                <i class="fas fa-chevron-down"></i>
                <span>切换宝贝</span>
              </div>
            </div>
          </div>

          <!-- 孩子切换下拉菜单 -->
          <div class="child-switch-dropdown" id="childDropdown">
            <div class="dropdown-header">
              <i class="fas fa-users"></i> 我的宝贝们
            </div>
            <ul class="child-list" id="childList"></ul>
          </div>

          <!-- 家长头像 -->
<div class="parent-avatar" id="parentAvatarBtn" onclick="window.location.href='peopleHome.html'">
    <div class="avatar-circle">
        <i class="fas fa-user-circle"></i>
    </div>
</div>
        </div>
      </div>

      <!-- 金句横幅 -->
      <div class="quote-banner" id="quoteBanner">
        <i class="fas fa-leaf"></i>
        <span id="quoteText">今天的陪伴，是孩子明天心里最暖的光</span>
      </div>

      <!-- 三大核心技能卡片 -->
      <div class="skills-wrapper">
        <div class="skill-item" data-game="name">
          <div class="skill-icon-bg"><i class="fas fa-ear-listen"></i></div>
          <h3>叫名反应</h3>
          <p>听觉·社交回应</p>
        </div>
        <div class="skill-item" data-game="point">
          <div class="skill-icon-bg"><i class="fas fa-hand-peace"></i></div>
          <h3>指物练习</h3>
          <p>共同注意·表达</p>
        </div>
        <div class="skill-item" data-game="mic">
          <div class="skill-icon-bg"><i class="fas fa-microphone-alt"></i></div>
          <h3>声音小话筒</h3>
          <p>发声启蒙·语言意愿</p>
        </div>
      </div>

      <!-- 今日推荐区域 -->
      <div class="rec-section-header">
        <h2><i class="fas fa-calendar-alt"></i> 今日推荐</h2>
        <div class="recommend-tip" id="recommendTip">
          <i class="fas fa-lightbulb"></i>
          <span id="tipText">根据宝贝情况智能推荐</span>
        </div>
      </div>

      <div class="rec-cards" id="recCardsContainer">
        <!-- 动态生成推荐卡片 -->
      </div>

      <div class="spacer"></div>
    </div>

    <!-- 底部导航栏 -->
    <div class="bottom-nav">
      <div class="nav-items">
        <div class="nav-item active" data-nav="首页">
          <i class="fas fa-home"></i>
          <span>首页</span>
        </div>
        <div class="nav-item" data-nav="数据看板">
          <i class="fas fa-chart-bar"></i>
          <span>数据看板</span>
        </div>
        <div class="nav-item" data-nav="家长树洞">
          <i class="fas fa-tree"></i>
          <span>家长树洞</span>
        </div>
        <div class="nav-item" data-nav="问卷筛查">
          <i class="fas fa-clipboard-list"></i>
          <span>问卷筛查</span>
        </div>
      </div>
    </div>
  </div>
<script src="../js/mainPart.js"></script>
</body>

</html>
