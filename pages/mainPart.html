<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>星伴 · 暖愈家长端 | 高保真宽屏 · 声音小话筒 & 数据看板图标</title>
  <!-- 字体与图标库 -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 全新背景：柔和暖灰 + 自然光感 */
    body {
      background: #F7F4EE;
      /* 温暖米灰基底 */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', 'Noto Sans SC', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 24px;
    }

    /* 主容器 1024x600，轻盈微磨砂白，自然木色点缀 */
    .dashboard {
      width: 1024px;
      height: 600px;
      background: #FFFDF9;
      border-radius: 40px;
      box-shadow: 0 25px 45px -12px rgba(78, 55, 36, 0.18), 0 0 0 1px rgba(248, 235, 218, 0.6);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* 滚动区域保持清爽 */
    .main-content {
      flex: 1;
      padding: 22px 32px 26px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .main-content::-webkit-scrollbar {
      width: 5px;
      background: #F2EBE0;
    }

    .main-content::-webkit-scrollbar-thumb {
      background: #D9CAB5;
      border-radius: 10px;
    }

    /* ========= 头部区域 ========= 优化配色温和 */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: #EADBC6;
      /* 亚麻暖色 */
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #B47C44;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
    }

    .brand-text h1 {
      font-size: 30px;
      font-weight: 700;
      color: #3D2A1C;
      letter-spacing: -0.3px;
      line-height: 1.1;
    }

    .brand-text .sub {
      font-size: 13px;
      font-weight: 500;
      color: #9B856C;
      letter-spacing: 0.3px;
    }

    .parent-badge {
      background: #F3EDE4;
      padding: 8px 20px;
      border-radius: 48px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 14px;
      color: #A47148;
      backdrop-filter: blur(2px);
      border: 1px solid #E9DDCF;
    }

    .parent-badge i {
      font-size: 16px;
      color: #BD8A5A;
    }

    /* 金句横幅 — 更自然的手写感，轻柔背景 */
    .quote-banner {
      background: #FCF8F0;
      border-radius: 32px;
      padding: 14px 24px;
      border: 1px solid #F2E5D6;
      display: flex;
      align-items: center;
      gap: 14px;
      backdrop-filter: blur(2px);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }

    .quote-banner i {
      font-size: 28px;
      color: #E7B87B;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.05));
    }

    .quote-banner span {
      font-size: 18px;
      font-weight: 500;
      color: #7A5A3A;
      letter-spacing: -0.2px;
      font-family: 'Inter', 'Noto Sans SC', system-ui;
      background: linear-gradient(135deg, #B77C48, #9B5E2E);
      background-clip: text;
      -webkit-background-clip: text;
      color: #A66F42;
    }

    /* 三技能卡片 — 温润莫兰迪色系 (第三个改为声音小话筒) */
    .skills-wrapper {
      display: flex;
      gap: 20px;
      margin: 6px 0 6px 0;
    }

    .skill-item {
      flex: 1;
      background: #FEFCF8;
      border-radius: 32px;
      padding: 16px 12px;
      text-align: center;
      border: 1px solid #F0E6DB;
      transition: all 0.2s;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
    }

    .skill-icon-bg {
      width: 60px;
      height: 60px;
      background: #F8EFE4;
      margin: 0 auto 12px;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: #C28958;
    }

    .skill-item h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #4E3622;
    }

    .skill-item p {
      font-size: 12px;
      color: #9B846C;
    }

    /* 今日推荐区域 — 整体缩小字号与间距，卡片更精致 */
    .rec-section-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin: 4px 0 12px 0;
    }

    .rec-section-header h2 {
      font-size: 20px;
      font-weight: 700;
      color: #3A2A1C;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rec-section-header h2 i {
      font-size: 18px;
      color: #D9A066;
    }

    .rec-section-header span {
      font-size: 12px;
      color: #B29B80;
      font-weight: 450;
    }

    /* 三个推荐卡片尺寸略微缩小，内边距调整，更轻巧 */
    .rec-cards {
      display: flex;
      gap: 18px;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .rec-card {
      flex: 1;
      background: #FFFFFF;
      border-radius: 28px;
      padding: 14px 16px;
      box-shadow: 0 6px 12px rgba(90, 65, 45, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
      border: 1px solid #EFE4D8;
      transition: transform 0.1s;
      display: flex;
      flex-direction: column;
    }

    .rec-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .rec-icon-lg {
      width: 44px;
      height: 44px;
      background: #FBF5EC;
      border-radius: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #C28B5A;
    }

    .rec-title {
      font-weight: 700;
      font-size: 15px;
      color: #4D3622;
      letter-spacing: -0.2px;
    }

    .success-chip {
      background: #F8F2EA;
      padding: 5px 10px;
      border-radius: 32px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 500;
      width: fit-content;
      margin-bottom: 14px;
    }

    .success-chip i {
      color: #C89A6B;
      font-size: 11px;
    }

    .rate-number {
      font-weight: 800;
      color: #B57A48;
    }

    .train-btn {
      background: #EADBCA;
      border: none;
      padding: 8px 0;
      border-radius: 44px;
      color: #6B4A2C;
      font-weight: 700;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: auto;
      width: 100%;
      font-family: inherit;
    }

    .train-btn i {
      font-size: 12px;
      color: #AF7A48;
    }

    .train-btn:active {
      transform: scale(0.96);
      background: #DECBAE;
      color: #533E28;
    }

    .train-btn:hover {
      background: #E1CFB9;
    }

    /* 底部四个导航卡片 — 柔和大地色 + 图标强化 */
    .footer-nav {
      display: flex;
      gap: 18px;
      margin-top: 12px;
      margin-bottom: 6px;
    }

    .nav-module {
      flex: 1;
      background: #FEFCF7;
      border-radius: 28px;
      padding: 10px 6px;
      text-align: center;
      border: 1px solid #EEE2D4;
      cursor: pointer;
      transition: all 0.15s;
    }

    .nav-module i {
      font-size: 28px;
      color: #BB8B60;
      margin-bottom: 6px;
      display: block;
      transition: transform 0.1s;
    }

    .nav-module span {
      font-size: 13px;
      font-weight: 600;
      color: #6F523A;
    }

    .nav-module:active {
      background: #F5ECE2;
      transform: scale(0.97);
    }

    .nav-module:hover i {
      transform: translateY(-2px);
    }

    /* 额外小点缀 */
    .toast-message {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: #FFFFFFE6;
      backdrop-filter: blur(12px);
      color: #6A4A2C;
      padding: 8px 24px;
      border-radius: 48px;
      font-weight: 600;
      font-size: 13px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      border: 1px solid #F0E0CE;
      z-index: 2000;
      pointer-events: none;
      white-space: nowrap;
      font-family: inherit;
    }

    @media (max-width: 1024px) {
      .dashboard {
        width: 100%;
        height: auto;
        min-height: 600px;
      }

      body {
        padding: 16px;
      }
    }

    .skill-item:hover,
    .rec-card:hover,
    .nav-module:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(92, 68, 45, 0.08);
      border-color: #E3D4C2;
    }
  </style>
</head>

<body>
  <div class="dashboard">
    <div class="main-content">
      <!-- 头部区域 -->
      <div class="header-row">
        <div class="brand">
          <div class="logo-icon">
            <i class="fas fa-star-of-life"></i>
          </div>
          <div class="brand-text">
            <h1>星伴</h1>
            <div class="sub">Stellar Companion</div>
          </div>
        </div>
        <div class="parent-badge">
          <i class="fas fa-user-shield"></i>
          <span>家长模式</span>
        </div>
      </div>

      <!-- 温暖金句 更自然语气 -->
      <div class="quote-banner">
        <i class="fas fa-leaf"></i>
        <span>今天的陪伴，是孩子明天心里最暖的光</span>
      </div>

      <!-- 三大核心技能：叫名反应 / 指物练习 / 声音小话筒 (原模范动作已替换) -->
      <div class="skills-wrapper">
        <div class="skill-item" data-skill="叫名反应">
          <div class="skill-icon-bg"><i class="fas fa-ear-listen"></i></div>
          <h3>叫名反应</h3>
          <p>听觉·社交回应</p>
        </div>
        <div class="skill-item" data-skill="指物练习">
          <div class="skill-icon-bg"><i class="fas fa-hand-peace"></i></div>
          <h3>指物练习</h3>
          <p>共同注意·表达</p>
        </div>
        <div class="skill-item" data-skill="声音小话筒">
          <div class="skill-icon-bg"><i class="fas fa-microphone-alt"></i></div>
          <h3>声音小话筒</h3>
          <p>发声启蒙·语言意愿</p>
        </div>
      </div>

      <!-- 今日推荐区域 (三个卡片，对应三个游戏，第三个改为声音小话筒) -->
      <div class="rec-section-header">
        <h2><i class="fas fa-calendar-alt"></i> 今日推荐</h2>
        <span>贴心匹配 · 轻量练习</span>
      </div>

      <div class="rec-cards">
        <!-- 推荐1 - 叫名反应进阶游戏 -->
        <div class="rec-card">
          <div class="rec-top">
            <div class="rec-icon-lg"><i class="fas fa-comment-dots"></i></div>
            <div class="rec-title">叫名反应 · 进阶游戏</div>
          </div>
          <div class="success-chip">
            <i class="fas fa-chart-line"></i>
            <span>上次成功率：<span class="rate-number">50%</span></span>
          </div>
          <button class="train-btn" data-training="叫名反应 · 进阶游戏">
            <i class="fas fa-play-circle"></i> 开始训练
          </button>
        </div>
        <!-- 推荐2 - 指物练习 趣味指认 -->
        <div class="rec-card">
          <div class="rec-top">
            <div class="rec-icon-lg"><i class="fas fa-fingerprint"></i></div>
            <div class="rec-title">指物练习 · 趣味指认</div>
          </div>
          <div class="success-chip">
            <i class="fas fa-chart-line"></i>
            <span>上次成功率：<span class="rate-number">50%</span></span>
          </div>
          <button class="train-btn" data-training="指物练习 · 趣味指认">
            <i class="fas fa-play-circle"></i> 开始训练
          </button>
        </div>
        <!-- 推荐3 - 声音小话筒 · 发声启蒙 (原模范动作替换) -->
        <div class="rec-card">
          <div class="rec-top">
            <div class="rec-icon-lg"><i class="fas fa-microphone-alt"></i></div>
            <div class="rec-title">声音小话筒 · 发声启蒙</div>
          </div>
          <div class="success-chip">
            <i class="fas fa-chart-line"></i>
            <span>上次成功率：<span class="rate-number">50%</span></span>
          </div>
          <button class="train-btn" data-training="声音小话筒 · 发声启蒙">
            <i class="fas fa-play-circle"></i> 开始训练
          </button>
        </div>
      </div>

      <!-- 底部四个核心入口 数据看板/每日计划/家长树洞/问卷筛查 (数据看板增加醒目图标强化) -->
      <div class="footer-nav">
        <div class="nav-module" data-nav="数据看板">
          <i class="fas fa-chart-pie"></i>
          <span>数据看板</span>
        </div>
        <div class="nav-module" data-nav="每日计划">
          <i class="fas fa-calendar-check"></i>
          <span>每日计划</span>
        </div>
        <div class="nav-module" data-nav="家长树洞">
          <i class="fas fa-tree"></i>
          <span>家长树洞</span>
        </div>
        <div class="nav-module" data-nav="问卷筛查">
          <i class="fas fa-clipboard-list"></i>
          <span>问卷筛查</span>
        </div>
      </div>
      <div style="height: 2px;"></div>
    </div>
  </div>

  <script>
    // 更自然的提示反馈，融入柔和配色
    function showGentleToast(msg, bgLight = '#FEF4E8') {
      let existing = document.querySelector('.gentle-toast-ui');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'gentle-toast-ui';
      toast.innerText = msg;
      toast.style.position = 'fixed';
      toast.style.bottom = '28px';
      toast.style.left = '50%';
      toast.style.transform = 'translateX(-50%)';
      toast.style.backgroundColor = bgLight;
      toast.style.color = '#7D5D42';
      toast.style.padding = '8px 22px';
      toast.style.borderRadius = '48px';
      toast.style.fontWeight = '500';
      toast.style.fontSize = '13px';
      toast.style.zIndex = '9999';
      toast.style.boxShadow = '0 10px 18px rgba(88, 57, 33, 0.1)';
      toast.style.backdropFilter = 'blur(8px)';
      toast.style.fontFamily = "'Inter', 'Noto Sans SC', sans-serif";
      toast.style.whiteSpace = 'nowrap';
      toast.style.border = '1px solid #F3E2D2';
      toast.style.pointerEvents = 'none';
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.2s';
        setTimeout(() => toast.remove(), 250);
      }, 1700);
    }

    // 所有开始训练按钮
    const trainBtns = document.querySelectorAll('.train-btn');
    trainBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const trainingName = btn.getAttribute('data-training') || '训练任务';
        showGentleToast(`🌟 开始「${trainingName}」陪伴成长`, '#FFF5EB');
      });
    });

    // 底部四个导航模块点击
    const navModules = document.querySelectorAll('.nav-module');
    navModules.forEach(mod => {
      mod.addEventListener('click', (e) => {
        const navName = mod.getAttribute('data-nav') || mod.querySelector('span')?.innerText || '功能';
        showGentleToast(`📘 开启 ${navName} · 记录点滴进步`, '#FEF7EF');
      });
    });

    // 三大技能卡片（叫名反应/指物练习/声音小话筒）轻反馈
    const skillItems = document.querySelectorAll('.skill-item');
    skillItems.forEach(skill => {
      skill.addEventListener('click', () => {
        const skillTitle = skill.querySelector('h3')?.innerText || '技能';
        showGentleToast(`✨ 核心练习：「${skillTitle}」，看见每一次成长`, '#FCF5EA');
      });
    });

    // 家长模式轻提醒
    const parentBtn = document.querySelector('.parent-badge');
    if (parentBtn) {
      parentBtn.addEventListener('click', () => {
        showGentleToast('👪 家长模式 · 专属报告与建议', '#F8EFE4');
      });
    }

    // 金句点击小惊喜（温和）
    const quoteDiv = document.querySelector('.quote-banner');
    if (quoteDiv) {
      quoteDiv.addEventListener('click', () => {
        showGentleToast('🌼 陪伴的每一刻，都在点亮星辰', '#FCF2E6');
      });
    }

    // 确保修改完成：第三个游戏声音小话筒，今日推荐也对应声音小话筒，数据看板图标已强化
    console.log('暖愈版星伴界面 · 已替换为声音小话筒 · 数据看板图标强化');
  </script>
  <style>
    /* 额外适配更圆润细节 */
    .dashboard {
      transition: all 0.2s;
    }

    .global-toast-msg,
    .gentle-toast-ui {
      transition: opacity 0.2s;
      letter-spacing: 0.2px;
    }

    button {
      background: none;
      border: none;
    }

    .train-btn {
      background: #F0E4D6;
      transition: all 0.2s;
    }

    .train-btn:hover {
      background: #E7D5C2;
      cursor: pointer;
    }

    .nav-module,
    .skill-item {
      transition: all 0.2s ease;
    }

    .success-chip .rate-number {
      font-weight: 800;
    }

    /* 今日推荐卡片标题与图标稍小一点，满足“今日推荐可以小点”的需求 */
    .rec-title {
      font-size: 14px;
    }

    .rec-icon-lg {
      width: 40px;
      height: 40px;
      font-size: 22px;
    }

    .success-chip {
      font-size: 11px;
      padding: 4px 10px;
    }

    .train-btn {
      font-size: 12px;
      padding: 7px 0;
    }

    .rec-card {
      padding: 12px 14px;
    }

    /* 确保1024x600无额外滚动条破坏美感 */
    @media (max-height: 610px) {
      .main-content {
        padding: 18px 28px 18px 28px;
        gap: 16px;
      }

      .skills-wrapper {
        margin: 2px 0;
      }

      .rec-section-header {
        margin: 0 0 8px;
      }
    }

    /* 保证所有文本易读 */
    .quote-banner span {
      font-weight: 510;
    }

    /* 数据看板图标增加微动效 */
    .nav-module[data-nav="数据看板"] i {
      color: #D99E5C;
      text-shadow: 0 0 2px rgba(217, 158, 92, 0.3);
    }
  </style>
</body>

</html>
