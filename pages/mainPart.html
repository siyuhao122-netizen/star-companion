<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>星伴 · 暖愈家长端 | 图标导航 · 首页即每日计划</title>
  <!-- 字体与图标库 -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #D9CBBF;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      padding: 12px;
    }

    /* 主容器 — 固定尺寸 1024x600 */
    .dashboard {
      width: 1024px;
      height: 600px;
      background: #FFFDF9;
      border-radius: 48px;
      box-shadow: 0 30px 45px -12px rgba(78, 55, 36, 0.2), 0 0 0 1px rgba(248, 235, 218, 0.6);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* 滚动内容区域 — 为底部导航留出空间 */
    .scrollable-area {
      flex: 1;
      overflow-y: auto;
      padding: 22px 28px 20px 28px;
      scrollbar-width: thin;
      padding-bottom: 70px;
    }

    .scrollable-area::-webkit-scrollbar {
      width: 5px;
      background: #F2EBE0;
    }

    .scrollable-area::-webkit-scrollbar-thumb {
      background: #D9CAB5;
      border-radius: 10px;
    }

    /* ========= 头部区域 ========= */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(145deg, #F8ECDE, #EADBC6);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #B47C44;
      border: 1.5px solid #EDD9C6;
    }

    .brand-text h1 {
      font-size: 30px;
      font-weight: 800;
      color: #5E422C;
      letter-spacing: 1px;
      line-height: 1.1;
    }

    .brand-text .sub {
      font-size: 12px;
      font-weight: 500;
      color: #9B856C;
      letter-spacing: 3px;
    }

    .center-title-wrapper {
      text-align: center;
    }

    .main-title-center {
      font-size: 24px;
      font-weight: 700;
      color: #6C4F32;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #FCF4EA;
      padding: 8px 24px;
      border-radius: 48px;
      border: 1px solid #EDDDCF;
    }

    .main-title-center i {
      color: #D9A066;
      font-size: 22px;
    }

    .parent-avatar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      cursor: pointer;
    }

    .avatar-circle {
      width: 52px;
      height: 52px;
      background: linear-gradient(145deg, #F8EFE4, #F0E2D4);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #BD8A5A;
      border: 2px solid #EDD9C6;
      transition: all 0.1s;
    }

    .parent-avatar:active .avatar-circle {
      transform: translateY(2px);
    }

    /* 金句横幅 */
    .quote-banner {
      background: linear-gradient(135deg, #FCF8F0, #F8EFE4);
      border-radius: 40px;
      padding: 14px 26px;
      border: 1.5px solid #F2E5D6;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .quote-banner i {
      font-size: 28px;
      color: #E7B87B;
    }

    .quote-banner span {
      font-size: 18px;
      font-weight: 600;
      color: #8F6A44;
    }

    /* 三技能卡片 */
    .skills-wrapper {
      display: flex;
      gap: 18px;
      margin-bottom: 24px;
    }

    .skill-item {
      flex: 1;
      background: #FEFCF8;
      border-radius: 36px;
      padding: 18px 12px;
      text-align: center;
      border: 2px solid #F0E6DB;
      cursor: pointer;
      transition: all 0.2s;
    }

    .skill-item:active {
      transform: scale(0.98);
    }

    .skill-icon-bg {
      width: 64px;
      height: 64px;
      background: linear-gradient(145deg, #F8EFE4, #F0E2D4);
      margin: 0 auto 14px;
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: #C28958;
      border: 1.5px solid #EDD9C6;
    }

    .skill-item h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #5E422C;
    }

    .skill-item p {
      font-size: 13px;
      color: #9B846C;
      font-weight: 500;
    }

    /* 今日推荐区域 */
    .rec-section-header {
      margin: 4px 0 14px 0;
    }

    .rec-section-header h2 {
      font-size: 22px;
      font-weight: 700;
      color: #5E422C;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rec-section-header h2 i {
      font-size: 20px;
      color: #D9A066;
    }

    .rec-cards {
      display: flex;
      gap: 18px;
      margin-bottom: 10px;
    }

    .rec-card {
      flex: 1;
      background: #FFFFFF;
      border-radius: 32px;
      padding: 16px 16px 14px;
      border: 2px solid #EFE4D8;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
    }

    .rec-card:active {
      transform: scale(0.98);
    }

    .rec-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .rec-icon-lg {
      width: 48px;
      height: 48px;
      background: linear-gradient(145deg, #FBF5EC, #F3E6D6);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #C28B5A;
      border: 1.5px solid #EDD9C6;
    }

    .rec-title {
      font-weight: 700;
      font-size: 15px;
      color: #5E422C;
      line-height: 1.3;
    }

    .success-chip {
      background: #F8F2EA;
      padding: 6px 14px;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 500;
      width: fit-content;
      margin-bottom: 16px;
      border: 1px solid #EDDDCF;
    }

    .success-chip i {
      color: #D9A066;
    }

    .rate-number {
      font-weight: 800;
      color: #B57A48;
      margin-left: 4px;
    }

    .train-btn {
      background: linear-gradient(145deg, #EADBCA, #E0CDB6);
      border: none;
      padding: 10px 0;
      border-radius: 48px;
      color: #6C4E32;
      font-weight: 700;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      margin-top: auto;
      width: 100%;
      font-family: inherit;
      transition: all 0.15s;
      border: 1.5px solid #DDBB9A;
    }

    .train-btn:active {
      transform: scale(0.97);
    }

    /* ========= 底部导航栏 - 图片风格 ========= */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      background: #FFFDF9;
      border-top: 1px solid #EFE4D8;
      padding: 12px 0 16px 0;
      z-index: 100;
    }

    .nav-items {
      display: flex;
      justify-content: space-around;
      align-items: center;
      max-width: 800px;
      margin: 0 auto;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-item i {
      font-size: 24px;
      color: #B7A089;
      transition: all 0.2s;
    }

    .nav-item span {
      font-size: 13px;
      font-weight: 600;
      color: #A68A6F;
      transition: all 0.2s;
    }

    /* 激活状态 */
    .nav-item.active i {
      color: #D9A066;
    }

    .nav-item.active span {
      color: #B47C44;
    }

    .nav-item:active {
      transform: scale(0.95);
    }

    /* 额外留白 */
    .spacer {
      height: 8px;
    }
  </style>
</head>

<body>
  <div class="dashboard">
    <!-- 滚动内容区域 -->
    <div class="scrollable-area">
      <!-- 头部区域 -->
      <div class="header-row">
        <div class="brand">
          <div class="logo-icon">
            <i class="fas fa-star"></i>
          </div>
          <div class="brand-text">
            <h1>星伴</h1>
            <div class="sub">Stellar Companion</div>
          </div>
        </div>

        <div class="center-title-wrapper">
          <div class="main-title-center">
            <i class="fas fa-heart"></i>
            <span>暖愈成长空间</span>
          </div>
        </div>

        <div class="parent-avatar" id="parentAvatarBtn">
          <div class="avatar-circle">
            <i class="fas fa-user-circle"></i>
          </div>
        </div>
      </div>

      <!-- 金句横幅 -->
      <div class="quote-banner">
        <i class="fas fa-leaf"></i>
        <span>今天的陪伴，是孩子明天心里最暖的光</span>
      </div>

      <!-- 三大核心技能卡片 -->
      <div class="skills-wrapper">
        <div class="skill-item" data-skill="叫名反应">
          <div class="skill-icon-bg"><i class="fas fa-ear-listen"></i></div>
          <h3>叫名反应</h3>
          <p>听觉·社交回应</p>
        </div>
        <div class="skill-item" data-skill="指物练习">
          <div class="skill-icon-bg"><i class="fas fa-hand-peace"></i></div>
          <h3>指物练习</h3>
          <p>共同注意·表达</p>
        </div>
        <div class="skill-item" data-skill="声音小话筒">
          <div class="skill-icon-bg"><i class="fas fa-microphone-alt"></i></div>
          <h3>声音小话筒</h3>
          <p>发声启蒙·语言意愿</p>
        </div>
      </div>

      <!-- 今日推荐区域 -->
      <div class="rec-section-header">
        <h2><i class="fas fa-calendar-alt"></i> 今日推荐</h2>
      </div>

      <div class="rec-cards">
        <!-- 推荐1 叫名反应 -->
        <div class="rec-card">
          <div class="rec-top">
            <div class="rec-icon-lg"><i class="fas fa-ear-deaf"></i></div>
            <div class="rec-title">叫名反应<br>进阶游戏</div>
          </div>
          <div class="success-chip">
            <i class="fas fa-chart-line"></i>
            <span>上次成功率：<span class="rate-number">50%</span></span>
          </div>
          <button class="train-btn" data-training="叫名反应 · 进阶游戏">
            <i class="fas fa-play-circle"></i> 开始训练
          </button>
        </div>

        <!-- 推荐2 指物练习 -->
        <div class="rec-card">
          <div class="rec-top">
            <div class="rec-icon-lg"><i class="fas fa-hand-peace"></i></div>
            <div class="rec-title">指物练习<br>趣味指认</div>
          </div>
          <div class="success-chip">
            <i class="fas fa-chart-line"></i>
            <span>上次成功率：<span class="rate-number">62.5%</span></span>
          </div>
          <button class="train-btn" data-training="指物练习 · 趣味指认">
            <i class="fas fa-play-circle"></i> 开始训练
          </button>
        </div>

        <!-- 推荐3 声音小话筒 -->
        <div class="rec-card">
          <div class="rec-top">
            <div class="rec-icon-lg"><i class="fas fa-microphone-alt"></i></div>
            <div class="rec-title">声音小话筒<br>发声启蒙</div>
          </div>
          <div class="success-chip">
            <i class="fas fa-chart-line"></i>
            <span>上次成功率：<span class="rate-number">58.3%</span></span>
          </div>
          <button class="train-btn" data-training="声音小话筒 · 发声启蒙">
            <i class="fas fa-play-circle"></i> 开始训练
          </button>
        </div>
      </div>

      <div class="spacer"></div>
    </div>

    <!-- 底部导航栏 - 图片风格 -->
    <div class="bottom-nav">
      <div class="nav-items">
        <div class="nav-item active" data-nav="首页">
          <i class="fas fa-home"></i>
          <span>首页</span>
        </div>
        <div class="nav-item" data-nav="数据看板">
          <i class="fas fa-chart-bar"></i>
          <span>数据看板</span>
        </div>
        <div class="nav-item" data-nav="家长树洞">
          <i class="fas fa-tree"></i>
          <span>家长树洞</span>
        </div>
        <div class="nav-item" data-nav="问卷筛查">
          <i class="fas fa-clipboard-list"></i>
          <span>问卷筛查</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 获取所有导航项
    const navItems = document.querySelectorAll('.nav-item');

    // 设置激活样式
    function setActiveNav(activeNavName) {
      navItems.forEach(item => {
        const itemName = item.getAttribute('data-nav');
        if (itemName === activeNavName) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });
    }

    // 绑定导航点击事件
    navItems.forEach(item => {
      item.addEventListener('click', (e) => {
        e.stopPropagation();
        const navValue = item.getAttribute('data-nav');
        // 根据 data-nav 的值跳转到对应 HTML 文件
        if (navValue === '首页') {
          location.href = 'mainPart.html';
        } else if (navValue === '数据看板') {
          location.href = 'dataLook.html';
        } else if (navValue === '家长树洞') {
          location.href = 'seniorHole.html';
        } else if (navValue === '问卷筛查') {
          location.href = 'askQuestions.html';
        }
      });
    });

    // 个人头像点击跳转到 peopleHome.html
    const parentAvatarBtn = document.getElementById('parentAvatarBtn');
    if (parentAvatarBtn) {
      parentAvatarBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        location.href = 'peopleHome.html';
      });
    }

    console.log('✅ 底部导航栏 | 图片风格 | 无圆角无边框');
    console.log('✅ 个人头像点击跳转 | peopleHome.html');
  </script>
</body>

</html>
