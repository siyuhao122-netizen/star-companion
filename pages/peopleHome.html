<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星伴 · 家长个人中心 | 1024x600</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #D9CBBF;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
      padding: 12px;
    }

    .profile-container {
      width: 1024px;
      height: 600px;
      background: #FFFDF9;
      border-radius: 36px;
      box-shadow: 0 20px 40px -12px rgba(68, 48, 28, 0.35), 0 0 0 1px rgba(235, 218, 196, 0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .scroll-content {
      flex: 1;
      overflow-y: auto;
      padding: 22px 28px 20px;
      scrollbar-width: thin;
      scrollbar-color: #D4B99B #F3EBE2;
    }

    .scroll-content::-webkit-scrollbar {
      width: 5px;
    }

    .scroll-content::-webkit-scrollbar-thumb {
      background: #D4B99B;
      border-radius: 10px;
    }

    /* 头部 */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .back-btn {
      width: 44px;
      height: 44px;
      background: #F5EDE4;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #B88B5C;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid #EADACA;
    }

    .back-btn:hover {
      background: #EDDFD0;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 800;
      color: #4A3724;
    }

    /* 家长信息卡片 */
    .parent-card {
      background: linear-gradient(135deg, #FCF8F0, #F8EFE4);
      border-radius: 32px;
      padding: 20px 24px;
      border: 1.5px solid #F2E5D6;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .parent-avatar-large {
      width: 80px;
      height: 80px;
      background: linear-gradient(145deg, #F8EFE4, #F0E2D4);
      border-radius: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      color: #BD8A5A;
      border: 3px solid #EDD9C6;
    }

    .parent-info {
      flex: 1;
    }

    .parent-name {
      font-size: 22px;
      font-weight: 800;
      color: #5E422C;
      margin-bottom: 4px;
    }

    .parent-phone {
      font-size: 14px;
      color: #9B846C;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .parent-phone i {
      color: #D9A066;
      font-size: 14px;
    }

    .edit-profile-btn {
      background: #FFFFFF;
      border: 1.5px solid #EDDDCF;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      color: #8F6A44;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
    }

    .edit-profile-btn:hover {
      background: #FDF5EC;
      border-color: #D9A066;
    }

    /* 宝贝管理区域 */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .section-header h2 {
      font-size: 18px;
      font-weight: 700;
      color: #5E422C;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-header h2 i {
      color: #D9A066;
    }

    .add-child-btn {
      background: #EADBCA;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      color: #6C4E32;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
      border: 1px solid #DDBB9A;
    }

    .add-child-btn:hover {
      background: #DFCAB4;
    }

    /* 宝贝列表 */
    .children-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .child-item {
      background: #FFFFFF;
      border-radius: 24px;
      padding: 16px 20px;
      border: 1.5px solid #EFE4D8;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.15s;
      cursor: pointer;
    }

    .child-item:hover {
      border-color: #D9A066;
      background: #FEFCF8;
    }

    .child-item.active {
      border-color: #D9A066;
      background: #FDF5EC;
    }

    .child-avatar-medium {
      width: 56px;
      height: 56px;
      background: linear-gradient(145deg, #F8EFE4, #F0E2D4);
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #C28958;
      border: 2px solid #EDD9C6;
      overflow: hidden;
    }

    .child-avatar-medium img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .child-detail {
      flex: 1;
    }

    .child-name-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .child-name {
      font-size: 18px;
      font-weight: 700;
      color: #543E2A;
    }

    .child-badge {
      background: #E8F0D8;
      color: #6B8C4A;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 30px;
    }

    .child-info-row {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: #9B846C;
    }

    .child-info-row span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .child-info-row i {
      color: #D9A066;
      font-size: 12px;
    }

    .child-stats {
      text-align: right;
      min-width: 100px;
    }

    .stats-label {
      font-size: 12px;
      color: #9B846C;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
    }

    .stats-label i {
      color: #D9A066;
      font-size: 12px;
    }

    .stats-value {
      font-size: 22px;
      font-weight: 800;
      color: #B57A48;
    }

    .child-actions {
      display: flex;
      gap: 8px;
      margin-left: 12px;
    }

    .child-action-btn {
      width: 36px;
      height: 36px;
      background: #F5EDE4;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #B88B5C;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid #EADACA;
    }

    .child-action-btn:hover {
      background: #EDDFD0;
    }

    /* 功能菜单 */
    .menu-section {
      background: #FEFCF8;
      border-radius: 28px;
      border: 1.5px solid #F0E5DA;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-bottom: 1px solid #F0E5DA;
      cursor: pointer;
      transition: all 0.15s;
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .menu-item:hover {
      background: #FDF5EC;
    }

    .menu-icon {
      width: 44px;
      height: 44px;
      background: #F5EDE4;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #B88B5C;
    }

    .menu-content {
      flex: 1;
    }

    .menu-title {
      font-size: 16px;
      font-weight: 600;
      color: #543E2A;
      margin-bottom: 2px;
    }

    .menu-desc {
      font-size: 12px;
      color: #B89A78;
    }

    .menu-arrow {
      color: #C4A88B;
      font-size: 14px;
    }

    /* 底部按钮组 */
    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .logout-btn {
      flex: 1;
      padding: 14px;
      background: transparent;
      border: 1.5px solid #E8D5C3;
      border-radius: 48px;
      font-size: 15px;
      font-weight: 600;
      color: #C06060;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s;
    }

    .logout-btn:hover {
      background: #FCE8E8;
      border-color: #D4A0A0;
    }

    .delete-account-btn {
      flex: 1;
      padding: 14px;
      background: transparent;
      border: 1.5px solid #E8D5C3;
      border-radius: 48px;
      font-size: 15px;
      font-weight: 600;
      color: #A0A0A0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s;
    }

    .delete-account-btn:hover {
      background: #F0F0F0;
      border-color: #B0B0B0;
      color: #808080;
    }

    /* 弹窗遮罩 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(60, 40, 28, 0.4);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.show {
      display: flex;
    }

    /* 通用弹窗样式 */
    .form-modal {
      background: #FFFDF9;
      border-radius: 36px;
      padding: 28px 32px;
      max-width: 480px;
      width: 90%;
      max-height: 560px;
      overflow-y: auto;
      box-shadow: 0 20px 40px rgba(80, 50, 30, 0.2);
      border: 1.5px solid #F0E2D4;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .modal-header h3 {
      font-size: 22px;
      font-weight: 700;
      color: #5E422C;
    }

    .close-modal-btn {
      width: 36px;
      height: 36px;
      background: #F5EDE4;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #B88B5C;
      font-size: 16px;
      cursor: pointer;
      border: 1px solid #EADACA;
    }

    /* 表单样式 */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      font-size: 14px;
      font-weight: 600;
      color: #5E422C;
      margin-bottom: 8px;
      display: block;
    }

    .form-label i {
      color: #D9A066;
      margin-right: 6px;
      font-size: 12px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: #FCF8F2;
      border: 1.5px solid #EDDDCF;
      border-radius: 20px;
      font-size: 14px;
      color: #5E422C;
      font-family: inherit;
      transition: all 0.15s;
    }

    .form-input:focus {
      outline: none;
      border-color: #D9A066;
      background: #FFFDF9;
    }

    .form-input::placeholder {
      color: #B89A78;
    }

    .form-select {
      width: 100%;
      padding: 12px 16px;
      background: #FCF8F2;
      border: 1.5px solid #EDDDCF;
      border-radius: 20px;
      font-size: 14px;
      color: #5E422C;
      font-family: inherit;
      cursor: pointer;
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row .form-group {
      flex: 1;
    }

    /* 头像选择 */
    .avatar-selector {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .avatar-option {
      width: 56px;
      height: 56px;
      background: #F5EDE4;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #B88B5C;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
      overflow: hidden;
    }

    .avatar-option:hover {
      background: #EDDFD0;
    }

    .avatar-option.selected {
      border-color: #D9A066;
      background: #FDF5EC;
    }

    .avatar-option img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 自定义上传头像 */
    .avatar-upload {
      width: 56px;
      height: 56px;
      background: linear-gradient(145deg, #F8EFE4, #F0E2D4);
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #B88B5C;
      cursor: pointer;
      border: 2px dashed #D9A066;
      transition: all 0.15s;
      position: relative;
    }

    .avatar-upload:hover {
      background: #EDDFD0;
    }

    .avatar-upload input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .custom-avatar-preview {
      width: 56px;
      height: 56px;
      border-radius: 32px;
      overflow: hidden;
      border: 2px solid #D9A066;
    }

    .custom-avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 标签选择 */
    .tags-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .tag-option {
      padding: 8px 16px;
      background: #F5EDE4;
      border-radius: 30px;
      font-size: 13px;
      color: #8B6A4C;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all 0.15s;
    }

    .tag-option:hover {
      background: #EDDFD0;
    }

    .tag-option.selected {
      border-color: #D9A066;
      background: #FDF5EC;
      color: #B47C44;
    }

    /* 弹窗底部按钮 */
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px 0;
      border-radius: 40px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
    }

    .modal-btn.cancel {
      background: #F5EDE4;
      color: #8B6A4C;
      border: 1px solid #E6D2C0;
    }

    .modal-btn.cancel:hover {
      background: #EDDFD0;
    }

    .modal-btn.confirm {
      background: #EADBCA;
      color: #6C4E32;
      border: 1px solid #DDBB9A;
    }

    .modal-btn.confirm:hover {
      background: #DFCAB4;
    }

    /* 确认弹窗（注销用） */
    .confirm-modal {
      background: #FFFDF9;
      border-radius: 36px;
      padding: 28px 32px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(80, 50, 30, 0.2);
      border: 1.5px solid #F0E2D4;
    }

    .modal-icon {
      font-size: 52px;
      color: #D4A0A0;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: #5E422C;
      margin-bottom: 8px;
    }

    .modal-desc {
      font-size: 14px;
      color: #9B846C;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .modal-btn.delete-confirm {
      background: #E8C4C4;
      color: #8B4A4A;
      border: 1px solid #D4A0A0;
    }

    .modal-btn.delete-confirm:hover {
      background: #DCB0B0;
    }

    /* 提示消息 */
    .toast-msg {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #FEF3E2;
      padding: 12px 28px;
      border-radius: 48px;
      font-weight: 600;
      color: #B87A48;
      z-index: 2000;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
      border: 1px solid #F7E3CF;
      font-size: 14px;
      pointer-events: none;
      white-space: nowrap;
    }

    button {
      font-family: inherit;
    }

    /* 自定义头像区域 */
    .custom-avatar-section {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    .custom-avatar-preview-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .remove-custom-avatar {
      width: 32px;
      height: 32px;
      background: #FCE8E8;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #C06060;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #D4A0A0;
      transition: all 0.15s;
    }

    .remove-custom-avatar:hover {
      background: #F5D0D0;
    }
  </style>
</head>

<body>
  <div class="profile-container">
    <div class="scroll-content">
      <!-- 头部 -->
      <div class="header">
        <div class="back-btn" onclick="goBack()">
          <i class="fas fa-arrow-left"></i>
        </div>
        <h1>个人中心</h1>
      </div>

      <!-- 家长信息卡片 -->
      <div class="parent-card">
        <div class="parent-avatar-large" id="parentAvatarLarge">
          <i class="fas fa-user-circle"></i>
        </div>
        <div class="parent-info">
          <div class="parent-name" id="parentDisplayName">李妈妈</div>
          <div class="parent-phone" id="parentDisplayPhone">
            <i class="fas fa-phone"></i>
            <span>138****8000</span>
          </div>
        </div>
        <button class="edit-profile-btn" onclick="showEditProfileModal()">
          <i class="fas fa-pen"></i> 编辑
        </button>
      </div>

      <!-- 宝贝管理 -->
      <div class="section-header">
        <h2><i class="fas fa-child"></i> 我的宝贝</h2>
        <button class="add-child-btn" onclick="showAddChildModal()">
          <i class="fas fa-plus"></i> 添加宝贝
        </button>
      </div>

      <div class="children-list" id="childrenList">
        <!-- 宝贝列表会通过JS动态渲染 -->
      </div>

      <!-- 功能菜单 -->
      <div class="section-header">
        <h2><i class="fas fa-gear"></i> 设置与更多</h2>
      </div>
      <div class="menu-section">
        <div class="menu-item" onclick="showToast('账号与安全设置')">
          <div class="menu-icon"><i class="fas fa-shield"></i></div>
          <div class="menu-content">
            <div class="menu-title">账号与安全</div>
            <div class="menu-desc">修改密码、绑定手机</div>
          </div>
          <i class="fas fa-chevron-right menu-arrow"></i>
        </div>
        <div class="menu-item" onclick="showToast('通知设置')">
          <div class="menu-icon"><i class="fas fa-bell"></i></div>
          <div class="menu-content">
            <div class="menu-title">通知设置</div>
            <div class="menu-desc">训练提醒、成长报告推送</div>
          </div>
          <i class="fas fa-chevron-right menu-arrow"></i>
        </div>
        <div class="menu-item" onclick="showToast('隐私政策')">
          <div class="menu-icon"><i class="fas fa-lock"></i></div>
          <div class="menu-content">
            <div class="menu-title">隐私政策</div>
            <div class="menu-desc">数据安全与隐私保护</div>
          </div>
          <i class="fas fa-chevron-right menu-arrow"></i>
        </div>
        <div class="menu-item" onclick="showToast('帮助与反馈')">
          <div class="menu-icon"><i class="fas fa-circle-question"></i></div>
          <div class="menu-content">
            <div class="menu-title">帮助与反馈</div>
            <div class="menu-desc">常见问题、联系客服</div>
          </div>
          <i class="fas fa-chevron-right menu-arrow"></i>
        </div>
        <div class="menu-item" onclick="showToast('关于星伴')">
          <div class="menu-icon"><i class="fas fa-info-circle"></i></div>
          <div class="menu-content">
            <div class="menu-title">关于星伴</div>
            <div class="menu-desc">版本 2.1.0 · 暖愈成长空间</div>
          </div>
          <i class="fas fa-chevron-right menu-arrow"></i>
        </div>
      </div>

      <!-- 底部按钮组 -->
      <div class="action-buttons">
        <button class="logout-btn" onclick="handleLogout()">
          <i class="fas fa-sign-out-alt"></i> 退出登录
        </button>
        <button class="delete-account-btn" onclick="showDeleteModal()">
          <i class="fas fa-user-slash"></i> 注销账户
        </button>
      </div>
    </div>
  </div>

  <script>
    // ========== 数据存储 ==========
    // 默认孩子数据 - 与首页保持一致
    let childrenData = [
      { id: 1, name: '乐乐', birth: '2023-03-15', gender: '男', avatar: 'fa-face-smile', avatarType: 'icon', customAvatar: null, focusTags: ['社交', '语言'], trainingCount: 62, weekCount: 8, active: true },
      { id: 2, name: '朵朵', birth: '2024-01-20', gender: '女', avatar: 'fa-cat', avatarType: 'icon', customAvatar: null, focusTags: ['认知', '情绪'], trainingCount: 28, weekCount: 5, active: false },
      { id: 3, name: '阳阳', birth: '2021-06-10', gender: '男', avatar: 'fa-dog', avatarType: 'icon', customAvatar: null, focusTags: ['运动', '语言'], trainingCount: 15, weekCount: 3, active: false }
    ];

    let parentData = {
      name: '李妈妈',
      phone: '13888888000',
      relation: '妈妈',
      email: 'limama@example.com'
    };

    // 当前编辑的宝贝ID
    let editingChildId = null;

    // 从localStorage加载数据
    function loadFromStorage() {
      const savedChildren = localStorage.getItem('starCompanionChildren');
      const savedParent = localStorage.getItem('starCompanionParent');
      const savedActiveChild = localStorage.getItem('starCompanionActiveChild');

      if (savedChildren) {
        try {
          childrenData = JSON.parse(savedChildren);
        } catch (e) { }
      }

      if (savedParent) {
        try {
          parentData = JSON.parse(savedParent);
        } catch (e) { }
      }

      if (savedActiveChild) {
        const activeId = parseInt(savedActiveChild);
        childrenData.forEach(c => c.active = (c.id === activeId));
      }
    }

    // 保存数据到localStorage
    function saveToStorage() {
      localStorage.setItem('starCompanionChildren', JSON.stringify(childrenData));
      localStorage.setItem('starCompanionParent', JSON.stringify(parentData));
      const activeChild = childrenData.find(c => c.active);
      if (activeChild) {
        localStorage.setItem('starCompanionActiveChild', activeChild.id);
      }
    }

    // 更新家长信息显示
    function updateParentDisplay() {
      document.getElementById('parentDisplayName').textContent = parentData.name;
      const phoneDisplay = parentData.phone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2');
      document.getElementById('parentDisplayPhone').innerHTML = `<i class="fas fa-phone"></i><span>${phoneDisplay}</span>`;
    }

    // ========== 工具函数 ==========
    function showToast(msg) {
      let t = document.querySelector('.toast-msg');
      if (t) t.remove();
      t = document.createElement('div');
      t.className = 'toast-msg';
      t.innerHTML = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2000);
    }

    function calculateAge(birthDate) {
      const today = new Date();
      const birth = new Date(birthDate);
      let age = today.getFullYear() - birth.getFullYear();
      const monthDiff = today.getMonth() - birth.getMonth();
      if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
        age--;
      }
      if (age < 1) {
        const months = (today.getFullYear() - birth.getFullYear()) * 12 + today.getMonth() - birth.getMonth();
        return months + '个月';
      }
      return age + '岁' + (monthDiff > 0 ? monthDiff + '个月' : '');
    }

    // ========== 渲染宝贝列表 ==========
    function renderChildrenList() {
      const container = document.getElementById('childrenList');
      container.innerHTML = '';

      childrenData.forEach(child => {
        const age = calculateAge(child.birth);
        const childItem = document.createElement('div');
        childItem.className = `child-item ${child.active ? 'active' : ''}`;
        childItem.setAttribute('data-child-id', child.id);
        childItem.setAttribute('data-child-name', child.name);

        // 处理头像显示
        let avatarHtml = '';
        if (child.avatarType === 'custom' && child.customAvatar) {
          avatarHtml = `<img src="${child.customAvatar}" alt="${child.name}">`;
        } else {
          avatarHtml = `<i class="fas ${child.avatar}"></i>`;
        }

        childItem.innerHTML = `
          <div class="child-avatar-medium">
            ${avatarHtml}
          </div>
          <div class="child-detail">
            <div class="child-name-row">
              <span class="child-name">${child.name}</span>
              ${child.active ? '<span class="child-badge">当前选中</span>' : ''}
            </div>
            <div class="child-info-row">
              <span><i class="fas fa-cake-candles"></i> ${age}</span>
              <span><i class="fas fa-${child.gender === '男' ? 'mars' : 'venus'}"></i> ${child.gender}</span>
              <span><i class="fas fa-dumbbell"></i> 训练${child.trainingCount}次</span>
            </div>
          </div>
          <div class="child-stats">
            <div class="stats-label">
              <i class="fas fa-calendar-week"></i> 本周训练
            </div>
            <div class="stats-value">${child.weekCount}次</div>
          </div>
          <div class="child-actions">
            <div class="child-action-btn" onclick="event.stopPropagation(); switchChild(${child.id})">
              <i class="fas fa-check"></i>
            </div>
            <div class="child-action-btn" onclick="event.stopPropagation(); showEditChildModal(${child.id})">
              <i class="fas fa-pen"></i>
            </div>
          </div>
        `;

        childItem.addEventListener('click', function (e) {
          if (e.target.closest('.child-action-btn')) return;
          switchChild(child.id);
        });

        container.appendChild(childItem);
      });

      saveToStorage();
    }

    // ========== 切换宝贝 ==========
    function switchChild(childId) {
      childrenData.forEach(c => c.active = (c.id === childId));
      renderChildrenList();
      const child = childrenData.find(c => c.id === childId);
      showToast(`👶 已切换到「${child.name}」`);
    }

    // ========== 返回 ==========
    function goBack() {
      location.href = 'mainPart.html';
    }

    // ========== 退出登录 ==========
    function handleLogout() {
      showToast('👋 正在退出登录...');
      setTimeout(() => {
        location.href = 'sign-inANDsign-up.html';
      }, 800);
    }

    // ========== 注销账户弹窗 ==========
    function showDeleteModal() {
      document.getElementById('deleteModal').classList.add('show');
    }

    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.remove('show');
    }

    function confirmDeleteAccount() {
      closeDeleteModal();
      showToast('⏳ 账户注销处理中...');
      setTimeout(() => {
        showToast('✅ 账户已注销');
        localStorage.clear();
        setTimeout(() => {
          location.href = 'sign-inANDsign-up.html';
        }, 1000);
      }, 1000);
    }

    // ========== 编辑个人资料弹窗 ==========
    function showEditProfileModal() {
      document.getElementById('editParentName').value = parentData.name;
      document.getElementById('editParentPhone').value = parentData.phone;
      document.getElementById('editParentRelation').value = parentData.relation;
      document.getElementById('editParentEmail').value = parentData.email;
      document.getElementById('editProfileModal').classList.add('show');
    }

    function closeEditProfileModal() {
      document.getElementById('editProfileModal').classList.remove('show');
    }

    function saveProfile() {
      parentData.name = document.getElementById('editParentName').value;
      parentData.phone = document.getElementById('editParentPhone').value;
      parentData.relation = document.getElementById('editParentRelation').value;
      parentData.email = document.getElementById('editParentEmail').value;

      updateParentDisplay();
      saveToStorage();
      closeEditProfileModal();
      showToast('✅ 个人资料已保存');
    }

    // ========== 添加宝贝弹窗 ==========
    function showAddChildModal() {
      document.getElementById('newChildName').value = '';
      document.getElementById('newChildBirth').value = '2023-01-01';
      document.getElementById('newChildGender').value = '男';
      document.getElementById('newChildNote').value = '';
      document.getElementById('newChildCustomAvatarData').value = '';

      document.querySelectorAll('#newChildAvatarSelector .avatar-option').forEach((opt, i) => {
        opt.classList.toggle('selected', i === 0);
      });

      document.querySelectorAll('#newChildFocusTags .tag-option').forEach((tag, i) => {
        tag.classList.toggle('selected', i === 0);
      });

      document.getElementById('newChildCustomAvatarPreview').style.display = 'none';
      document.getElementById('newChildAvatarUpload').style.display = 'flex';

      document.getElementById('addChildModal').classList.add('show');
    }

    function closeAddChildModal() {
      document.getElementById('addChildModal').classList.remove('show');
    }

    document.getElementById('newChildCustomAvatarInput').addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (event) {
          document.getElementById('newChildCustomAvatarImg').src = event.target.result;
          document.getElementById('newChildCustomAvatarData').value = event.target.result;
          document.getElementById('newChildCustomAvatarPreview').style.display = 'flex';
          document.getElementById('newChildAvatarUpload').style.display = 'none';

          document.querySelectorAll('#newChildAvatarSelector .avatar-option').forEach(opt => {
            opt.classList.remove('selected');
          });
        };
        reader.readAsDataURL(file);
      }
    });

    function removeNewChildCustomAvatar() {
      document.getElementById('newChildCustomAvatarPreview').style.display = 'none';
      document.getElementById('newChildAvatarUpload').style.display = 'flex';
      document.getElementById('newChildCustomAvatarData').value = '';
      document.getElementById('newChildCustomAvatarInput').value = '';

      document.querySelectorAll('#newChildAvatarSelector .avatar-option').forEach((opt, i) => {
        opt.classList.toggle('selected', i === 0);
      });
    }

    function addChild() {
      const name = document.getElementById('newChildName').value.trim();
      if (!name) {
        showToast('⚠️ 请输入宝贝昵称');
        return;
      }

      const customAvatarData = document.getElementById('newChildCustomAvatarData').value;
      let avatarType = 'icon';
      let avatar = 'fa-face-smile';

      if (customAvatarData) {
        avatarType = 'custom';
        avatar = customAvatarData;
      } else {
        const selectedAvatar = document.querySelector('#newChildAvatarSelector .avatar-option.selected');
        avatar = selectedAvatar ? selectedAvatar.dataset.avatar : 'fa-face-smile';
      }

      const selectedTags = [];
      document.querySelectorAll('#newChildFocusTags .tag-option.selected').forEach(tag => {
        selectedTags.push(tag.dataset.tag);
      });

      const newId = Math.max(...childrenData.map(c => c.id), 0) + 1;
      const newChild = {
        id: newId,
        name: name,
        birth: document.getElementById('newChildBirth').value,
        gender: document.getElementById('newChildGender').value,
        avatar: avatar,
        avatarType: avatarType,
        customAvatar: avatarType === 'custom' ? avatar : null,
        focusTags: selectedTags,
        trainingCount: 0,
        weekCount: 0,
        active: false
      };

      childrenData.push(newChild);
      renderChildrenList();
      closeAddChildModal();
      showToast(`✅ 宝贝「${name}」已添加`);
    }

    // ========== 编辑宝贝弹窗 ==========
    function showEditChildModal(childId) {
      editingChildId = childId;
      const child = childrenData.find(c => c.id === childId);
      if (!child) return;

      document.getElementById('editChildId').value = childId;
      document.getElementById('editChildName').value = child.name;
      document.getElementById('editChildBirth').value = child.birth;
      document.getElementById('editChildGender').value = child.gender;
      document.getElementById('editChildCustomAvatarData').value = child.avatarType === 'custom' ? child.avatar : '';

      if (child.avatarType === 'custom' && child.customAvatar) {
        document.getElementById('editChildCustomAvatarImg').src = child.customAvatar;
        document.getElementById('editChildCustomAvatarPreview').style.display = 'flex';
        document.getElementById('editChildAvatarUpload').style.display = 'none';
        document.querySelectorAll('#editChildAvatarSelector .avatar-option').forEach(opt => {
          opt.classList.remove('selected');
        });
      } else {
        document.getElementById('editChildCustomAvatarPreview').style.display = 'none';
        document.getElementById('editChildAvatarUpload').style.display = 'flex';
        document.querySelectorAll('#editChildAvatarSelector .avatar-option').forEach(opt => {
          opt.classList.toggle('selected', opt.dataset.avatar === child.avatar);
        });
      }

      document.querySelectorAll('#editChildFocusTags .tag-option').forEach(tag => {
        tag.classList.toggle('selected', child.focusTags.includes(tag.dataset.tag));
      });

      document.getElementById('editChildModal').classList.add('show');
    }

    function closeEditChildModal() {
      document.getElementById('editChildModal').classList.remove('show');
      editingChildId = null;
    }

    document.getElementById('editChildCustomAvatarInput').addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (event) {
          document.getElementById('editChildCustomAvatarImg').src = event.target.result;
          document.getElementById('editChildCustomAvatarData').value = event.target.result;
          document.getElementById('editChildCustomAvatarPreview').style.display = 'flex';
          document.getElementById('editChildAvatarUpload').style.display = 'none';

          document.querySelectorAll('#editChildAvatarSelector .avatar-option').forEach(opt => {
            opt.classList.remove('selected');
          });
        };
        reader.readAsDataURL(file);
      }
    });

    function removeEditChildCustomAvatar() {
      document.getElementById('editChildCustomAvatarPreview').style.display = 'none';
      document.getElementById('editChildAvatarUpload').style.display = 'flex';
      document.getElementById('editChildCustomAvatarData').value = '';
      document.getElementById('editChildCustomAvatarInput').value = '';

      const child = childrenData.find(c => c.id === editingChildId);
      if (child) {
        document.querySelectorAll('#editChildAvatarSelector .avatar-option').forEach(opt => {
          opt.classList.toggle('selected', opt.dataset.avatar === child.avatar);
        });
      }
    }

    function saveChildEdit() {
      const childId = parseInt(document.getElementById('editChildId').value);
      const child = childrenData.find(c => c.id === childId);
      if (!child) return;

      child.name = document.getElementById('editChildName').value.trim();
      child.birth = document.getElementById('editChildBirth').value;
      child.gender = document.getElementById('editChildGender').value;

      const customAvatarData = document.getElementById('editChildCustomAvatarData').value;
      if (customAvatarData) {
        child.avatarType = 'custom';
        child.avatar = customAvatarData;
        child.customAvatar = customAvatarData;
      } else {
        const selectedAvatar = document.querySelector('#editChildAvatarSelector .avatar-option.selected');
        child.avatarType = 'icon';
        child.avatar = selectedAvatar ? selectedAvatar.dataset.avatar : 'fa-face-smile';
        child.customAvatar = null;
      }

      child.focusTags = [];
      document.querySelectorAll('#editChildFocusTags .tag-option.selected').forEach(tag => {
        child.focusTags.push(tag.dataset.tag);
      });

      renderChildrenList();
      closeEditChildModal();
      showToast(`✅ 宝贝「${child.name}」信息已更新`);
    }

    // ========== 头像/标签选择交互 ==========
    document.addEventListener('click', function (e) {
      if (e.target.closest('.avatar-option')) {
        const option = e.target.closest('.avatar-option');
        const container = option.closest('.avatar-selector');
        container.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
        option.classList.add('selected');

        if (container.id === 'newChildAvatarSelector') {
          document.getElementById('newChildCustomAvatarPreview').style.display = 'none';
          document.getElementById('newChildAvatarUpload').style.display = 'flex';
          document.getElementById('newChildCustomAvatarData').value = '';
        }
        if (container.id === 'editChildAvatarSelector') {
          document.getElementById('editChildCustomAvatarPreview').style.display = 'none';
          document.getElementById('editChildAvatarUpload').style.display = 'flex';
          document.getElementById('editChildCustomAvatarData').value = '';
        }
      }

      if (e.target.closest('.tag-option')) {
        const tag = e.target.closest('.tag-option');
        tag.classList.toggle('selected');
      }
    });

    // ========== 弹窗背景点击关闭 ==========
    document.querySelectorAll('.modal-overlay').forEach(modal => {
      modal.addEventListener('click', function (e) {
        if (e.target === this) {
          this.classList.remove('show');
        }
      });
    });

    // 将函数挂载到全局
    window.removeNewChildCustomAvatar = removeNewChildCustomAvatar;
    window.removeEditChildCustomAvatar = removeEditChildCustomAvatar;
    window.showEditChildModal = showEditChildModal;

    // ========== 初始化 ==========
    loadFromStorage();
    updateParentDisplay();
    renderChildrenList();
  </script>
</body>

</html>
