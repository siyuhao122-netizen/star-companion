<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星伴 · 家长个人中心 | 1024x600</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #D9CBBF;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
      padding: 12px;
    }

    .profile-container {
      width: 1024px;
      height: 600px;
      background: #FFFDF9;
      border-radius: 36px;
      box-shadow: 0 20px 40px -12px rgba(68, 48, 28, 0.35), 0 0 0 1px rgba(235, 218, 196, 0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .scroll-content {
      flex: 1;
      overflow-y: auto;
      padding: 22px 28px 20px;
      scrollbar-width: thin;
      scrollbar-color: #D4B99B #F3EBE2;
    }

    .scroll-content::-webkit-scrollbar {
      width: 5px;
    }

    .scroll-content::-webkit-scrollbar-thumb {
      background: #D4B99B;
      border-radius: 10px;
    }

    /* 头部 */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .back-btn {
      width: 44px;
      height: 44px;
      background: #F5EDE4;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #B88B5C;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid #EADACA;
    }

    .back-btn:hover {
      background: #EDDFD0;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 800;
      color: #4A3724;
    }

    /* 家长信息卡片 */
    .parent-card {
      background: linear-gradient(135deg, #FCF8F0, #F8EFE4);
      border-radius: 32px;
      padding: 20px 24px;
      border: 1.5px solid #F2E5D6;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .parent-avatar-large {
      width: 80px;
      height: 80px;
      background: linear-gradient(145deg, #F8EFE4, #F0E2D4);
      border-radius: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      color: #BD8A5A;
      border: 3px solid #EDD9C6;
    }

    .parent-info {
      flex: 1;
    }

    .parent-name {
      font-size: 22px;
      font-weight: 800;
      color: #5E422C;
      margin-bottom: 4px;
    }

    .parent-phone {
      font-size: 14px;
      color: #9B846C;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .parent-phone i {
      color: #D9A066;
      font-size: 14px;
    }

    .edit-profile-btn {
      background: #FFFFFF;
      border: 1.5px solid #EDDDCF;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      color: #8F6A44;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
    }

    .edit-profile-btn:hover {
      background: #FDF5EC;
      border-color: #D9A066;
    }

    /* 宝贝管理区域 */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .section-header h2 {
      font-size: 18px;
      font-weight: 700;
      color: #5E422C;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-header h2 i {
      color: #D9A066;
    }

    .add-child-btn {
      background: #EADBCA;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      color: #6C4E32;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
      border: 1px solid #DDBB9A;
    }

    .add-child-btn:hover {
      background: #DFCAB4;
    }

    /* 宝贝列表 */
    .children-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .child-item {
      background: #FFFFFF;
      border-radius: 24px;
      padding: 16px 20px;
      border: 1.5px solid #EFE4D8;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.15s;
      cursor: pointer;
    }

    .child-item:hover {
      border-color: #D9A066;
      background: #FEFCF8;
    }

    .child-item.active {
      border-color: #D9A066;
      background: #FDF5EC;
    }

    .child-avatar-medium {
      width: 56px;
      height: 56px;
      background: linear-gradient(145deg, #F8EFE4, #F0E2D4);
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #C28958;
      border: 2px solid #EDD9C6;
    }

    .child-detail {
      flex: 1;
    }

    .child-name-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .child-name {
      font-size: 18px;
      font-weight: 700;
      color: #543E2A;
    }

    .child-badge {
      background: #E8F0D8;
      color: #6B8C4A;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 30px;
    }

    .child-info-row {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: #9B846C;
    }

    .child-info-row span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .child-info-row i {
      color: #D9A066;
      font-size: 12px;
    }

    .child-stats {
      text-align: right;
    }

    .progress-label {
      font-size: 12px;
      color: #9B846C;
      margin-bottom: 4px;
    }

    .progress-value {
      font-size: 22px;
      font-weight: 800;
      color: #B57A48;
    }

    .child-actions {
      display: flex;
      gap: 8px;
      margin-left: 12px;
    }

    .child-action-btn {
      width: 36px;
      height: 36px;
      background: #F5EDE4;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #B88B5C;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid #EADACA;
    }

    .child-action-btn:hover {
      background: #EDDFD0;
    }

    /* 成长数据汇总 */
    .stats-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #FEFCF8;
      border-radius: 24px;
      padding: 16px 14px;
      border: 1.5px solid #F0E5DA;
      text-align: center;
    }

    .stat-card i {
      font-size: 28px;
      color: #D9A066;
      margin-bottom: 8px;
    }

    .stat-number {
      font-size: 28px;
      font-weight: 800;
      color: #5E422C;
    }

    .stat-label {
      font-size: 13px;
      color: #9B846C;
      margin-top: 4px;
    }

    /* 功能菜单 */
    .menu-section {
      background: #FEFCF8;
      border-radius: 28px;
      border: 1.5px solid #F0E5DA;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-bottom: 1px solid #F0E5DA;
      cursor: pointer;
      transition: all 0.15s;
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .menu-item:hover {
      background: #FDF5EC;
    }

    .menu-icon {
      width: 44px;
      height: 44px;
      background: #F5EDE4;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #B88B5C;
    }

    .menu-content {
      flex: 1;
    }

    .menu-title {
      font-size: 16px;
      font-weight: 600;
      color: #543E2A;
      margin-bottom: 2px;
    }

    .menu-desc {
      font-size: 12px;
      color: #B89A78;
    }

    .menu-arrow {
      color: #C4A88B;
      font-size: 14px;
    }

    .logout-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1.5px solid #E8D5C3;
      border-radius: 48px;
      font-size: 15px;
      font-weight: 600;
      color: #C06060;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s;
      margin-bottom: 8px;
    }

    .logout-btn:hover {
      background: #FCE8E8;
      border-color: #D4A0A0;
    }

    /* 弹窗 */
    .toast-msg {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #FEF3E2;
      padding: 10px 24px;
      border-radius: 48px;
      font-weight: 600;
      color: #B87A48;
      z-index: 1000;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
      border: 1px solid #F7E3CF;
      font-size: 13px;
      pointer-events: none;
    }

    button {
      font-family: inherit;
    }
  </style>
</head>

<body>
  <div class="profile-container">
    <div class="scroll-content">
      <!-- 头部 - 修改返回按钮 -->
      <div class="header">
        <div class="back-btn" onclick="goBack()">
          <i class="fas fa-arrow-left"></i>
        </div>
        <h1>个人中心</h1>
      </div>

      <!-- 家长信息卡片 -->
      <div class="parent-card">
        <div class="parent-avatar-large">
          <i class="fas fa-user-circle"></i>
        </div>
        <div class="parent-info">
          <div class="parent-name">李妈妈</div>
          <div class="parent-phone">
            <i class="fas fa-phone"></i>
            <span>138****8000</span>
          </div>
        </div>
        <button class="edit-profile-btn" onclick="showToast('编辑个人资料')">
          <i class="fas fa-pen"></i> 编辑
        </button>
      </div>

      <!-- 宝贝管理 -->
      <div class="section-header">
        <h2><i class="fas fa-child"></i> 我的宝贝</h2>
        <button class="add-child-btn" onclick="showToast('添加新宝贝')">
          <i class="fas fa-plus"></i> 添加宝贝
        </button>
      </div>

      <div class="children-list">
        <!-- 宝贝1 - 当前激活 -->
        <div class="child-item active">
          <div class="child-avatar-medium">
            <i class="fas fa-child"></i>
          </div>
          <div class="child-detail">
            <div class="child-name-row">
              <span class="child-name">小宝</span>
              <span class="child-badge">当前选中</span>
            </div>
            <div class="child-info-row">
              <span><i class="fas fa-cake-candles"></i> 3岁半</span>
              <span><i class="fas fa-venus"></i> 男</span>
              <span><i class="fas fa-calendar"></i> 训练62天</span>
            </div>
          </div>
          <div class="child-stats">
            <div class="progress-label">综合进步</div>
            <div class="progress-value">78%</div>
          </div>
          <div class="child-actions">
            <div class="child-action-btn" onclick="showToast('编辑小宝信息')">
              <i class="fas fa-pen"></i>
            </div>
          </div>
        </div>

        <!-- 宝贝2 -->
        <div class="child-item">
          <div class="child-avatar-medium">
            <i class="fas fa-face-smile"></i>
          </div>
          <div class="child-detail">
            <div class="child-name-row">
              <span class="child-name">小苹果</span>
            </div>
            <div class="child-info-row">
              <span><i class="fas fa-cake-candles"></i> 2岁</span>
              <span><i class="fas fa-mars"></i> 女</span>
              <span><i class="fas fa-calendar"></i> 训练28天</span>
            </div>
          </div>
          <div class="child-stats">
            <div class="progress-label">综合进步</div>
            <div class="progress-value">65%</div>
          </div>
          <div class="child-actions">
            <div class="child-action-btn" onclick="showToast('切换到小苹果')">
              <i class="fas fa-check"></i>
            </div>
            <div class="child-action-btn" onclick="showToast('编辑小苹果信息')">
              <i class="fas fa-pen"></i>
            </div>
          </div>
        </div>

        <!-- 宝贝3 -->
        <div class="child-item">
          <div class="child-avatar-medium">
            <i class="fas fa-star"></i>
          </div>
          <div class="child-detail">
            <div class="child-name-row">
              <span class="child-name">乐乐</span>
            </div>
            <div class="child-info-row">
              <span><i class="fas fa-cake-candles"></i> 4岁</span>
              <span><i class="fas fa-venus"></i> 男</span>
              <span><i class="fas fa-calendar"></i> 训练15天</span>
            </div>
          </div>
          <div class="child-stats">
            <div class="progress-label">综合进步</div>
            <div class="progress-value">52%</div>
          </div>
          <div class="child-actions">
            <div class="child-action-btn" onclick="showToast('切换到乐乐')">
              <i class="fas fa-check"></i>
            </div>
            <div class="child-action-btn" onclick="showToast('编辑乐乐信息')">
              <i class="fas fa-pen"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- 成长数据汇总 -->
      <div class="section-header">
        <h2><i class="fas fa-chart-simple"></i> 成长数据</h2>
      </div>
      <div class="stats-summary">
        <div class="stat-card">
          <i class="fas fa-calendar-check"></i>
          <div class="stat-number">105</div>
          <div class="stat-label">累计训练天数</div>
        </div>
        <div class="stat-card">
          <i class="fas fa-star"></i>
          <div class="stat-number">386</div>
          <div class="stat-label">获得星星总数</div>
        </div>
        <div class="stat-card">
          <i class="fas fa-trophy"></i>
          <div class="stat-number">12</div>
          <div class="stat-label">完成里程碑</div>
        </div>
      </div>

      <!-- 功能菜单 -->
      <div class="section-header">
        <h2><i class="fas fa-gear"></i> 设置与更多</h2>
      </div>
      <div class="menu-section">
        <div class="menu-item" onclick="showToast('账号与安全设置')">
          <div class="menu-icon"><i class="fas fa-shield"></i></div>
          <div class="menu-content">
            <div class="menu-title">账号与安全</div>
            <div class="menu-desc">修改密码、绑定手机</div>
          </div>
          <i class="fas fa-chevron-right menu-arrow"></i>
        </div>
        <div class="menu-item" onclick="showToast('通知设置')">
          <div class="menu-icon"><i class="fas fa-bell"></i></div>
          <div class="menu-content">
            <div class="menu-title">通知设置</div>
            <div class="menu-desc">训练提醒、成长报告推送</div>
          </div>
          <i class="fas fa-chevron-right menu-arrow"></i>
        </div>
        <div class="menu-item" onclick="showToast('隐私政策')">
          <div class="menu-icon"><i class="fas fa-lock"></i></div>
          <div class="menu-content">
            <div class="menu-title">隐私政策</div>
            <div class="menu-desc">数据安全与隐私保护</div>
          </div>
          <i class="fas fa-chevron-right menu-arrow"></i>
        </div>
        <div class="menu-item" onclick="showToast('帮助与反馈')">
          <div class="menu-icon"><i class="fas fa-circle-question"></i></div>
          <div class="menu-content">
            <div class="menu-title">帮助与反馈</div>
            <div class="menu-desc">常见问题、联系客服</div>
          </div>
          <i class="fas fa-chevron-right menu-arrow"></i>
        </div>
        <div class="menu-item" onclick="showToast('关于星伴')">
          <div class="menu-icon"><i class="fas fa-info-circle"></i></div>
          <div class="menu-content">
            <div class="menu-title">关于星伴</div>
            <div class="menu-desc">版本 2.1.0 · 暖愈成长空间</div>
          </div>
          <i class="fas fa-chevron-right menu-arrow"></i>
        </div>
      </div>

      <!-- 退出登录按钮 - 无弹框直接跳转 -->
      <button class="logout-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> 退出登录
      </button>
    </div>
  </div>

  <script>
    function showToast(msg) {
      let t = document.querySelector('.toast-msg');
      if (t) t.remove();
      t = document.createElement('div');
      t.className = 'toast-msg';
      t.innerHTML = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 1800);
    }

    // 返回按钮 - 跳转到 mainPart.html
    function goBack() {
      location.href = 'mainPart.html';
    }

    // 退出登录函数 - 无弹框直接跳转
    function logout() {
      location.href = 'sign-inANDsign-up.html';
    }

    // 宝贝卡片点击切换
    document.querySelectorAll('.child-item').forEach(item => {
      item.addEventListener('click', function (e) {
        if (e.target.closest('.child-action-btn')) return;
        document.querySelectorAll('.child-item').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        const name = this.querySelector('.child-name')?.innerText || '宝贝';
        showToast(`👶 已切换到「${name}」`);
      });
    });
  </script>
</body>

</html>
