<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>星伴 · 叫名反应训练</title>
  <link rel="stylesheet" href="../css/askName.css">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="game-container">
    <!-- 头部 -->
    <div class="game-header">
      <a href="mainPart.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
      <h1>⭐ 叫名反应训练</h1>
      <div class="child-badge" id="childBadge">
        <i class="fas fa-face-smile"></i>
        <span id="childDisplayName">乐乐</span>
      </div>
    </div>

    <!-- 两列布局 -->
    <div class="two-column-layout">
      <!-- 左侧：摄像头 -->
      <div class="camera-area">
        <div class="camera-card">
          <div class="video-wrapper">
            <video id="videoElement" autoplay playsinline></video>
            <canvas id="canvasElement"></canvas>
          </div>
          <div class="camera-status-bar">
            <div class="status-badge" id="cameraStatus">
              <i class="fas fa-video"></i>
              <span>点击"开始训练"启用摄像头</span>
            </div>
            <div class="status-badge" id="headPoseStatus">
              <i class="fas fa-user"></i>
              <span>等待检测</span>
            </div>
            <div class="status-badge" id="expressionStatus">
              <i class="fas fa-smile"></i>
              <span>面部表情</span>
            </div>
            <div class="status-badge" id="voiceStatus">
              <i class="fas fa-microphone"></i>
              <span>声音音量</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 右侧：信息面板 -->
      <div class="info-area">
        <div class="prompt-card">
          <div class="call-message" id="callMessage">
            <i class="fas fa-star"></i> 乐乐！看这里~
          </div>
          <div class="call-sub" id="callSubMessage">
            <i class="fas fa-cat"></i> 小猫正在叫你
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">本轮</div>
            <div class="stat-value" id="roundDisplay">1/8</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">成功</div>
            <div class="stat-value" id="successCount">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">反应</div>
            <div class="stat-value" id="reactionTime">—<span class="stat-unit">秒</span></div>
          </div>
        </div>

        <div class="result-panel">
          <div class="result-title"><i class="fas fa-chart-line"></i> 实时检测结果</div>
          <div class="result-content">
            <div class="detection-status">
              <div class="status-indicator" id="statusIndicator"></div>
              <span class="status-text" id="detectionResultText">等待开始训练</span>
            </div>
            <!-- 校准进度条 -->
            <div class="calibration-bar" id="calibrationBar" style="display:none;">
              <div class="calibration-label">📐 正在校准基准数据...</div>
              <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="calibrationFill" style="width: 0%"></div>
              </div>
            </div>
            <div class="progress-bar-container">
              <div class="progress-label">
                <span>训练进度</span>
                <span id="progressPercent">0%</span>
              </div>
              <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
              </div>
            </div>
            <div style="margin-top: 12px; font-size: 13px; color: #8F6A44;" id="additionalInfo">
              <i class="fas fa-info-circle"></i> 等待宝贝转头/微笑/发声回应
            </div>
          </div>
        </div>

        <div class="action-buttons">
          <button class="btn btn-secondary" id="skipBtn">
            <i class="fas fa-forward"></i> 跳过本轮
          </button>
          <button class="btn btn-primary" id="startBtn">
            <i class="fas fa-play"></i> 开始训练
          </button>
        </div>
      </div>
    </div>

    <div class="footer-tip">
      <i class="fas fa-lightbulb"></i> 让宝贝面对镜头，当听到名字时转头、微笑或发声回应
    </div>
  </div>

  <!-- 训练报告弹窗 -->
  <div class="result-modal" id="resultModal">
    <div class="modal-card" style="max-width: 680px;">
      <div class="modal-title">📊 叫名反应 · 训练报告</div>
      <div class="stats-grid" style="grid-template-columns: repeat(4,1fr);">
        <div class="stat-item"><div class="stat-label">总轮数</div><div class="stat-value" id="reportTotalRounds">8</div></div>
        <div class="stat-item"><div class="stat-label">成功次数</div><div class="stat-value" id="reportSuccessCount">0</div></div>
        <div class="stat-item"><div class="stat-label">成功率</div><div class="stat-value" id="reportSuccessRate">0%</div></div>
        <div class="stat-item"><div class="stat-label">平均反应时间</div><div class="stat-value" id="reportAvgTime">—<span class="stat-unit">秒</span></div></div>
        <div class="stat-item"><div class="stat-label">最快反应</div><div class="stat-value" id="reportMinTime">—<span class="stat-unit">秒</span></div></div>
        <div class="stat-item"><div class="stat-label">最慢反应</div><div class="stat-value" id="reportMaxTime">—<span class="stat-unit">秒</span></div></div>
        <div class="stat-item"><div class="stat-label">头部转向反应比例</div><div class="stat-value" id="reportHeadRatio">0%</div></div>
        <div class="stat-item"><div class="stat-label">声音反应比例</div><div class="stat-value" id="reportVoiceRatio">0%</div></div>
        <div class="stat-item"><div class="stat-label">头+声同时反应</div><div class="stat-value" id="reportBothRatio">0%</div></div>
        <div class="stat-item"><div class="stat-label">平均头部转向距离</div><div class="stat-value" id="reportAvgHeadDist">—<span class="stat-unit">px</span></div></div>
        <div class="stat-item"><div class="stat-label">平均声音分贝</div><div class="stat-value" id="reportAvgVoiceDb">—<span class="stat-unit">dB</span></div></div>
        <div class="stat-item"><div class="stat-label">超时次数</div><div class="stat-value" id="reportTimeout">0</div></div>
      </div>
      <div class="analysis-area">
        <div class="analysis-title"><i class="fas fa-robot"></i> 智能分析</div>
        <div class="analysis-text" id="analysisText"></div>
      </div>
      <div class="single-button">
        <button class="modal-btn" id="homeReturnBtn">🏠 返回首页</button>
      </div>
    </div>
  </div>

  <script src="../js/askName.js"></script>
</body>
</html>
