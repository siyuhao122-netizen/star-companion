<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星伴 · 叫名反应训练 | 高保真游戏界面</title>
  <!-- 字体与图标库 -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #F2EFEA;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      padding: 20px;
    }

    .game-container {
      max-width: 780px;
      width: 100%;
      background: #FFFCF8;
      border-radius: 52px;
      box-shadow: 0 25px 45px -12px rgba(68, 48, 28, 0.25), 0 0 0 1px rgba(239, 222, 198, 0.5);
      overflow: hidden;
      transition: all 0.2s;
    }

    .game-main {
      padding: 24px 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    /* 新增游戏名称区域 */
    .game-title {
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #FDF5EC 0%, #FFF8F2 100%);
      padding: 6px 20px 6px 16px;
      border-radius: 60px;
      border: 1.5px solid #F0DCC8;
      box-shadow: 0 4px 8px rgba(168, 122, 82, 0.06);
    }

    .game-title i {
      font-size: 26px;
      color: #D49B6A;
    }

    .game-title h1 {
      font-size: 20px;
      font-weight: 700;
      color: #5C3F2B;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .game-title .sub-icon {
      font-size: 22px;
      margin-left: 4px;
    }

    .back-btn,
    .settings-btn {
      background: #F5EFE8;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #B18B60;
      cursor: pointer;
      transition: 0.2s;
    }

    .back-btn:active,
    .settings-btn:active {
      background: #EADCCE;
      transform: scale(0.95);
    }

    .game-status {
      display: flex;
      gap: 16px;
      background: #F8F2EA;
      padding: 8px 18px;
      border-radius: 40px;
    }

    .game-status span {
      font-size: 14px;
      font-weight: 600;
      color: #8B6F4C;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .game-status i {
      font-size: 14px;
    }

    .record-dot {
      width: 10px;
      height: 10px;
      background: #E55A4A;
      border-radius: 10px;
      display: inline-block;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0% {
        opacity: 0.4;
        transform: scale(0.8);
      }

      100% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    .interaction-area {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .camera-preview {
      flex: 1.2;
      background: #2C241A;
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.2);
      position: relative;
      aspect-ratio: 4 / 3;
      border: 2px solid #F0DFCE;
    }

    .camera-placeholder {
      width: 100%;
      height: 100%;
      background: #1E1914;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #DBC8B2;
      font-size: 14px;
      position: relative;
    }

    #videoElement {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      display: none;
    }

    .detection-overlay {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(6px);
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      color: #FFE5C4;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 5;
      pointer-events: none;
    }

    .face-mesh-tip {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(79, 70, 229, 0.8);
      padding: 4px 10px;
      border-radius: 40px;
      font-size: 10px;
      color: white;
      font-weight: 600;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }

    .character-area {
      flex: 1;
      background: #FEF7EF;
      border-radius: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      box-shadow: inset 0 0 0 1px #FFF3E6, 0 8px 20px rgba(0, 0, 0, 0.02);
      border: 1px solid #F2E3D4;
    }

    .character-icon {
      font-size: 88px;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.1));
      margin-bottom: 8px;
    }

    .callout-text {
      font-size: 28px;
      font-weight: 800;
      color: #A57248;
      background: #FFF1E2;
      padding: 12px 24px;
      border-radius: 60px;
      margin: 12px 0;
      letter-spacing: 2px;
    }

    .voice-hint {
      font-size: 16px;
      color: #C29A6B;
      background: #FFF3E6;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 500;
    }

    .stats-panel {
      background: #FBF7F2;
      border-radius: 36px;
      padding: 20px;
      border: 1px solid #F0E4D8;
    }

    .round-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      font-weight: 700;
      color: #5E432E;
    }

    .progress-bar-bg {
      background: #EADDCB;
      border-radius: 20px;
      height: 12px;
      overflow: hidden;
      margin: 10px 0 14px;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: #D9A56C;
      border-radius: 20px;
      transition: width 0.3s;
    }

    .success-badge {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 15px;
      font-weight: 500;
    }

    .skip-btn {
      background: #F0E2D4;
      border: none;
      padding: 12px 24px;
      border-radius: 48px;
      font-weight: 700;
      font-size: 16px;
      color: #A57248;
      width: 100%;
      margin-top: 16px;
      cursor: pointer;
      transition: 0.1s;
    }

    .skip-btn:active {
      background: #E3D1BF;
      transform: scale(0.97);
    }

    /* 结果弹窗 */
    .result-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(30, 25, 20, 0.6);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.25s ease, visibility 0.25s;
    }

    .result-modal {
      background: #FFFCF8;
      max-width: 400px;
      width: 90%;
      border-radius: 48px;
      padding: 32px 28px;
      box-shadow: 0 35px 50px -20px #2f1e0e;
      text-align: center;
      border: 1px solid #F2DBC8;
      transform: scale(0.96);
      transition: transform 0.2s;
    }

    .result-modal-overlay.show {
      visibility: visible;
      opacity: 1;
    }

    .result-modal-overlay.show .result-modal {
      transform: scale(1);
    }

    .name-response-icon {
      font-size: 70px;
      margin-bottom: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      background: #FDF2E5;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      padding: 8px 28px;
      border-radius: 60px;
      box-shadow: 0 6px 0 #EAD1BA;
    }

    .name-response-icon i {
      font-size: 52px;
      color: #D49B6A;
      filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.05));
    }

    .name-response-icon span {
      font-size: 48px;
      line-height: 1;
    }

    .result-title {
      font-size: 28px;
      font-weight: 800;
      color: #5A3F2B;
      margin: 18px 0 12px;
    }

    .result-stats {
      background: #F9EFE6;
      border-radius: 30px;
      padding: 18px 10px;
      margin: 20px 0 24px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      padding: 8px 16px;
      font-weight: 500;
      color: #6F4F32;
    }

    .stat-highlight {
      font-size: 38px;
      font-weight: 800;
      color: #C28550;
      line-height: 1.2;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
    }

    .modal-btn {
      flex: 1;
      padding: 16px 0;
      border-radius: 60px;
      border: none;
      font-weight: 700;
      font-size: 18px;
      background: #F5E6D9;
      color: #7B5B3F;
      cursor: pointer;
      transition: 0.15s;
    }

    .modal-btn.primary {
      background: #D4A373;
      color: white;
      box-shadow: 0 6px 0 #A57B52;
    }

    .modal-btn:active {
      transform: translateY(2px);
      box-shadow: 0 4px 0 #A57B52;
    }

    .feedback-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #FEF1E2;
      backdrop-filter: blur(12px);
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 700;
      color: #B5723E;
      font-size: 18px;
      z-index: 200;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      border: 1px solid #FFE3C9;
      pointer-events: none;
      white-space: nowrap;
    }

    @media (max-width: 650px) {
      .game-main {
        padding: 18px;
      }

      .game-title h1 {
        font-size: 16px;
        white-space: normal;
      }

      .callout-text {
        font-size: 20px;
        padding: 8px 16px;
      }

      .character-icon {
        font-size: 64px;
      }
    }
  </style>
</head>

<body>
  <div class="game-container">
    <div class="game-main">
      <!-- 头部：左侧返回 + 游戏名称(新增) + 右侧状态与暂停 -->
      <div class="game-header">
        <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>

        <!-- 游戏名称区域（醒目） -->
        <div class="game-title">
          <i class="fas fa-cat"></i>
          <h1>星伴 · 叫名反应训练</h1>
          <span class="sub-icon">🧸</span>
        </div>

        <div style="display: flex; gap: 12px;">
          <div class="game-status">
            <span><i class="fas fa-video"></i> 录制中 <span class="record-dot"></span></span>
            <span><i class="fas fa-hourglass-half"></i> 约3-5分钟</span>
          </div>
          <button class="settings-btn" id="pauseBtn"><i class="fas fa-pause"></i></button>
        </div>
      </div>

      <div class="interaction-area">
        <div class="camera-preview">
          <div class="camera-placeholder" id="cameraPlaceholder">
            <i class="fas fa-camera" style="font-size: 36px; margin-bottom: 8px;"></i>
            <span>等待摄像头授权...</span>
          </div>
          <video id="videoElement" autoplay playsinline muted></video>
          <div class="detection-overlay" id="detectionStatus">
            <i class="fas fa-circle-nodes"></i> 头部检测: 等待中
          </div>
          <div class="face-mesh-tip">
            <i class="fas fa-face-smile"></i> MediaPipe 实时分析
          </div>
        </div>

        <div class="character-area" id="characterArea">
          <div class="character-icon" id="characterIcon">🐱</div>
          <div class="callout-text" id="calloutText">小明！看这里～</div>
          <div class="voice-hint" id="voiceHint"><i class="fas fa-volume-up"></i> 小猫正在叫你</div>
        </div>
      </div>

      <div class="stats-panel">
        <div class="round-info">
          <span>🎯 本轮训练</span>
          <span id="roundCounter">第 1 / 8 轮</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-fill" id="progressFill" style="width: 12.5%;"></div>
        </div>
        <div class="success-badge">
          <span><i class="fas fa-check-circle"></i> 成功次数: <strong id="successCount">0</strong></span>
          <span><i class="fas fa-stopwatch"></i> 本轮反应: <span id="reactionTime">—</span> 秒</span>
        </div>
        <button class="skip-btn" id="skipBtn"><i class="fas fa-forward-step"></i> 跳过本轮</button>
      </div>
    </div>
  </div>

  <!-- 结果弹窗（居中，带叫名反应图标） -->
  <div class="result-modal-overlay" id="resultModalOverlay">
    <div class="result-modal">
      <div class="name-response-icon">
        <i class="fas fa-ear-listen"></i>
        <span>🧸</span>
        <i class="fas fa-face-smile-wink"></i>
      </div>
      <div class="result-title" id="resultTitle">✨ 训练完成 ✨</div>
      <div class="result-stats">
        <div class="stat-row"><span>成功次数</span> <span id="modalSuccess">0/8</span></div>
        <div class="stat-row" style="margin-top: 10px;"><span>叫名反应率</span> <span class="stat-highlight"
            id="modalRate">0%</span></div>
        <div class="stat-row"><span>平均反应时间</span> <span id="modalAvgTime">—</span></div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn" id="modalReplay"><i class="fas fa-rotate-right"></i> 再来一次</button>
        <button class="modal-btn primary" id="modalBackHome"><i class="fas fa-home"></i> 返回主页</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script>
    (function () {
      "use strict";

      const videoElement = document.getElementById('videoElement');
      const cameraPlaceholder = document.getElementById('cameraPlaceholder');
      const detectionStatusSpan = document.getElementById('detectionStatus');
      const roundCounterSpan = document.getElementById('roundCounter');
      const progressFill = document.getElementById('progressFill');
      const successCountSpan = document.getElementById('successCount');
      const reactionTimeSpan = document.getElementById('reactionTime');
      const skipBtn = document.getElementById('skipBtn');
      const backBtn = document.getElementById('backBtn');
      const pauseBtn = document.getElementById('pauseBtn');
      const characterIcon = document.getElementById('characterIcon');
      const calloutText = document.getElementById('calloutText');
      const resultModalOverlay = document.getElementById('resultModalOverlay');
      const modalSuccess = document.getElementById('modalSuccess');
      const modalRate = document.getElementById('modalRate');
      const modalAvgTime = document.getElementById('modalAvgTime');
      const modalReplay = document.getElementById('modalReplay');
      const modalBackHome = document.getElementById('modalBackHome');

      let currentRound = 1;
      const totalRounds = 8;
      let successRounds = 0;
      let roundActive = true;
      let roundStartTime = 0;
      let detectionTimer = null;
      let isPaused = false;
      let isGameActive = true;
      let hasTurnedThisRound = false;
      let reactionTimesList = [];

      let faceMesh = null;
      let camera = null;

      function showFloatingMessage(msg, isSuccess = false) {
        const existingToast = document.querySelector('.feedback-toast');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'feedback-toast';
        toast.innerHTML = msg;
        if (isSuccess) {
          toast.style.background = "#E8F3E6";
          toast.style.color = "#5E8742";
          toast.style.border = "1px solid #CBE5BC";
        }
        document.body.appendChild(toast);
        setTimeout(() => {
          toast.style.opacity = '0';
          toast.style.transition = '0.2s';
          setTimeout(() => toast.remove(), 200);
        }, 1800);
      }

      function updateUI() {
        roundCounterSpan.innerText = `第 ${currentRound} / ${totalRounds} 轮`;
        const percent = (currentRound / totalRounds) * 100;
        progressFill.style.width = `${percent}%`;
        successCountSpan.innerText = successRounds;
      }

      function handleSuccess(reactionMs) {
        if (!roundActive) return;
        roundActive = false;
        const reactionSec = (reactionMs / 1000).toFixed(2);
        reactionTimeSpan.innerText = reactionSec;
        reactionTimesList.push(reactionMs);
        successRounds++;
        updateUI();

        characterIcon.innerHTML = "🎉🎉🎉";
        calloutText.innerHTML = "太棒了！转头成功！";
        document.getElementById('voiceHint').innerHTML = '<i class="fas fa-star"></i> 好厉害！继续加油～';
        showFloatingMessage(`✨ 成功！反应时间 ${reactionSec} 秒 ✨`, true);

        const overlayDiv = document.getElementById('detectionStatus');
        overlayDiv.innerHTML = '<i class="fas fa-check-circle"></i> 检测到转头！🎉';
        overlayDiv.style.background = "rgba(80, 160, 80, 0.85)";
        setTimeout(() => {
          if (!isGameActive) return;
          overlayDiv.innerHTML = '<i class="fas fa-circle-nodes"></i> 头部检测: 等待下一轮';
          overlayDiv.style.background = "rgba(0,0,0,0.65)";
        }, 1500);

        setTimeout(() => {
          if (currentRound >= totalRounds) {
            endGame();
          } else {
            nextRound();
          }
        }, 2200);
      }

      function handleTimeout() {
        if (!roundActive) return;
        roundActive = false;
        reactionTimeSpan.innerText = '—';
        characterIcon.innerHTML = "😿💪";
        calloutText.innerHTML = "没关系的，再试试～";
        document.getElementById('voiceHint').innerHTML = '<i class="fas fa-heart"></i> 下次听到名字转过来就有星星哦';
        showFloatingMessage("💪 没关系，再试一次，加油！", false);

        setTimeout(() => {
          if (currentRound >= totalRounds) {
            endGame();
          } else {
            nextRound();
          }
        }, 2000);
      }

      function nextRound() {
        currentRound++;
        if (currentRound > totalRounds) {
          endGame();
          return;
        }
        roundActive = true;
        hasTurnedThisRound = false;
        characterIcon.innerHTML = "🐱";
        calloutText.innerHTML = currentRound % 2 === 0 ? "小明！看这里～" : "宝贝，转头看看小猫～";
        document.getElementById('voiceHint').innerHTML = '<i class="fas fa-volume-up"></i> 小猫正在叫你';
        reactionTimeSpan.innerText = '—';
        updateUI();
        detectionStatusSpan.innerHTML = '<i class="fas fa-circle-nodes"></i> 头部检测: 等待叫名';
        detectionStatusSpan.style.background = "rgba(0,0,0,0.65)";
        roundStartTime = Date.now();

        if (detectionTimer) clearTimeout(detectionTimer);
        detectionTimer = setTimeout(() => {
          if (roundActive && isGameActive && !isPaused) handleTimeout();
        }, 5000);

        speakNameCall();
      }

      function speakNameCall() {
        if (!window.speechSynthesis) return;
        const utterance = new SpeechSynthesisUtterance(currentRound % 2 === 0 ? "小明！" : "宝贝，看这里");
        utterance.lang = 'zh-CN';
        utterance.rate = 0.9;
        utterance.pitch = 1.2;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      }

      function endGame() {
        isGameActive = false;
        if (detectionTimer) clearTimeout(detectionTimer);

        const successRate = totalRounds > 0 ? Math.round((successRounds / totalRounds) * 100) : 0;
        let avgTimeStr = '—';
        if (reactionTimesList.length > 0) {
          const sum = reactionTimesList.reduce((a, b) => a + b, 0);
          const avgSec = (sum / reactionTimesList.length / 1000).toFixed(2);
          avgTimeStr = `${avgSec} 秒`;
        }

        modalSuccess.innerText = `${successRounds}/${totalRounds}`;
        modalRate.innerText = `${successRate}%`;
        modalAvgTime.innerText = avgTimeStr;

        resultModalOverlay.classList.add('show');
        if (camera) camera.stop();
      }

      function resetAndStart() {
        currentRound = 1;
        successRounds = 0;
        roundActive = true;
        hasTurnedThisRound = false;
        isPaused = false;
        isGameActive = true;
        reactionTimesList = [];
        pauseBtn.innerHTML = '<i class="fas fa-pause"></i>';

        updateUI();
        roundStartTime = Date.now();

        characterIcon.innerHTML = "🐱";
        calloutText.innerHTML = "小明！看这里～";
        document.getElementById('voiceHint').innerHTML = '<i class="fas fa-volume-up"></i> 小猫正在叫你';
        detectionStatusSpan.innerHTML = '<i class="fas fa-circle-nodes"></i> 头部检测: 等待叫名';

        if (detectionTimer) clearTimeout(detectionTimer);
        detectionTimer = setTimeout(() => {
          if (roundActive && isGameActive && !isPaused) handleTimeout();
        }, 5000);

        speakNameCall();
        if (camera) {
          try { camera.start(); } catch (e) { }
        }
      }

      function initMediaPipe() {
        faceMesh = new FaceMesh({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });
        faceMesh.setOptions({
          maxNumFaces: 1,
          refineLandmarks: true,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5
        });
        faceMesh.onResults(onFaceResults);

        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
          navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
              videoElement.srcObject = stream;
              videoElement.style.display = "block";
              cameraPlaceholder.style.display = "none";
              videoElement.play();

              camera = new Camera(videoElement, {
                onFrame: async () => {
                  if (!isGameActive || isPaused) return;
                  await faceMesh.send({ image: videoElement });
                },
                width: 640,
                height: 480
              });
              camera.start();
              detectionStatusSpan.innerHTML = '<i class="fas fa-circle-nodes"></i> 头部检测: 就绪，等待叫名';
            })
            .catch(() => {
              cameraPlaceholder.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 摄像头不可用<br>请检查权限';
            });
        }
      }

      function onFaceResults(results) {
        if (!roundActive || isPaused || !isGameActive) return;
        if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
          detectionStatusSpan.innerHTML = '<i class="fas fa-circle-nodes"></i> 未检测到面部，请面对摄像头';
          return;
        }
        const landmarks = results.multiFaceLandmarks[0];
        const noseTip = landmarks[1];
        const leftEyeCorner = landmarks[33];
        const rightEyeCorner = landmarks[263];
        if (noseTip && leftEyeCorner && rightEyeCorner) {
          const leftDist = Math.abs(noseTip.x - leftEyeCorner.x);
          const rightDist = Math.abs(rightEyeCorner.x - noseTip.x);
          let yawEstimate = (rightDist - leftDist) * 100;
          const isTurning = Math.abs(yawEstimate) > 0.12;

          if (isTurning && !hasTurnedThisRound && roundActive && (Date.now() - roundStartTime > 400)) {
            hasTurnedThisRound = true;
            const reactionMs = Date.now() - roundStartTime;
            if (roundActive && reactionMs <= 5000) {
              if (detectionTimer) clearTimeout(detectionTimer);
              handleSuccess(reactionMs);
            }
          }
          const direction = yawEstimate > 0.08 ? "👉 向右转头" : (yawEstimate < -0.08 ? "👈 向左转头" : "正面");
          detectionStatusSpan.innerHTML = `<i class="fas fa-face-smile"></i> 头部姿态: ${direction} ${isTurning ? '(检测到转动✓)' : ''}`;
        }
      }

      function skipRound() {
        if (!roundActive || !isGameActive || isPaused) return;
        if (detectionTimer) clearTimeout(detectionTimer);
        roundActive = false;
        showFloatingMessage("⏩ 已跳过本轮", false);
        setTimeout(() => {
          if (currentRound >= totalRounds) endGame();
          else nextRound();
        }, 500);
      }

      skipBtn.addEventListener('click', skipRound);

      pauseBtn.addEventListener('click', () => {
        if (!isGameActive) return;
        isPaused = !isPaused;
        pauseBtn.innerHTML = isPaused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
        showFloatingMessage(isPaused ? "⏸ 游戏已暂停" : "▶️ 继续训练", false);
        if (!isPaused && roundActive && !detectionTimer) {
          const remaining = 5000 - (Date.now() - roundStartTime);
          detectionTimer = setTimeout(() => { if (roundActive && isGameActive && !isPaused) handleTimeout(); }, Math.max(500, remaining));
        }
      });

      backBtn.addEventListener('click', () => {
        if (confirm("返回主界面将退出当前游戏，确定吗？")) {
          window.location.href = "#";
        }
      });

      modalReplay.addEventListener('click', () => {
        resultModalOverlay.classList.remove('show');
        resetAndStart();
        if (camera) {
          try { camera.start(); } catch (e) { }
        }
      });

      modalBackHome.addEventListener('click', () => {
        resultModalOverlay.classList.remove('show');
        showFloatingMessage("返回主界面 (演示)", false);
      });

      resultModalOverlay.addEventListener('click', (e) => {
        if (e.target === resultModalOverlay) {
          resultModalOverlay.classList.remove('show');
        }
      });

      initMediaPipe();
      setTimeout(() => {
        resetAndStart();
      }, 800);

      window.addEventListener('beforeunload', () => {
        if (window.speechSynthesis) window.speechSynthesis.cancel();
      });
    })();
  </script>
</body>

</html>
