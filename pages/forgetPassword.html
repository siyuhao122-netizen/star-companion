<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星伴 · 忘记密码 | 暖愈成长空间</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../css/auth.css">
  <script src="../js/auth.js"></script>
</head>

<body>
  <div class="auth-container">
    <!-- 左侧品牌区 -->
    <div class="brand-section">
      <div class="decor-circle"></div>
      <div class="brand-content">
        <div class="logo-wrapper">
          <div class="logo-icon">
            <i class="fas fa-star"></i>
          </div>
          <div class="logo-text">
            <h1>星伴</h1>
            <p>Stellar Companion</p>
          </div>
        </div>
        <div class="brand-slogan">
          <p>
            今天的陪伴，<br>
            是孩子明天心里<br>
            <span class="highlight">最暖的光</span>
          </p>
        </div>
      </div>
    </div>

    <!-- 右侧表单区 -->
    <div class="form-section">
      <!-- 登录/注册面板 -->
      <div id="authPanel">
        <div class="form-header">
          <h3 id="formTitle"><i class="fas fa-arrow-right-to-bracket"></i> 家长登录</h3>
          <p id="formSubtitle">登录后查看宝贝的成长数据</p>
        </div>

        <div class="auth-tabs" id="authTabs">
          <button class="tab-btn active" data-tab="login">登录</button>
          <button class="tab-btn" data-tab="register">注册</button>
        </div>

        <!-- 登录表单 -->
        <div id="loginStep" class="form-step active">
          <div class="login-method" id="loginMethod">
            <button class="method-btn active" data-method="password" id="passwordMethodBtn">
              <i class="fas fa-lock"></i> 密码登录
            </button>
            <button class="method-btn" data-method="code" id="codeMethodBtn">
              <i class="fas fa-envelope"></i> 验证码登录
            </button>
          </div>

          <div id="passwordLogin">
            <div class="input-group">
              <div class="input-label"><i class="fas fa-envelope"></i>QQ邮箱</div>
              <input type="email" class="input-field" id="loginEmail" placeholder="请输入QQ邮箱">
              <div class="error-message" id="loginEmailError"></div>
            </div>
            <div class="input-group">
              <div class="input-label"><i class="fas fa-lock"></i>密码</div>
              <div class="password-wrapper">
                <input type="password" class="input-field" id="loginPassword" placeholder="请输入密码">
                <i class="fas fa-eye-slash toggle-password" data-target="loginPassword"></i>
              </div>
              <div class="error-message" id="loginPasswordError"></div>
            </div>
            <div class="remember-row">
              <label class="remember-me">
                <input type="checkbox" id="rememberMe"> 记住账号
              </label>
              <span class="forgot-link" id="forgotPassword">忘记密码？</span>
            </div>
            <button class="login-btn" id="loginBtn"><i class="fas fa-arrow-right-to-bracket"></i> 登录星伴</button>
          </div>

          <div id="codeLogin" style="display:none;">
            <div class="input-group">
              <div class="input-label"><i class="fas fa-envelope"></i>QQ邮箱</div>
              <input type="email" class="input-field" id="codeEmail" placeholder="请输入QQ邮箱">
              <div class="error-message" id="codeEmailError"></div>
            </div>
            <div class="input-group">
              <div class="input-label"><i class="fas fa-shield"></i>验证码</div>
              <div class="code-wrapper">
                <input type="text" class="input-field" id="smsCode" placeholder="6位验证码" maxlength="6">
                <button class="code-btn" id="getSmsCodeBtn">获取验证码</button>
              </div>
              <div class="error-message" id="smsCodeError"></div>
            </div>
            <button class="login-btn" id="smsCodeLoginBtn"><i class="fas fa-paper-plane"></i> 验证码登录</button>
          </div>
        </div>

        <!-- 注册表单 -->
        <div id="registerStep" class="form-step">
          <div id="regStep1">
            <div class="step-title"><i class="fas fa-user"></i> 家长信息</div>
            <div class="input-group">
              <div class="input-label"><i class="fas fa-user-pen"></i>家长昵称</div>
              <input type="text" class="input-field" id="parentNickname" placeholder="2-10个中文汉字">
              <div class="error-message" id="parentNicknameError"></div>
            </div>
            <div class="input-group">
              <div class="input-label"><i class="fas fa-envelope"></i>QQ邮箱</div>
              <input type="email" class="input-field" id="regEmail" placeholder="例如：123456789@qq.com">
              <div class="error-message" id="regEmailError"></div>
            </div>
            <div class="input-group">
              <div class="input-label"><i class="fas fa-shield"></i>邮箱验证码</div>
              <div class="code-wrapper">
                <input type="text" class="input-field" id="regEmailCode" placeholder="6位验证码" maxlength="6">
                <button class="code-btn" id="regGetEmailCodeBtn">获取验证码</button>
              </div>
              <div class="error-message" id="regEmailCodeError"></div>
            </div>
            <div class="input-group">
              <div class="input-label"><i class="fas fa-lock"></i>设置密码</div>
              <div class="password-wrapper">
                <input type="password" class="input-field" id="regPassword" placeholder="6位以上字母数字组合">
                <i class="fas fa-eye-slash toggle-password" data-target="regPassword"></i>
              </div>
              <div class="error-message" id="regPasswordError"></div>
            </div>
            <div class="input-group">
              <div class="input-label"><i class="fas fa-check-circle"></i>确认密码</div>
              <div class="password-wrapper">
                <input type="password" class="input-field" id="regConfirmPassword" placeholder="再次输入密码">
                <i class="fas fa-eye-slash toggle-password" data-target="regConfirmPassword"></i>
              </div>
              <div class="error-message" id="regConfirmPasswordError"></div>
            </div>
            <button class="step-btn primary" id="regNextStep1"><i class="fas fa-arrow-right"></i> 下一步</button>
          </div>

          <div id="regStep2" style="display:none;">
            <div class="step-title"><i class="fas fa-child"></i> 宝贝信息</div>
            <div class="input-group">
              <div class="input-label"><i class="fas fa-child"></i>宝贝昵称</div>
              <input type="text" class="input-field" id="regChildName" placeholder="2-10个中文汉字">
              <div class="error-message" id="regChildNameError"></div>
            </div>
            <div class="input-group">
              <div class="input-label"><i class="fas fa-cake-candles"></i>出生年月</div>
              <div class="birth-selector">
                <select class="birth-select" id="birthYear"></select>
                <select class="birth-select" id="birthMonth"></select>
              </div>
            </div>
            <div class="step-buttons">
              <button class="step-btn secondary" id="regPrevStep2"><i class="fas fa-arrow-left"></i> 上一步</button>
              <button class="step-btn primary" id="regNextStep2">下一步 <i class="fas fa-arrow-right"></i></button>
            </div>
          </div>

          <div id="regStep3" style="display:none;">
            <div class="success-message">
              <div class="success-icon"><i class="fas fa-check-circle"></i></div>
              <h4>注册成功！</h4>
              <p id="welcomeMessage">欢迎加入星伴大家庭</p>
              <button class="step-btn primary" id="goToLoginBtn"><i class="fas fa-arrow-right-to-bracket"></i>
                去登录</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 忘记密码面板 -->
      <div id="forgotPanel" style="display:none;">
        <span class="back-link" id="backToLoginLink"><i class="fas fa-arrow-left"></i> 返回登录</span>
        <div class="form-header">
          <h3><i class="fas fa-key"></i> 忘记密码</h3>
          <p>通过邮箱验证码重置您的密码</p>
        </div>

        <div class="step-indicator" id="stepIndicator">
          <div class="step-capsule active" id="stepCapsule1"></div>
          <div class="step-capsule" id="stepCapsule2"></div>
          <div class="step-capsule" id="stepCapsule3"></div>
        </div>

        <!-- 步骤1：输入邮箱 -->
        <div id="forgotStep1">
          <div class="input-group">
            <div class="input-label"><i class="fas fa-envelope"></i>注册邮箱</div>
            <input type="email" class="input-field" id="resetEmail" placeholder="请输入您注册时使用的邮箱">
          </div>
          <div class="hint-text"><i class="fas fa-info-circle"></i> 我们将向该邮箱发送6位验证码</div>
          <button class="action-btn" id="sendCodeBtn"><i class="fas fa-paper-plane"></i> 获取验证码</button>
        </div>

        <!-- 步骤2：输入验证码 -->
        <div id="forgotStep2" style="display:none;">
          <div class="email-display">
            <i class="fas fa-envelope-open"></i>
            <span id="displayEmail">user@example.com</span>
          </div>
          <div class="input-group">
            <div class="input-label"><i class="fas fa-shield"></i>验证码</div>
            <div class="code-wrapper">
              <input type="text" class="input-field" id="verifyCode" placeholder="6位验证码" maxlength="6">
              <button class="code-btn" id="resendCodeBtn">重新发送</button>
            </div>
          </div>
          <div class="hint-text"><i class="fas fa-clock"></i> 验证码有效期10分钟</div>
          <button class="action-btn" id="verifyCodeBtn"><i class="fas fa-check-circle"></i> 验证并继续</button>
       
        </div>

        <!-- 步骤3：设置新密码 -->
        <div id="forgotStep3" style="display:none;">
          <div class="input-group">
            <div class="input-label"><i class="fas fa-lock"></i>新密码</div>
            <div class="password-wrapper">
              <input type="password" class="input-field" id="newPassword" placeholder="8-16位字母数字组合">
              <i class="fas fa-eye-slash toggle-password" data-target="newPassword"></i>
            </div>
            <div class="password-strength">
              <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
              </div>
              <span class="strength-text" id="strengthText">请输入新密码</span>
            </div>
          </div>
          <div class="input-group">
            <div class="input-label"><i class="fas fa-check-circle"></i>确认密码</div>
            <div class="password-wrapper">
              <input type="password" class="input-field" id="confirmNewPassword" placeholder="再次输入新密码">
              <i class="fas fa-eye-slash toggle-password" data-target="confirmNewPassword"></i>
            </div>
          </div>
          <div class="hint-text" id="passwordMatchHint"><i class="fas fa-info-circle"></i> 请再次输入密码确认</div>
          <button class="action-btn" id="resetPasswordBtn"><i class="fas fa-save"></i> 重置密码</button>
          <button class="secondary-btn" id="backToStep2Btn"><i class="fas fa-arrow-left"></i> 返回上一步</button>
        </div>

        <!-- 步骤4：成功 -->
        <div id="forgotStep4" style="display:none;">
          <div class="success-message">
            <div class="success-icon"><i class="fas fa-check-circle"></i></div>
            <h4>密码重置成功！</h4>
            <p>您的新密码已设置完成<br>现在可以使用新密码登录了</p>
            <button class="action-btn" id="goToLoginFromForgotBtn"><i class="fas fa-arrow-right-to-bracket"></i>
              去登录</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/validator.js"></script>
  <script src="../js/forgetPassword.js"></script>
</body>

</html>
