<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>星伴 · 指物练习 | 高保真游戏界面</title>
  <!-- 字体与图标库 -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #F5F1EA;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      padding: 24px;
    }

    /* 游戏主容器 类似原图风格，圆润温暖 */
    .game-container {
      max-width: 880px;
      width: 100%;
      background: #FFFCF8;
      border-radius: 56px;
      box-shadow: 0 30px 40px -18px rgba(68, 48, 28, 0.25), 0 0 0 1px rgba(239, 218, 190, 0.6);
      overflow: hidden;
      transition: all 0.2s;
    }

    .game-inner {
      padding: 28px 30px 36px;
    }

    /* 头部导航 */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .back-home {
      background: #F5EDE4;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 32px;
      font-size: 20px;
      color: #B88B5C;
      cursor: pointer;
      transition: 0.1s;
    }

    .back-home:active {
      background: #E6D8CA;
      transform: scale(0.95);
    }

    .round-badge {
      background: #FCF4EA;
      padding: 8px 28px;
      border-radius: 48px;
      font-weight: 800;
      font-size: 18px;
      color: #B97F4B;
      letter-spacing: 1px;
    }

    .round-badge i {
      margin-right: 6px;
      color: #D9A066;
    }

    .end-game {
      background: #F5EDE4;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 32px;
      font-size: 20px;
      color: #B88B5C;
      cursor: pointer;
    }

    /* 主要游戏内容区 */
    .question-area {
      text-align: center;
      margin-bottom: 24px;
    }

    .question-title {
      font-size: 32px;
      font-weight: 800;
      color: #5F422C;
      background: #FEF6EC;
      display: inline-block;
      padding: 12px 32px;
      border-radius: 80px;
      margin-bottom: 12px;
    }

    .question-icon {
      font-size: 48px;
      display: inline-block;
      margin-left: 8px;
    }

    .instruction {
      font-size: 18px;
      color: #B88254;
      background: #FCF3E9;
      padding: 8px 20px;
      border-radius: 48px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    /* 物品网格 4个卡片 (苹果,香蕉,橘子,西瓜) */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
      margin: 28px 0 30px;
    }

    .item-card {
      background: #FEFCF9;
      border-radius: 48px;
      padding: 24px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.1s;
      border: 2px solid #F2E5D8;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.02);
    }

    .item-card:active {
      transform: scale(0.97);
      background: #FDF7F0;
      border-color: #E9CFB5;
    }

    .item-emoji {
      font-size: 72px;
      margin-bottom: 12px;
    }

    .item-name {
      font-size: 20px;
      font-weight: 700;
      color: #6F4E30;
      background: #F9F0E6;
      display: inline-block;
      padding: 4px 16px;
      border-radius: 40px;
    }

    /* 正确高亮反馈 */
    .item-card.correct-highlight {
      background: #EAF6E3;
      border-color: #9BC87A;
      box-shadow: 0 0 0 2px #B1D991;
    }

    /* 底部统计栏 (成功次数 + 使用时间) 与按钮 */
    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #FCF6EF;
      padding: 16px 24px;
      border-radius: 60px;
      margin: 16px 0 20px;
    }

    .stats-left {
      display: flex;
      gap: 28px;
    }

    .stat-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-weight: 600;
      color: #7A5A3C;
      background: #FEF3E8;
      padding: 6px 18px;
      border-radius: 40px;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 800;
      color: #CA8F5A;
      margin-right: 4px;
    }

    .action-buttons {
      display: flex;
      gap: 16px;
    }

    .btn-skip,
    .btn-end {
      background: #F0E2D4;
      border: none;
      padding: 12px 28px;
      border-radius: 48px;
      font-weight: 700;
      font-size: 16px;
      color: #A77348;
      cursor: pointer;
      transition: 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-skip:active,
    .btn-end:active {
      background: #E3D1BF;
      transform: scale(0.96);
    }

    .btn-end {
      background: #EBDBCA;
      color: #8E633F;
    }

    /* 进度条 */
    .progress-wrapper {
      margin-top: 8px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 500;
      color: #BB9879;
      margin-bottom: 6px;
    }

    .progress-bar-bg {
      background: #F0E2D4;
      border-radius: 20px;
      height: 10px;
      overflow: hidden;
    }

    .progress-fill {
      background: #D9A56C;
      width: 0%;
      height: 100%;
      border-radius: 20px;
      transition: width 0.3s;
    }

    /* 反馈toast */
    .feedback-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #FEF3E2;
      backdrop-filter: blur(12px);
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 700;
      color: #B4753E;
      font-size: 18px;
      z-index: 200;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      border: 1px solid #FFE4CA;
      pointer-events: none;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .game-inner {
        padding: 20px;
      }

      .items-grid {
        gap: 16px;
      }

      .item-emoji {
        font-size: 52px;
      }

      .stats-bar {
        flex-direction: column;
        gap: 14px;
        align-items: stretch;
      }

      .stats-left {
        justify-content: space-between;
      }

      .question-title {
        font-size: 24px;
      }
    }

    button {
      font-family: inherit;
    }

    .correct-animation {
      animation: bounce 0.3s ease;
    }

    @keyframes bounce {
      0% {
        transform: scale(1);
      }

      80% {
        transform: scale(1.05);
        background-color: #EAF6E3;
      }

      100% {
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <div class="game-container">
    <div class="game-inner">
      <!-- 头部: 返回首页 + 轮次 + 结束 -->
      <div class="game-header">
        <button class="back-home" id="backHomeBtn"><i class="fas fa-home"></i></button>
        <div class="round-badge"><i class="fas fa-list-ol"></i> 第 <span id="currentRound">3</span> / <span
            id="totalRounds">8</span> 轮</div>
        <button class="end-game" id="endGameBtn"><i class="fas fa-times-circle"></i></button>
      </div>

      <!-- 指令区域 -->
      <div class="question-area">
        <div class="question-title">
          <span id="targetItemName">苹果</span>
          <span class="question-icon">🍎</span>
        </div>
        <div class="instruction">
          <i class="fas fa-hand-peace"></i> “用你的小手指一指苹果，然后点击它”
        </div>
      </div>

      <!-- 物品网格 (苹果, 香蕉, 橘子, 西瓜) 完全匹配原图 -->
      <div class="items-grid" id="itemsGrid">
        <div class="item-card" data-item="苹果" data-emoji="🍎">
          <div class="item-emoji">🍎</div>
          <div class="item-name">苹果</div>
        </div>
        <div class="item-card" data-item="香蕉" data-emoji="🍌">
          <div class="item-emoji">🍌</div>
          <div class="item-name">香蕉</div>
        </div>
        <div class="item-card" data-item="橘子" data-emoji="🍊">
          <div class="item-emoji">🍊</div>
          <div class="item-name">橘子</div>
        </div>
        <div class="item-card" data-item="西瓜" data-emoji="🍉">
          <div class="item-emoji">🍉</div>
          <div class="item-name">西瓜</div>
        </div>
      </div>

      <!-- 统计与操作栏: 成功次数 + 使用时间 + 结束/跳过 -->
      <div class="stats-bar">
        <div class="stats-left">
          <div class="stat-item"><i class="fas fa-check-circle"></i> 成功次数：<span class="stat-value"
              id="successCount">2</span>次</div>
          <div class="stat-item"><i class="fas fa-hourglass-half"></i> 使用时间：<span class="stat-value"
              id="reactionTime">2</span>s</div>
        </div>
        <div class="action-buttons">
          <button class="btn-skip" id="skipRoundBtn"><i class="fas fa-forward-step"></i> 跳过本轮</button>
          <button class="btn-end" id="finishGameBtn"><i class="fas fa-flag-checkered"></i> 结束</button>
        </div>
      </div>

      <!-- 进度条 -->
      <div class="progress-wrapper">
        <div class="progress-label">
          <span>训练进度</span>
          <span id="progressPercent">25%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-fill" id="progressFill" style="width: 25%;"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 指物练习 - 高保真游戏逻辑
    // 物品库（与网格完全一致）
    const itemsList = [
      { name: "苹果", emoji: "🍎" },
      { name: "香蕉", emoji: "🍌" },
      { name: "橘子", emoji: "🍊" },
      { name: "西瓜", emoji: "🍉" }
    ];

    // 游戏配置
    const TOTAL_ROUNDS = 8;
    let currentRound = 3;          // 初始第3轮 (符合图片)
    let successCount = 2;           // 初始成功2次 (符合图片)
    let roundActive = true;
    let roundStartTime = Date.now();
    let currentTargetItem = "苹果";  // 当前轮需要指认的目标
    let timerInterval = null;
    let usedTime = 2;               // 当前轮已经用时展示2s
    let gameActive = true;

    // DOM 元素
    const backHomeBtn = document.getElementById('backHomeBtn');
    const endGameBtn = document.getElementById('endGameBtn');
    const skipRoundBtn = document.getElementById('skipRoundBtn');
    const finishGameBtn = document.getElementById('finishGameBtn');
    const successCountSpan = document.getElementById('successCount');
    const reactionTimeSpan = document.getElementById('reactionTime');
    const currentRoundSpan = document.getElementById('currentRound');
    const totalRoundsSpan = document.getElementById('totalRounds');
    const progressFill = document.getElementById('progressFill');
    const progressPercentSpan = document.getElementById('progressPercent');
    const targetItemNameSpan = document.getElementById('targetItemName');
    const questionIconSpan = document.querySelector('.question-icon');
    const itemsGrid = document.getElementById('itemsGrid');

    totalRoundsSpan.innerText = TOTAL_ROUNDS;

    // 辅助函数: 显示提示
    function showToastMessage(msg, isSuccess = false) {
      let existing = document.querySelector('.feedback-toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'feedback-toast';
      toast.innerHTML = `<i class="fas fa-hand-peace"></i> ${msg}`;
      if (isSuccess) {
        toast.style.background = "#EAF6E3";
        toast.style.color = "#5E8742";
        toast.style.border = "1px solid #CBE5BC";
      } else {
        toast.style.background = "#FFF2E6";
        toast.style.color = "#BC7A3E";
      }
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 1800);
    }

    // 更新进度条
    function updateProgress() {
      const percent = (currentRound / TOTAL_ROUNDS) * 100;
      progressFill.style.width = `${percent}%`;
      progressPercentSpan.innerText = `${Math.round(percent)}%`;
      currentRoundSpan.innerText = currentRound;
    }

    // 更新成功次数显示
    function updateStatsUI() {
      successCountSpan.innerText = successCount;
    }

    // 更新本轮剩余时间 (模拟计时器, 从本轮开始实时更新)
    function startRoundTimer() {
      if (timerInterval) clearInterval(timerInterval);
      roundStartTime = Date.now();
      timerInterval = setInterval(() => {
        if (!roundActive || !gameActive) return;
        const elapsed = Math.floor((Date.now() - roundStartTime) / 1000);
        // 只显示秒数，最长不超过10秒
        const displaySec = Math.min(elapsed, 99);
        reactionTimeSpan.innerText = displaySec;
        usedTime = displaySec;
        // 超时超过10秒自动鼓励并跳过（可选温和提示）
        if (elapsed >= 12 && roundActive) {
          // 长时间无响应，提示鼓励
          showToastMessage("💪 没关系，再试一次！可以跳过本轮或继续指一指～", false);
          // 不强制失败，但鼓励
        }
      }, 1000);
    }

    // 结束当前轮成功 (点击正确物品)
    function handleSuccess() {
      if (!roundActive || !gameActive) return;
      roundActive = false;
      if (timerInterval) clearInterval(timerInterval);
      // 记录反应时间
      const elapsedSec = Math.floor((Date.now() - roundStartTime) / 1000);
      reactionTimeSpan.innerText = elapsedSec;
      successCount++;
      updateStatsUI();
      // 正向反馈: 语音+动画
      showToastMessage(`🎉 太棒了！指对了“${currentTargetItem}”！获得一颗星星 ✨`, true);
      // 高亮正确物品卡片
      highlightCorrectItem(true);
      // 播放鼓励音效感 (文字代替)
      // 自动进入下一轮
      setTimeout(() => {
        if (currentRound < TOTAL_ROUNDS) {
          goToNextRound();
        } else {
          finishGame(true);
        }
      }, 1500);
    }

    // 高亮正确物品，并播放动画
    function highlightCorrectItem(isCorrect) {
      const cards = document.querySelectorAll('.item-card');
      cards.forEach(card => {
        const itemName = card.getAttribute('data-item');
        if (itemName === currentTargetItem) {
          card.classList.add('correct-highlight');
          card.classList.add('correct-animation');
          setTimeout(() => {
            card.classList.remove('correct-animation');
            if (!roundActive) setTimeout(() => card.classList.remove('correct-highlight'), 800);
            else card.classList.remove('correct-highlight');
          }, 1000);
        }
      });
    }

    // 错误点击处理
    function handleWrong(clickedItem) {
      if (!roundActive || !gameActive) return;
      showToastMessage(`🌱 再试试看～ “${currentTargetItem}”在哪里？用小手指一指它`, false);
      // 错误不减少成功次数，但振动反馈（模拟）
      const card = document.querySelector(`.item-card[data-item="${clickedItem}"]`);
      if (card) {
        card.style.transform = "scale(0.96)";
        setTimeout(() => card.style.transform = "", 200);
      }
    }

    // 下一轮: 随机选择新目标物品 (为了趣味性，从列表中随机抽取，但尽量避免连续相同)
    function getRandomTarget() {
      const available = itemsList.filter(item => item.name !== currentTargetItem);
      if (available.length === 0) return itemsList[0];
      const randomIndex = Math.floor(Math.random() * available.length);
      return available[randomIndex].name;
    }

    function goToNextRound() {
      if (!gameActive) return;
      if (currentRound >= TOTAL_ROUNDS) {
        finishGame(true);
        return;
      }
      currentRound++;
      // 随机抽取下一个目标物品
      const newTarget = getRandomTarget();
      currentTargetItem = newTarget;
      // 更新UI显示目标
      const targetObj = itemsList.find(i => i.name === currentTargetItem);
      targetItemNameSpan.innerText = currentTargetItem;
      if (targetObj) questionIconSpan.innerHTML = targetObj.emoji;
      else questionIconSpan.innerHTML = "🍎";

      // 重置本轮状态
      roundActive = true;
      updateProgress();
      // 重置反应时间显示
      reactionTimeSpan.innerText = "0";
      // 重启计时器
      startRoundTimer();
      // 清除高亮样式
      document.querySelectorAll('.item-card').forEach(card => {
        card.classList.remove('correct-highlight');
      });
      showToastMessage(`🔍 第 ${currentRound} 轮：指一指“${currentTargetItem}”在哪里？`, false);
    }

    // 跳过本轮 (不计成功也不失败，直接进入下一轮)
    function skipRound() {
      if (!roundActive || !gameActive) return;
      roundActive = false;
      if (timerInterval) clearInterval(timerInterval);
      showToastMessage(`⏩ 已跳过本轮，继续加油～`, false);
      setTimeout(() => {
        if (currentRound < TOTAL_ROUNDS) {
          goToNextRound();
        } else {
          finishGame(false);
        }
      }, 600);
    }

    // 结束游戏并总结
    function finishGame(isComplete = true) {
      if (!gameActive) return;
      gameActive = false;
      if (timerInterval) clearInterval(timerInterval);
      const finalRate = ((successCount / TOTAL_ROUNDS) * 100).toFixed(0);
      showToastMessage(`🎊 游戏结束！总成功 ${successCount}/${TOTAL_ROUNDS} 次，成功率 ${finalRate}% 🎊`, true);
      setTimeout(() => {
        alert(`指物练习完成！\n总轮次: ${TOTAL_ROUNDS}\n成功次数: ${successCount}\n成功率: ${finalRate}%\n继续坚持训练会越来越棒！`);
        // 可在此处重置或返回首页，这里模拟返回首页逻辑
        if (confirm("返回主界面？")) {
          window.location.href = "#";
        }
      }, 500);
    }

    // 物品点击事件委托
    function onItemClick(e) {
      if (!gameActive || !roundActive) return;
      let targetCard = e.currentTarget;
      const clickedItem = targetCard.getAttribute('data-item');
      if (clickedItem === currentTargetItem) {
        handleSuccess();
      } else {
        handleWrong(clickedItem);
      }
    }

    // 绑定物品点击
    function bindEvents() {
      const cards = document.querySelectorAll('.item-card');
      cards.forEach(card => {
        card.removeEventListener('click', onItemClick);
        card.addEventListener('click', onItemClick);
      });
    }

    // 初始化游戏 (按原图初始值: 第3轮, 成功2次)
    function initGame() {
      gameActive = true;
      currentRound = 3;
      successCount = 2;
      currentTargetItem = "苹果";
      roundActive = true;
      targetItemNameSpan.innerText = "苹果";
      questionIconSpan.innerHTML = "🍎";
      updateStatsUI();
      updateProgress();
      // 重置计时显示
      reactionTimeSpan.innerText = "2";  // 原图示例显示2s
      roundStartTime = Date.now() - 2000; // 模拟已经过了2秒
      startRoundTimer();
      bindEvents();
      // 清除高亮
      document.querySelectorAll('.item-card').forEach(c => c.classList.remove('correct-highlight'));
      showToastMessage("👆 指一指苹果在哪里？点击对应图片～", false);
    }

    // 按钮事件
    backHomeBtn.addEventListener('click', () => {
      if (confirm("返回首页会退出当前游戏，确定吗？")) {
        window.location.href = "#";
      }
    });
    endGameBtn.addEventListener('click', () => {
      if (confirm("结束游戏并查看总结？")) {
        finishGame(false);
      }
    });
    skipRoundBtn.addEventListener('click', () => {
      if (roundActive && gameActive) skipRound();
      else showToastMessage("本轮已经结束，即将自动下一轮", false);
    });
    finishGameBtn.addEventListener('click', () => {
      if (confirm("结束本次指物练习？数据将会保存。")) {
        finishGame(false);
      }
    });

    // 开始游戏
    initGame();

    // 补充需求: 当正确点击后禁止重复点击，已经在handleSuccess中修改roundActive，同时按钮skip等状态也会判断roundActive
    // 同时为了防止超时后重复点击, roundActive控制
    // 原图完全包含“苹果香蕉橘子西瓜”，成功次数2次，使用时间2s，第3轮，跳过本轮/结束按钮。
    // 额外增加进度条动态表现，完全高保真。
  </script>
</body>

</html>
